<!DOCTYPE html>

<title>ALMANAC</title>
<!--
  ALMANAC — Phase 1: The Farm & The Year
  Built against SPEC.md v1.0. Single file, Three.js r128, no storage APIs.

  DESIGN DECISIONS (unspecified in spec, chosen per pillars):
  - Player character uses a live 3D chibi (spec §3 sanctioned fallback) instead of a
    baked sprite atlas; the bake pipeline lands in phase 2 alongside the 12 villagers.
  - Gameplay plane is flat (y=0); the "gentle fBm heightmap" is expressed visually via
    the painted ground canvas + ridge scenery, keeping the character controller and
    tile targeting simple. Walkable height variation deferred.
  - Ground outside the farm field is one painted canvas texture (2px/m) rather than
    tiles; the farm field itself is the tile grid with InstancedMesh overlays.
  - Interiors are stubbed in phase 1: the farmhouse door prompts sleep, shop doors
    open the shop panel behind a cream fade. Walkable single-room interiors in ph.2.
  - Weather set for phase 1: sun / cloud / rain (autumn), sun / snow (winter).
  - Fishing is deferred to phase 3 (not in phase-1 goal); foraging is included since
    day-5's mini-reveal references forage income.
  - Free turnip packet covers the 6x6 starter patch (36 seeds). Turnip check $216;
    the winter coat is $75 and starting cash $40 so the day-4 squeeze always bites.
  - NPC schedules in phase 1 are per-day scripted placements serving the Year-1
    beats; full waypoint schedule skeletons arrive in phase 2.
  - Debug hooks exposed on window.ALMANAC for acceptance testing (harmless in play).
-->
<style>
  :root {
    --cream:#F2E8CE; --border:#7A5C3E; --ink:#3E3226; --green:#4E7A5A;
    --wood:#A97B55; --path:#B99A6B;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:100%; height:100%; overflow:hidden; background:#2A241B;

  #app { position:fixed; inset:0; }
  #stage { position:absolute; overflow:hidden; background:#BFDCE8; }

  .grade { position:absolute; inset:0; pointer-events:none;
    transition:background-color 1.2s linear, opacity 1.2s linear; }
  #gradeSoft { mix-blend-mode:soft-light; background:#E8A87C; opacity:0; }
  #gradeMult { mix-blend-mode:multiply; background:#e0c0b0; opacity:0; }
  #ui { position:absolute; overflow:hidden; pointer-events:none; color:var(--ink); }
  #ui > * { pointer-events:auto; }

  /* HUD */
  #hud { position:absolute; left:10px; top:10px; pointer-events:none; }

  #titleCard { background:var(--cream); border:4px solid var(--border); border-radius:18px;

    text-shadow:2px 2px 0 #d8c8a2; margin-bottom:2px; }

<script>
'use strict';
/* ============================== CONFIG =================================== */
const CONFIG = {
  WORLD_W: 240, WORLD_H: 180,            // metres; x in [-120,120], z in [-90,90]
  VIEW_W: 640, VIEW_H: 360,
  CAM_OFFSET: { x: 0, y: 14, z: 12 },
  CAM_LERP: 0.06, CAM_DEADZONE: 0.6,
  ZONE_HEIGHT: { farm: 15, town: 13, wild: 14, interior: 11 },
  ZONE_EASE: 0.02,

  DAY_START: 6, DAY_END: 24,
  SEASONS: ['Spring', 'Summer', 'Autumn', 'Winter'],
  SEASON_DAYS: 3, YEAR_DAYS: 12,
  DAY_MINUTES: { Spring: 5.5, Summer: 6, Autumn: 4, Winter: 3 },
  DUSK_HOUR: { Spring: 19, Summer: 21, Autumn: 18, Winter: 17 },
  NIGHT_HOUR: { Spring: 21, Summer: 22.5, Autumn: 20, Winter: 19 },
  START_DAY: 6,                          // absolute day index: Y1 Autumn 1
  SLEEP_FROM: 18,

  START_MONEY: 40,
  CHECK_LAG_DAYS: 2,
  COAT_PRICE: 120,   // must exceed any plausible day-9 cash so the squeeze bites

  STAMINA_MAX: 100,
  STAMINA_COST: { hoe: 3, axe: 4, hammer: 4, sickle: 2, can: 1 },
  STAMINA_Y1_FLOOR: 40,                  // year 1 can't drop below "Tired"
  SLUMP_AT: 50, SWEAT_AT: 25, STUMBLE_AT: 10,

  FIELD_W: 30, FIELD_H: 24,              // farm tile grid
  STARTER: 6,                            // cleared starter patch size

  PLAYER_SPEED: 5.2,
  NPC_SPEED: 3.2,
  INTERACT_DIST: 1.9,
  HOLD_MS: 340,                          // hold-E opens radial

  CROPS: {
    turnip:    { name: 'Turnip',     icon: '🥕', seasons: ['Autumn', 'Spring'], days: 2, seed: 20, sell: 6,  color: 0xE8E4EC, packet: 6 },
    carrot:    { name: 'Carrot',     icon: '🥕', seasons: ['Autumn'],           days: 3, seed: 25, sell: 11, color: 0xD98A4B, packet: 6 },
    bokchoy:   { name: 'Bok Choy',   icon: '🥬', seasons: ['Autumn'],           days: 2, seed: 22, sell: 8,  color: 0x9CBF8A, packet: 6 },
    potato:    { name: 'Potato',     icon: '🥔', seasons: ['Spring'],           days: 3, seed: 24, sell: 12, color: 0xC9A876, packet: 6 },
    cucumber:  { name: 'Cucumber',   icon: '🥒', seasons: ['Spring'],           days: 2, seed: 22, sell: 8,  color: 0x6F9E5A, packet: 6 },
    strawberry:{ name: 'Strawberry', icon: '🍓', seasons: ['Spring'],           days: 3, seed: 30, sell: 14, color: 0xC65B5B, packet: 6 }
  },
  FORAGE: {
    Autumn: [ { id: 'mushroom', name: 'Mushroom',   icon: '🍄', sell: 7 },
              { id: 'walnut',   name: 'Walnut',     icon: '🌰', sell: 5 },
              { id: 'berries',  name: 'Wild Berries', icon: '🫐', sell: 6 } ],
    Winter: [ { id: 'wintergreen', name: 'Wintergreen', icon: '🌿', sell: 10 },
              { id: 'pinecone',    name: 'Pine Cone',   icon: '🌲', sell: 5 } ],
    Spring: [ { id: 'daffodil', name: 'Daffodil',  icon: '🌼', sell: 8 },
              { id: 'wildleek', name: 'Wild Leek', icon: '🧅', sell: 9 } ],
    Summer: [ { id: 'honeycomb', name: 'Honeycomb', icon: '🍯', sell: 12 } ]
  },
  FORAGE_PER_DAY: 5,

  PALETTE: {
    grass: '#7FA86A', grassShade: '#5E8A55', grassWinter: '#A8B098',
    grassWinterShade: '#8C9682',
    tilled: '#8A6248', wateredSoil: '#6B4A3A', cleared: '#96865E',
    path: '#B99A6B', wood: '#A97B55', roofRed: '#B3574C', roofTeal: '#5E8E8A',
    stone: '#9C9C94', water: '#6FA3B8', sky: '#BFDCE8', skyNight: '#3A4260',
    cream: '#F2E8CE', border: '#7A5C3E', ink: '#3E3226', green: '#4E7A5A',
    sand: '#D8C494'
  }
};

/* ================================ RNG ==================================== */
// sfc32 + splitmix32 seeding. Three streams: gen (worldgen, consumed once),
// calendar (per-day, index-addressed), live (moment-to-moment).
function splitmix32(a) {
  return function () {
    a |= 0; a = a + 0x9e3779b9 | 0;
    let t = a ^ a >>> 16; t = Math.imul(t, 0x21f0aaad);
    t = t ^ t >>> 15; t = Math.imul(t, 0x735a2d97);
    return ((t = t ^ t >>> 15) >>> 0) / 4294967296;
  };
}
function sfc32(a, b, c, d) {
  return function () {
    a >>>= 0; b >>>= 0; c >>>= 0; d >>>= 0;
    let t = (a + b) | 0;
    a = b ^ b >>> 9; b = c + (c << 3) | 0; c = (c << 21 | c >>> 11);
    d = d + 1 | 0; t = t + d | 0; c = c + t | 0;
    return (t >>> 0) / 4294967296;
  };
}
function makeStream(seed, key) {
  const mix = splitmix32((seed ^ key) | 0);
  const s = sfc32(mix() * 4294967296, mix() * 4294967296, mix() * 4294967296, mix() * 4294967296);
  for (let i = 0; i < 12; i++) s();   // warm up
  return s;
}
const RNG = { seed: 0, streams: {} };
function seedRNG(seed) {
  RNG.seed = seed >>> 0;
  RNG.streams.gen = makeStream(RNG.seed, 0x67656E);
  RNG.streams.live = makeStream(RNG.seed, 0x6C697665);
}
// The single gateway for all draws.
function rand(stream) { return RNG.streams[stream](); }
function randi(stream, lo, hi) { return lo + Math.floor(rand(stream) * (hi - lo + 1)); }
// Calendar stream: a fresh generator per absolute day so loads never reshuffle.
function calendarDay(dayIndex) {
  const s = makeStream(RNG.seed, 0x63616C ^ Math.imul(dayIndex + 1, 0x9E37));
  return { r: s };
}

/* ============================== HELPERS ================================== */
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
const lerp = (a, b, t) => a + (b - a) * t;
const dist2 = (ax, az, bx, bz) => { const dx = ax - bx, dz = az - bz; return dx * dx + dz * dz; };
const $ = id => document.getElementById(id);
function seasonOf(day) { return CONFIG.SEASONS[Math.floor(day / CONFIG.SEASON_DAYS) % 4]; }
function dayOfSeason(day) { return day % CONFIG.SEASON_DAYS + 1; }
function yearOf(day) { return Math.floor(day / CONFIG.YEAR_DAYS) + 1; }
function isRestday(day) { return dayOfSeason(day) === 3; }
function fmtHour(h) {
  const hh = Math.floor(h), mm = Math.floor((h - hh) * 60);
  return hh + ':' + String(mm).padStart(2, '0');
}
function b64encode(str) { return btoa(unescape(encodeURIComponent(str))); }
function b64decode(str) { return decodeURIComponent(escape(atob(str))); }

/* ============================ GAME STATE ================================= */
const G = {
  mode: 'boot',            // boot | title | play | scene | sleep
  world: null,
  day: CONFIG.START_DAY,
  hour: CONFIG.DAY_START,
  weather: 'sun',
  money: CONFIG.START_MONEY,
  stamina: CONFIG.STAMINA_MAX,
  collapsedYesterday: false,
  inventory: {},           // itemId -> count
  heldItem: null,          // itemId or tool id
  tools: ['hoe', 'can', 'axe', 'hammer', 'sickle'],
  pendingChecks: [],       // {amount, arriveDay, label}
  todayShipped: [],        // {id, name, count, value, enterprise}
  mail: [],                // {day, from, title, body, read}
  journal: [],             // {day, lines[]}
  dayFlags: {},            // reset each rollover; feeds journal
  flags: {},               // persistent story flags
  ledger: { unlocked: false, entries: [] },  // {day, amount, enterprise, note}
  network: { connected: {} },
  farmName: 'Sundrop Farm',
  playerName: 'You',
  look: { skin: 0, hair: 0, shirt: 0 },
  hearts: {},
  paused: false,
  uiOpen: null,            // 'menu' | 'shop' | 'dialogue' | 'radial' | 'year'
  hideHUD: false,
  autosave: null,
  input: { x: 0, z: 0, act: false },
  fps: { frames: 0, last: 0, value: 60 }
};
/* ============================== WORLDGEN ================================= */
function genTownName() {
  const starts = ['Bell', 'Har', 'Wil', 'Ash', 'Fern', 'Cop', 'Mar', 'Dun', 'Hazel', 'Bram', 'Stone', 'Alder'];
  const mids = ['low', 'ren', 'der', 'ber', 'ing', 'ne', ''];
  const ends = ['mere', 'ford', 'holt', 'wyck', 'dale', 'brook'];
  return starts[randi('gen', 0, starts.length - 1)] +
         mids[randi('gen', 0, mids.length - 1)] +
         ends[randi('gen', 0, ends.length - 1)];
}

function generateWorld(seed) {
  seedRNG(seed);
  const W = { seed, colliders: [], circles: [] };
  W.townName = genTownName();
  W.coastal = rand('gen') < 0.4;

  // ---- macro layout (gen stream, consumed in fixed order) ----
  const pathZ = 4;
  W.pathZ = pathZ;
  W.riverX = -20 + rand('gen') * 22;                 // [-20, 2]
  W.riverPhase = rand('gen') * Math.PI * 2;
  const farmX = -76 + rand('gen') * 10;              // field centre x
  const townX = 42 + rand('gen') * 14;
  W.farm = { x: farmX };
  W.town = { x: townX };
  W.shoreX = W.riverX + (rand('gen') < 0.5 ? -1 : 1) * (14 + rand('gen') * 12);
  W.trailX = townX - 26 + rand('gen') * 10;

  // river polyline (north edge to the shore pool)
  W.riverW = 6;
  W.river = [];
  for (let z = -90; z <= 38; z += 8) {
    W.river.push({ x: W.riverX + Math.sin(z * 0.06 + W.riverPhase) * 3, z });
  }
  W.river.push({ x: lerp(W.riverX, W.shoreX, 0.5), z: 48 });
  W.river.push({ x: W.shoreX, z: 58 });
  W.pool = { x: W.shoreX, z: 66, r: 9 };
  if (W.coastal) W.river.push({ x: W.shoreX, z: 76 });
  W.oceanZ = 74;                                     // coastal seeds only

  // ---- farm ----
  const fx0 = Math.round(farmX) - 15, fz0 = -6;
  W.field = { x0: fx0, z0: fz0, w: CONFIG.FIELD_W, h: CONFIG.FIELD_H };
  W.house = { x: fx0 + 15, z: fz0 - 5.5, w: 9, d: 7 };
  W.bin = { x: fx0 + 23, z: fz0 - 3.5 };
  W.well = { x: fx0 + 7, z: fz0 - 3.5 };
  W.mailbox = { x: fx0 + 30.5, z: pathZ - 2 };
  W.gate = { x: fx0 + 30, z: pathZ };
  W.farmRect = { x0: fx0 - 8, z0: fz0 - 12, x1: fx0 + 38, z1: fz0 + CONFIG.FIELD_H + 4 };

  // ---- town: constant businesses, seeded order along the street ----
  const shopDefs = [
    { id: 'general', name: "Bramm's General",     roof: 'red',  w: 10, d: 8 },
    { id: 'forge',   name: "Hetta's Forge & Supply", roof: 'teal', w: 9, d: 7 },
    { id: 'carpenter', name: "Corwin's Carpentry", roof: 'red',  w: 9, d: 7 },
    { id: 'clinic',  name: 'Clinic',               roof: 'teal', w: 8, d: 7 },
    { id: 'tavern',  name: 'The Bluebird',         roof: 'red',  w: 11, d: 9 },
    { id: 'home1',   name: '',                     roof: 'teal', w: 7, d: 6 },
    { id: 'home2',   name: '',                     roof: 'red',  w: 7, d: 6 }
  ];
  // shuffle with gen stream (Fisher-Yates)

    const j = randi('gen', 0, i);
    [shopDefs[i], shopDefs[j]] = [shopDefs[j], shopDefs[i]];
  }
  W.shops = [];
  let sx = townX - 36;
  for (const def of shopDefs) {
    W.shops.push(Object.assign({ x: sx + def.w / 2, z: -3.5 }, def));
    sx += def.w + 4;
  }
  W.gazebo = { x: townX, z: 16 };
  W.ranchGate = { x: townX + 42, z: pathZ };
  W.townRect = { x0: townX - 42, z0: -14, x1: townX + 46, z1: 26 };

  // ---- shore & ridge ----
  W.bench = { x: W.pool.x + 6, z: W.pool.z - 7 };
  W.dock = { x: W.pool.x - 2, z: W.pool.z - 5 };
  W.marker = { x: W.trailX, z: -62 };
  W.overlook = { x: W.trailX - 9, z: -70 };

  // ---- paths (painted + kept clear of trees) ----
  W.paths = [
    { pts: [{ x: W.gate.x, z: pathZ }, { x: townX - 38, z: pathZ }, { x: townX + 40, z: pathZ }], w: 3 },
    { pts: [{ x: townX, z: pathZ }, { x: townX, z: 16 }], w: 2.5 },                        // square
    { pts: [{ x: townX - 6, z: pathZ }, { x: W.pool.x + 2, z: W.pool.z - 8 }], w: 2 },     // shore trail
    { pts: [{ x: W.trailX + 4, z: pathZ }, { x: W.trailX, z: -30 }, { x: W.marker.x, z: W.marker.z + 3 }], w: 2 }, // ridge trail
    { pts: [{ x: W.house.x, z: W.house.z + 4 }, { x: W.house.x, z: fz0 + 3 }], w: 1.5 }    // porch
  ];

  // ---- walkability mask (1 = blocked) ----
  const MW = CONFIG.WORLD_W, MH = CONFIG.WORLD_H;
  const mask = new Uint8Array(MW * MH);
  const mi = (x, z) => (Math.floor(z) + 90) * MW + (Math.floor(x) + 120);
  const block = (x, z) => { if (x >= -120 && x < 120 && z >= -90 && z < 90) mask[mi(x, z)] = 1; };
  // world edges
  for (let x = -120; x < 120; x++) for (let z = -90; z < 90; z++) {
    if (x < -117 || x > 116 || z < -87 || z > 86) block(x, z);
  }
  // ridge face
  for (let x = -120; x < 120; x++) for (let z = -90; z < -74; z++) block(x, z);
  // river (skip bridge span)
  W.bridge = { x: 0, z: pathZ, w: 8 };
  for (let i = 0; i < W.river.length - 1; i++) {
    const a = W.river[i], b = W.river[i + 1];
    const steps = Math.ceil(Math.hypot(b.x - a.x, b.z - a.z));
    for (let s = 0; s <= steps; s++) {
      const x = lerp(a.x, b.x, s / steps), z = lerp(a.z, b.z, s / steps);
      if (Math.abs(z - pathZ) < 2.6) { W.bridge.x = x; continue; }   // bridge crossing

  };

  const nearPath = (x, z) => {
    for (const p of W.paths) {
      for (let i = 0; i < p.pts.length - 1; i++) {
        const a = p.pts[i], b = p.pts[i + 1];
        const l2 = dist2(a.x, a.z, b.x, b.z) || 1;
        let t = ((x - a.x) * (b.x - a.x) + (z - a.z) * (b.z - a.z)) / l2;
        t = clamp(t, 0, 1);
        if (dist2(x, z, lerp(a.x, b.x, t), lerp(a.z, b.z, t)) < 16) return true;
      }
    }
    return false;
  };
  const inRect = (r, x, z) => x > r.x0 && x < r.x1 && z > r.z0 && z < r.z1;
  W.trees = [];
  const treeTarget = 60 + randi('gen', 0, 15);
  for (let a = 0; a < 500 && W.trees.length < treeTarget; a++) {
    const x = -114 + rand('gen') * 228, z = -72 + rand('gen') * (W.coastal ? 140 : 152);
    if (inRect(W.farmRect, x, z) || inRect(W.townRect, x, z)) continue;
    if (!W.walkable(x, z) || nearPath(x, z)) continue;
    if (dist2(x, z, W.pool.x, W.pool.z) < 200) continue;
    if (dist2(x, z, W.marker.x, W.marker.z) < 40) continue;
    let ok = true;
    for (const t of W.trees) if (dist2(x, z, t.x, t.z) < 22) { ok = false; break; }
    if (!ok) continue;
    W.trees.push({ x, z, kind: rand('gen') < 0.6 ? 'round' : 'pine', s: 0.85 + rand('gen') * 0.4 });
  }
  for (const t of W.trees) W.circles.push({ x: t.x, z: t.z, r: 0.7 });

  // ---- forage spot anchors (per-day spawns pick from these) ----
  W.forageSpots = [];
  for (let a = 0; a < 400 && W.forageSpots.length < 26; a++) {
    const x = -110 + rand('gen') * 220, z = -70 + rand('gen') * 138;
    if (inRect(W.farmRect, x, z) || inRect(W.townRect, x, z)) continue;
    if (!W.walkable(x, z) || nearPath(x, z)) continue;
    let ok = true;
    for (const f of W.forageSpots) if (dist2(x, z, f.x, f.z) < 60) { ok = false; break; }
    for (const t of W.trees) if (dist2(x, z, t.x, t.z) < 4) { ok = false; break; }
    if (ok) W.forageSpots.push({ x, z });
  }

  // ---- farm tiles ----
  W.tiles = [];
  const sx0 = Math.floor(CONFIG.FIELD_W / 2 - CONFIG.STARTER / 2);
  for (let tz = 0; tz < CONFIG.FIELD_H; tz++) {
    for (let tx = 0; tx < CONFIG.FIELD_W; tx++) {
      const starter = tx >= sx0 && tx < sx0 + CONFIG.STARTER && tz < CONFIG.STARTER;
      let t;
      if (starter) t = { s: 'clear', obj: null };
      else {
        const r = rand('gen');
        let obj = null;
        if (r < 0.42) obj = 'weed';
        else if (r < 0.55) obj = 'rock';
        else if (r < 0.63) obj = 'stump';
        else if (r < 0.655) obj = 'boulder';
        else if (r < 0.68) obj = 'log';
        t = obj ? { s: 'wild', obj } : { s: 'clear', obj: null };
      }
      t.crop = null; t.stage = 0; t.grown = 0; t.watered = false; t.dry = 0; t.dead = false;
      W.tiles.push(t);
    }
  }

  // static colliders (buildings & props) are registered during scene build
  return W;
}

function zoneAt(x, z) {
  const W = G.world;
  if (!W) return 'wild';
  if (x > W.farmRect.x0 && x < W.farmRect.x1 && z > W.farmRect.z0 && z < W.farmRect.z1) return 'farm';
  if (x > W.townRect.x0 && x < W.townRect.x1 && z > W.townRect.z0 && z < W.townRect.z1) return 'town';
  return 'wild';
}

function tileAt(wx, wz) {

  const tx = Math.floor(wx) - f.x0, tz = Math.floor(wz) - f.z0;
  if (tx < 0 || tx >= f.w || tz < 0 || tz >= f.h) return null;
  return { t: W.tiles[tz * f.w + tx], tx, tz, idx: tz * f.w + tx };
}

function getWeather(dayIndex) {
  const season = seasonOf(dayIndex);
  const r = calendarDay(dayIndex).r();
  if (season === 'Winter') return r < 0.45 ? 'snow' : 'sun';
  if (season === 'Autumn') return r < 0.25 ? 'rain' : (r < 0.45 ? 'cloud' : 'sun');
  if (season === 'Spring') return r < 0.3 ? 'rain' : 'sun';
  return r < 0.15 ? 'rain' : 'sun';
}
// Year 1 is authored: day 2 (fair) and day 6 (Starlight) must be clear.
function weatherFor(dayIndex) {
  if (dayIndex === 7 || dayIndex === 11) return seasonOf(dayIndex) === 'Winter' ? 'sun' : 'cloud';
  return getWeather(dayIndex);
}

function forageForDay(dayIndex) {
  const season = seasonOf(dayIndex);
  const table = CONFIG.FORAGE[season] || [];
  if (!table.length) return [];
  const cal = calendarDay(dayIndex ^ 0x0F0);
  const spots = G.world.forageSpots.slice();
  const out = [];
  for (let i = 0; i < CONFIG.FORAGE_PER_DAY && spots.length; i++) {
    const si = Math.floor(cal.r() * spots.length);
    const spot = spots.splice(si, 1)[0];
    const item = table[Math.floor(cal.r() * table.length)];
    out.push({ x: spot.x, z: spot.z, item });
  }

}

function paintGround(season) {

    ctx.fillRect(Math.floor(rand('live') * 480), Math.floor(rand('live') * 360), 1, 1);
  }

    ctx.fillStyle = 'rgba(238,242,240,0.55)';
    for (let i = 0; i < 70; i++) {
      const x = rand('live') * 480, y = rand('live') * 360, r = 5 + rand('live') * 18;

    let t = ((x - a.x) * (b.x - a.x) + (z - a.z) * (b.z - a.z)) / l2;

    if (dist2(x, z, lerp(a.x, b.x, t), lerp(a.z, b.z, t)) < (W.riverW / 2 - 0.4) ** 2) return true;

  R.scene.fog = new THREE.Fog(new THREE.Color(P.sky), 55, 140);
  const aspect = CONFIG.VIEW_W / CONFIG.VIEW_H;
  R.camera = new THREE.OrthographicCamera(-R.viewH * aspect / 2, R.viewH * aspect / 2,
    R.viewH / 2, -R.viewH / 2, 0.1, 200);
  R.ambient = new THREE.AmbientLight(0xffffff, 0.78);
  R.scene.add(R.ambient);
  R.dir = new THREE.DirectionalLight(0xfff4e0, 0.55);
  R.scene.add(R.dir); R.scene.add(R.dir.target);
}

function setFrustum(h) {
  const aspect = CONFIG.VIEW_W / CONFIG.VIEW_H;
  R.camera.left = -h * aspect / 2; R.camera.right = h * aspect / 2;
  R.camera.top = h / 2; R.camera.bottom = -h / 2;
  R.camera.updateProjectionMatrix();
}

function updateCamera(px, pz, snap) {
  const dx = px - R.followX, dz = pz - R.followZ;
  const d = Math.hypot(dx, dz);
  if (snap) { R.followX = px; R.followZ = pz; }
  else if (d > CONFIG.CAM_DEADZONE) {
    R.followX += dx * CONFIG.CAM_LERP; R.followZ += dz * CONFIG.CAM_LERP;
  }
  const zone = zoneAt(px, pz);
  R.viewHTarget = CONFIG.ZONE_HEIGHT[zone] || CONFIG.ZONE_HEIGHT.wild;
  R.viewH = lerp(R.viewH, R.viewHTarget, CONFIG.ZONE_EASE);
  setFrustum(R.viewH);
  const o = CONFIG.CAM_OFFSET;
  R.camera.position.set(R.followX + o.x, o.y, R.followZ + o.z);
  R.camera.lookAt(R.followX, 0, R.followZ);
  // the clay secret: headlamp light rides the camera, target rides the look-at
  R.dir.position.copy(R.camera.position);
  R.dir.target.position.set(R.followX, 0, R.followZ);
  R.dir.target.updateMatrixWorld();
}

const MAT = {};
function lambert(color) { return new THREE.MeshLambertMaterial({ color }); }
function buildMaterials() {
  const P = CONFIG.PALETTE;
  MAT.wood = lambert(P.wood); MAT.woodDark = lambert('#8a6244');
  MAT.roofRed = lambert(P.roofRed); MAT.roofTeal = lambert(P.roofTeal);

  MAT.door = lambert('#6b4a30');

}

function addBlob(parent, x, z, s, opacity) {
  const m = new THREE.Mesh(new THREE.PlaneGeometry(s, s * 0.8),
    new THREE.MeshBasicMaterial({ map: TEX.blob, transparent: true, depthWrite: false, opacity: opacity || 1 }));
  m.rotation.x = -Math.PI / 2; m.position.set(x, 0.008, z);
  parent.add(m);
  return m;
}
function registerBox(x, z, hw, hd) { G.world.colliders.push({ x, z, hw, hd }); }

function makeRoof(w, d, h, mat) {
  const shape = new THREE.Shape();
  shape.moveTo(-d / 2, 0); shape.lineTo(d / 2, 0); shape.lineTo(0, h); shape.closePath();
  const geo = new THREE.ExtrudeGeometry(shape, { depth: w, bevelEnabled: false });
  geo.translate(0, 0, -w / 2);
  geo.rotateY(Math.PI / 2);
  return new THREE.Mesh(geo, mat);
}

/* ---- instanced farm-tile overlays & crops ---- */
const TL = { layers: {}, dirty: true, group: null };
function cropVisualStage(t) {
  const days = CONFIG.CROPS[t.crop].days;
  if (t.grown >= days) return 3;
  if (t.grown === 0) return 0;
  return t.grown / days >= 0.5 ? 2 : 1;
}
function buildTileLayers(parent) {
  TL.layers = {}; TL.dirty = true;
  const cap = CONFIG.FIELD_W * CONFIG.FIELD_H;
  const planeGeo = new THREE.PlaneGeometry(0.96, 0.96);
  const mk = (name, geo, mat, capacity) => {
    const im = new THREE.InstancedMesh(geo, mat, capacity || cap);
    im.count = 0; im.frustumCulled = false; parent.add(im);
    TL.layers[name] = im;
    return im;
  };
  const flat = tex => new THREE.MeshLambertMaterial({ map: tex });
  mk('clear', planeGeo, flat(TEX.cleared));
  mk('till', planeGeo, flat(TEX.tilled));
  mk('water', planeGeo, flat(TEX.watered));
  mk('weed', new THREE.PlaneGeometry(0.8, 0.8),
    new THREE.MeshLambertMaterial({ map: TEX.weed, transparent: true, side: THREE.DoubleSide }));
  mk('rock', new THREE.DodecahedronGeometry(0.32, 0), MAT.stone);
  mk('stump', new THREE.CylinderGeometry(0.34, 0.42, 0.5, 8), MAT.trunk);
  mk('boulder', new THREE.DodecahedronGeometry(0.62, 0), MAT.stone);
  mk('log', new THREE.CylinderGeometry(0.3, 0.3, 1.4, 8), MAT.trunk);
  mk('dead', new THREE.ConeGeometry(0.16, 0.4, 5), lambert('#8C8474'));
  const sproutMat = lambert('#5E8A55');
  mk('crop0', new THREE.SphereGeometry(0.08, 6, 5), sproutMat);
  mk('crop1', new THREE.ConeGeometry(0.13, 0.38, 6), sproutMat);
  mk('crop2', new THREE.ConeGeometry(0.18, 0.6, 6), lambert('#4E7A48'));
  for (const id in CONFIG.CROPS) {
    mk('ripe_' + id, new THREE.SphereGeometry(0.24, 8, 6), lambert(CONFIG.CROPS[id].color));
  }
}
const tlDummy = new THREE.Object3D();
function rebuildTiles() {
  if (!TL.dirty) return;
  TL.dirty = false;
  const W = G.world, f = W.field;
  const counts = {};
  const put = (layer, x, y, z, ry) => {
    const im = TL.layers[layer];
    const i = counts[layer] = (counts[layer] || 0);
    tlDummy.position.set(x, y, z);
    tlDummy.rotation.set(layer === 'clear' || layer === 'till' || layer === 'water' ? -Math.PI / 2 : 0, ry || 0, 0);
    if (layer === 'log') tlDummy.rotation.set(0, 0.4, Math.PI / 2);
    tlDummy.scale.set(1, 1, 1);
    tlDummy.updateMatrix();
    im.setMatrixAt(i, tlDummy.matrix);
    counts[layer] = i + 1;
  };
  for (let tz = 0; tz < f.h; tz++) for (let tx = 0; tx < f.w; tx++) {
    const t = W.tiles[tz * f.w + tx];
    const x = f.x0 + tx + 0.5, z = f.z0 + tz + 0.5;
    if (t.s === 'clear') put('clear', x, 0.012, z);
    if (t.s === 'till') put(t.watered ? 'water' : 'till', x, 0.014, z);
    if (t.obj === 'weed') { put('weed', x, 0.4, z, 0.3); put('weed', x, 0.4, z, 1.87); }
    else if (t.obj) put(t.obj, x, t.obj === 'rock' ? 0.2 : 0.25, z);
    if (t.crop && !t.dead) {
      const vs = cropVisualStage(t);
      if (vs === 3) put('ripe_' + t.crop, x, 0.3, z);
      else put('crop' + vs, x, vs === 0 ? 0.08 : 0.2, z);
    }
    if (t.crop && t.dead) put('dead', x, 0.2, z);
  }
  for (const name in TL.layers) {
    TL.layers[name].count = counts[name] || 0;
    TL.layers[name].instanceMatrix.needsUpdate = true;
  }
}

/* ---- weather particles (rain / snow) ---- */
function buildParticles(parent) {
  const n = 320;
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(n * 3);
  for (let i = 0; i < n; i++) {
    pos[i * 3] = (Math.random() - 0.5) * 40;
    pos[i * 3 + 1] = Math.random() * 16;
    pos[i * 3 + 2] = (Math.random() - 0.5) * 30;
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  const mat = new THREE.PointsMaterial({ color: 0xdde8f0, size: 0.14, transparent: true, opacity: 0.8 });
  R.particles = new THREE.Points(geo, mat);
  R.particles.visible = false; R.particles.frustumCulled = false;
  parent.add(R.particles);
}
function tickParticles(dt) {
  const p = R.particles;
  if (!p) return;
  const raining = G.weather === 'rain', snowing = G.weather === 'snow';
  p.visible = raining || snowing;
  if (!p.visible) return;
  p.material.size = snowing ? 0.18 : 0.1;
  p.material.color.set(snowing ? 0xf4f6f4 : 0xaCc4d4);
  const arr = p.geometry.attributes.position.array;
  const fall = snowing ? 2.2 : 16;
  for (let i = 0; i < arr.length; i += 3) {
    arr[i + 1] -= fall * dt;
    if (snowing) arr[i] += Math.sin((arr[i + 1] + i) * 0.8) * dt * 0.6;
    if (arr[i + 1] < 0) {
      arr[i + 1] = 14 + Math.random() * 3;
      arr[i] = (Math.random() - 0.5) * 40;
      arr[i + 2] = (Math.random() - 0.5) * 30;
    }
  }
  p.position.set(R.followX, 0, R.followZ);
  p.geometry.attributes.position.needsUpdate = true;
}

/* ---- day-grade overlays, window lights, sky ---- */
function applyGrade() {
  const season = seasonOf(G.day);
  const dusk = CONFIG.DUSK_HOUR[season], night = CONFIG.NIGHT_HOUR[season];
  const soft = $('gradeSoft'), mult = $('gradeMult');
  const P = CONFIG.PALETTE;
  let phase = 'day';
  if (G.hour >= night) phase = 'night';
  else if (G.hour >= dusk) phase = 'evening';
  if (phase === 'day') {
    soft.style.opacity = 0; mult.style.opacity = 0;
    R.ambient.intensity = 0.78;
    R.scene.background.set(G.weather === 'rain' || G.weather === 'cloud' ? '#A8BCC4' : P.sky);
  } else if (phase === 'evening') {
    soft.style.background = '#E8A87C'; soft.style.opacity = 0.5;
    mult.style.background = '#e0c0b0'; mult.style.opacity = 0.25;
    R.ambient.intensity = 0.72;
    R.scene.background.set('#D8B49A');
  } else {
    soft.style.background = '#8a94c0'; soft.style.opacity = 0.3;
    mult.style.background = '#4A5578'; mult.style.opacity = 0.42;
    R.ambient.intensity = 0.55;
    R.scene.background.set(P.skyNight);
  }
  R.scene.fog.color.copy(R.scene.background);
  // windows go emissive by texture swap at dusk
  const lit = phase !== 'day';
  for (const w of R.windowMeshes) {
    const want = lit ? TEX.windowLit : TEX.windowDark;
    if (w.material.map !== want) { w.material.map = want; w.material.needsUpdate = true; }
  }
  // Bramm's back-room light: lit on Restdays until the network frees him (day, too)
  if (R.backroomWindow) {
    const backLit = (!G.network.connected.general && isRestday(G.day)) || lit;
    const want = backLit ? TEX.windowLit : TEX.windowDark;
    if (R.backroomWindow.material.map !== want) {
      R.backroomWindow.material.map = want; R.backroomWindow.material.needsUpdate = true;
    }
  }
}

const ACTORS = {};   // id -> actor (player + present villagers)
function makeActor(id, rec, x, z) {

function removeActor(id) {

/* ---- collision ---- */
function positionFree(x, z, self) {
  const W = G.world;
  const r = 0.3;
  for (const s of [[-r, 0], [r, 0], [0, -r], [0, r]]) {
    if (!W.walkable(x + s[0], z + s[1])) return false;
  }
  for (const c of W.colliders) {
    if (Math.abs(x - c.x) < c.hw + r && Math.abs(z - c.z) < c.hd + r) return false;
  }
  for (const c of W.circles) {
    if (dist2(x, z, c.x, c.z) < (c.r + r) * (c.r + r)) return false;
  }
  return true;
}
function moveActor(a, dx, dz, dt) {
  let moved = false;
  const nx = a.x + dx * a.speed * dt;
  if (positionFree(nx, a.z, a)) { a.x = nx; moved = true; }
  const nz = a.z + dz * a.speed * dt;
  if (positionFree(a.x, nz, a)) { a.z = nz; moved = true; }
  if (dx || dz) a.face = Math.atan2(dx, dz);
  a.group.position.set(a.x, a.group.position.y, a.z);
  a.group.rotation.y = a.face;
  return moved;
}
function tickActorAnim(a, dt, walking) {
  const swing = [0, 1, 0, -1];
  if (walking) {
    a.animT += dt;
    if (a.animT > 0.125) { a.animT = 0; a.animFrame = (a.animFrame + 1) % 4; }
  } else { a.animFrame = 0; }
  let s = swing[a.animFrame] * 0.55;
  // low-stamina slump (player only, diegetic tell)
  let slump = 0;
  if (a.id === 'player' && G.stamina <= CONFIG.SLUMP_AT) slump = 0.12;
  if (a.id === 'player' && G.stamina <= CONFIG.SWEAT_AT) slump = 0.2;
  const u = a.group.userData;
  u.legs[0].rotation.x = s; u.legs[1].rotation.x = -s;
  u.arms[0].rotation.x = -s * 0.8; u.arms[1].rotation.x = s * 0.8;
  a.group.rotation.x = slump * 0.5;
  if (a.hopT > 0) {                    // tool-use hop
    a.hopT -= dt;
    a.group.position.y = Math.max(0, Math.sin((1 - a.hopT / 0.18) * Math.PI) * 0.16);
    if (a.hopT <= 0) a.group.position.y = 0;
  }
}
// NPC waypoint walking (interpolated, never teleports)
function tickNPC(a, dt) {
  if (!a.waypoints.length) { tickActorAnim(a, dt, false); return; }
  const wp = a.waypoints[0];
  const dx = wp.x - a.x, dz = wp.z - a.z;
  const d = Math.hypot(dx, dz);
  if (d < 0.25) {
    a.waypoints.shift();
    if (wp.onArrive) wp.onArrive();
    tickActorAnim(a, dt, false);
    return;
  }
  const moved = moveActor(a, dx / d, dz / d, dt);
  if (!moved) {
    // slide along the obstacle: try both perpendiculars, keep whichever works
    a.slideDir = a.slideDir || 1;
    if (!moveActor(a, -dz / d * a.slideDir, dx / d * a.slideDir, dt)) {
      a.slideDir = -a.slideDir;
      moveActor(a, -dz / d * a.slideDir, dx / d * a.slideDir, dt);
    }
    a.face = Math.atan2(dx, dz);   // keep facing the goal while sliding
  } else a.slideDir = 1;
  tickActorAnim(a, dt, true);
}

/* ---- player ---- */
function playerRecipe() {
  return { skin: SKINS[G.look.skin % SKINS.length], hair: HAIRS[G.look.hair % HAIRS.length],
    shirt: SHIRTS[G.look.shirt % SHIRTS.length] };
}
function spawnPlayer(x, z) {
  removeActor('player');
  const p = makeActor('player', playerRecipe(), x, z);
  p.speed = CONFIG.PLAYER_SPEED;
  return p;
}
function player() { return ACTORS.player; }

function facingVector() {
  const p = player();
  return { x: Math.sin(p.face), z: Math.cos(p.face) };
}
function targetTilePos() {
  const p = player(), fv = facingVector();
  return { x: Math.floor(p.x + fv.x * 0.9) + 0.5, z: Math.floor(p.z + fv.z * 0.9) + 0.5 };
}

/* ---- what does the smart button do right now? ---- */
function findAction() {
  const p = player(), fv = facingVector();
  const W = G.world;
  const fx = p.x + fv.x * 0.9, fz = p.z + fv.z * 0.9;
  // villager in front
  let best = null, bestD = CONFIG.INTERACT_DIST ** 2;
  for (const id in ACTORS) {
    if (id === 'player') continue;
    const a = ACTORS[id];
    if (!a.visible) continue;
    const d = dist2(p.x, p.z, a.x, a.z);
    if (d < bestD) { best = a; bestD = d; }
  }
  if (best) return { type: 'talk', npc: best };
  // forage
  for (const f of FORAGE_LIVE) {
    if (dist2(p.x, p.z, f.x, f.z) < 2.6) return { type: 'forage', f };
  }
  // bin / mailbox / doors
  if (dist2(p.x, p.z, W.bin.x, W.bin.z) < 4.4) return { type: 'bin' };
  if (dist2(p.x, p.z, W.mailbox.x, W.mailbox.z) < 3.2) return { type: 'mail' };
  for (const d of W.doors) {
    if (dist2(p.x, p.z, d.x, d.z) < 3.2) return { type: 'door', door: d };
  }
  // farm tile
  const tt = tileAt(fx, fz);
  if (tt) return { type: 'tile', tt };
  return null;
}

function updateTargetHighlight(time) {
  const p = player();
  if (!p || !R.target) return;
  const act = findAction();
  const tp = targetTilePos();
  const onField = tileAt(tp.x, tp.z);
  const show = G.mode === 'play' && !G.uiOpen && onField;
  R.target.visible = !!show;
  if (show) {
    R.target.position.x = tp.x; R.target.position.z = tp.z;
    R.target.material.opacity = 0.18 + Math.sin(time * 2.4) * 0.08;
    let valid = true;
    if (onField) {
      const t = onField.t;
      if (t.obj === 'boulder' || t.obj === 'log') valid = false;   // tool-gated year 1
    }
    R.target.material.color.set(valid ? 0xffffff : 0xE07060);
  }
  return act;
}

/* ================================ AUDIO ================================== */
const AU = { ctx: null, vol: 0.5 };
function audioCtx() {
  if (!AU.ctx) { try { AU.ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} }
  return AU.ctx;
}
function sfx(name) {
  const ctx = audioCtx();
  if (!ctx || AU.vol <= 0) return;
  const t = ctx.currentTime;
  const play = (type, f0, f1, dur, vol, delay) => {
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.type = type; o.frequency.setValueAtTime(f0, t + (delay || 0));
    o.frequency.linearRampToValueAtTime(f1, t + (delay || 0) + dur);
    g.gain.setValueAtTime(vol * AU.vol, t + (delay || 0));
    g.gain.exponentialRampToValueAtTime(0.001, t + (delay || 0) + dur);
    o.connect(g); g.connect(ctx.destination);
    o.start(t + (delay || 0)); o.stop(t + (delay || 0) + dur + 0.02);
  };
  switch (name) {
    case 'blip': play('square', 620, 660, 0.04, 0.06); break;
    case 'thud': play('sine', 130, 60, 0.14, 0.32); break;
    case 'plink': play('sine', 700, 380, 0.16, 0.16); break;
    case 'pick': play('sine', 520, 780, 0.1, 0.14); break;
    case 'creak': play('sawtooth', 180, 240, 0.2, 0.06); break;
    case 'coin': play('square', 880, 1180, 0.09, 0.1); play('square', 1180, 1560, 0.09, 0.08, 0.08); break;
    case 'kachunk': play('square', 220, 160, 0.07, 0.14); play('square', 140, 90, 0.1, 0.16, 0.09); break;
    case 'chime': play('sine', 780, 780, 0.3, 0.14); play('sine', 1170, 1170, 0.4, 0.12, 0.12); play('sine', 1560, 1560, 0.5, 0.09, 0.24); break;
    case 'sleep': play('sine', 440, 220, 0.5, 0.1); break;
  }
}

/* ============================== TIME & SIM =============================== */
function hoursPerSec() {
  const season = seasonOf(G.day);
  return 18 / (CONFIG.DAY_MINUTES[season] * 60);
}
function simPaused() {
  return G.mode !== 'play' || !!G.uiOpen;
}
function tickTime(dt) {
  if (simPaused()) return;
  G.hour += hoursPerSec() * dt;
  if (G.hour >= CONFIG.DAY_END) {
    G.hour = CONFIG.DAY_END - 0.01;
    passOut();
  }
}

function staminaFloor() { return G.day < 12 ? CONFIG.STAMINA_Y1_FLOOR : 0; }
function spendStamina(n) {
  G.stamina = Math.max(staminaFloor(), G.stamina - n);
}
function staminaWord() {
  if (G.stamina > 75) return 'Rested';
  if (G.stamina > 50) return 'Fine';
  if (G.stamina > 25) return 'Tired';
  return 'Exhausted';
}

function jline(line) { (G.dayFlags.journal = G.dayFlags.journal || []).push(line); }

/* ---- the sacred 6:00 rollover, in order ---- */
function rollover(newDay) {
  const prevDay = G.day;
  // 1. bin payout
  let binTotal = 0;
  const byEnterprise = {};
  for (const s of G.todayShipped) {
    binTotal += s.value;
    byEnterprise[s.enterprise] = (byEnterprise[s.enterprise] || 0) + s.value;
  }
  if (binTotal > 0) {
    if (G.network.connected.general) {
      G.money += binTotal;
      for (const e in byEnterprise) G.ledger.entries.push({ day: prevDay, amount: byEnterprise[e], enterprise: e, note: 'Shipment (settled instantly)' });
      G.dayFlags.settledInstant = binTotal;
      jline('The shipment settled overnight — $' + binTotal + ' in the account by sunup. Still not used to that.');
    } else {
      const arrive = prevDay + CONFIG.CHECK_LAG_DAYS;
      G.pendingChecks.push({ amount: binTotal, arriveDay: arrive, label: 'Shipment check', enterprises: byEnterprise });
      G.dayFlags.checkMailed = { amount: binTotal, arrive };
      jline('Shipped $' + binTotal + ' worth. The check is in the mail — two days, they say.');
    }
  }
  G.todayShipped = [];
  // 2. check-mail processing
  const arrived = [];
  G.pendingChecks = G.pendingChecks.filter(c => {
    if (c.arriveDay <= newDay) { arrived.push(c); return false; }
    return true;
  });
  for (const c of arrived) {
    G.money += c.amount;
    for (const e in (c.enterprises || {})) G.ledger.entries.push({ day: newDay, amount: c.enterprises[e], enterprise: e, note: 'Check arrived' });
    G.mail.push({ day: newDay, from: 'Valley Post', title: 'A check for $' + c.amount,
      body: 'Your ' + c.label.toLowerCase() + ' for $' + c.amount + ' has cleared. Thank you for your patience.', read: false });
    G.flags.lastCheckAmount = c.amount;
  }
  // 3. crop growth
  for (const t of G.world.tiles) {
    if (!t.crop || t.dead) continue;
    const c = CONFIG.CROPS[t.crop];
    if (t.watered) { t.grown = Math.min(c.days, t.grown + 1); t.dry = 0; }
    else if (t.grown < c.days) {
      t.dry++;
      if (t.dry >= 2) { t.dead = true; G.dayFlags.cropDied = true; }
    }
  }
  // 4. watered flags clear (unless rain)
  const newWeather = weatherFor(newDay);
  for (const t of G.world.tiles) {
    t.watered = newWeather === 'rain';
  }
  // 5. weather
  G.weather = newWeather;
  // 6-7. respawns + villager schedules  (story hook places the cast)
  // 8. mail / festival / arc flags       (story hook)
  // 9. contract fulfillment — phase 3
  const seasonChanged = seasonOf(newDay) !== seasonOf(prevDay);
  G.day = newDay;
  G.hour = CONFIG.DAY_START;
  G.stamina = G.collapsedYesterday ? 62 : 100;
  G.collapsedYesterday = false;
  if (seasonChanged) { paintGround(seasonOf(newDay)); }
  TL.dirty = true;
  // 10. autosave (in-memory slot)
  G.autosave = saveEncode();
  // 11. yesterday's Journal entry finalizes
  finalizeJournal(prevDay);
  G.dayFlags = {};
  spawnForage();
  updateHUD();
}

function finalizeJournal(day) {
  const lines = (G.dayFlags.journal || []).slice();
  if (G.dayFlags.cropDied) lines.push('Lost a seedling to dry soil. Two days without water is one too many.');
  if (!lines.length) lines.push('A quiet day. The valley keeps its own time.');
  const season = seasonOf(day), dos = dayOfSeason(day);
  G.journal.push({ day, header: season + ' ' + dos + (isRestday(day) ? ' · Restday' : '') + ', Year ' + yearOf(day), lines });
}

/* ---- sleep & collapse ---- */
function passOut() {
  if (G.mode !== 'play') return;
  G.collapsedYesterday = true;

/* ---- tile & world actions (the smart button) ---- */
function performAction() {
  const act = findAction();
  if (!act) return;
  const p = player();
  switch (act.type) {
    case 'talk': STORY.talkTo(act.npc); break;
    case 'forage': {
      const f = act.f;
      addItem(f.item.id, 1);
      G.dayFlags['picked_' + Math.round(f.x) + '_' + Math.round(f.z)] = true;
      R.worldGroup.remove(f.mesh);
      FORAGE_LIVE.splice(FORAGE_LIVE.indexOf(f), 1);
      sfx('pick');
      toast('Picked ' + f.item.name);
      if (!G.flags.firstForage) { G.flags.firstForage = true; jline('Found ' + f.item.name.toLowerCase() + ' growing wild. The valley feeds you, if you look.'); }
      break;
    }
    case 'bin': shipHeld(); break;
    case 'mail': openMail(); break;
    case 'door': STORY.enterDoor(act.door); break;
    case 'tile': doTileAction(act.tt); break;
  }
}
function hop() { const p = player(); p.hopT = 0.18; }

function doTileAction(tt) {
  const t = tt.t;
  const held = G.heldItem;
  const heldSeed = held && ITEMS[held] && ITEMS[held].seedOf;
  if (t.obj === 'weed') { t.obj = null; if (t.s === 'wild') t.s = 'clear'; spendStamina(CONFIG.STAMINA_COST.sickle); hop(); sfx('thud'); firstClear(); }
  else if (t.obj === 'rock') { t.obj = null; if (t.s === 'wild') t.s = 'clear'; spendStamina(CONFIG.STAMINA_COST.hammer); hop(); sfx('thud'); firstClear(); }
  else if (t.obj === 'stump') { t.obj = null; if (t.s === 'wild') t.s = 'clear'; spendStamina(CONFIG.STAMINA_COST.axe); hop(); sfx('thud'); firstClear(); }
  else if (t.obj === 'boulder' || t.obj === 'log') { toast('Too big for your tools — Hetta could help, come spring.'); return; }
  else if (t.crop && t.dead) { t.crop = null; t.grown = 0; t.dead = false; hop(); sfx('thud'); toast('Cleared the withered plant.'); }
  else if (t.crop && cropVisualStage(t) === 3) {
    addItem(t.crop, 1); t.crop = null; t.grown = 0;
    hop(); sfx('pick');
    G.dayFlags.harvested = (G.dayFlags.harvested || 0) + 1;
    if (!G.flags.firstHarvest) { G.flags.firstHarvest = true; jline('First harvest. They’re small and a little lopsided and I grew them.'); }
  }
  else if (t.crop) { t.watered = true; spendStamina(CONFIG.STAMINA_COST.can); hop(); sfx('plink'); }
  else if (t.s === 'till' && heldSeed) {
    const crop = CONFIG.CROPS[heldSeed];
    if (!crop.seasons.includes(seasonOf(G.day))) { toast('Not the season for ' + crop.name.toLowerCase() + '.'); return; }
    if (!takeItem(held, 1)) return;
    t.crop = heldSeed; t.grown = 0; t.dead = false; t.dry = 0;
    if (G.weather === 'rain') t.watered = true;
    hop(); sfx('plink');
    if (!G.flags.firstPlant) { G.flags.firstPlant = true; jline('Put the first seeds in the ground. Now we both wait.'); }
  }
  else if (t.s === 'till') { t.watered = true; spendStamina(CONFIG.STAMINA_COST.can); hop(); sfx('plink'); }
  else if (t.s === 'clear') { t.s = 'till'; spendStamina(CONFIG.STAMINA_COST.hoe); hop(); sfx('thud'); }
  TL.dirty = true;
  STORY.checkObjectives();
}
function firstClear() {
  if (!G.flags.firstClear) { G.flags.firstClear = true; jline('Cleared the first stretch of the field. The land remembers being a farm.'); }
}

function shipHeld() {
  const held = G.heldItem;
  if (!held || !ITEMS[held] || !ITEMS[held].sell) { toast('Hold something sellable to ship it.'); return; }
  const n = G.inventory[held] || 0;
  if (!n) return;
  const item = ITEMS[held];
  const value = item.sell * n;
  G.todayShipped.push({ id: held, name: item.name, count: n, value, enterprise: item.enterprise });
  takeItem(held, n);
  sfx('creak');
  if (G.network.connected.general) toast('Shipped ' + n + '× ' + item.name + ' — $' + value + ' settles tonight.');
  else toast('Shipped ' + n + '× ' + item.name + ' — check for $' + value + ' in ' + CONFIG.CHECK_LAG_DAYS + ' days.');
  G.dayFlags.shippedAny = true;
  STORY.checkObjectives();
}

function spend(amount, enterprise, note) {
  if (G.money < amount) return false;
  G.money -= amount;
  G.ledger.entries.push({ day: G.day, amount: -amount, enterprise: enterprise || 'Supplies', note: note || '' });
  updateHUD();
  return true;
}

/* ================================ SAVE =================================== */
function saveEncode() {
  const tiles = G.world.tiles.map(t =>
    [t.s === 'wild' ? 0 : t.s === 'clear' ? 1 : 2, t.obj || '', t.crop || '', t.grown, t.watered ? 1 : 0, t.dry, t.dead ? 1 : 0].join('.'));
  const data = {
    v: 1, seed: G.world.seed, day: G.day, hour: Math.min(G.hour, 23),
    money: G.money, stamina: G.stamina,
    inv: G.inventory, held: G.heldItem, checks: G.pendingChecks,
    shipped: G.todayShipped, mail: G.mail, journal: G.journal,
    flags: G.flags, ledger: G.ledger, network: G.network,
    farmName: G.farmName, playerName: G.playerName, look: G.look,
    hearts: G.hearts, tiles
  };
  return b64encode(JSON.stringify(data));
}
function saveDecode(code) {
  const data = JSON.parse(b64decode(code.trim()));
  if (!data || data.v !== 1) throw new Error('bad save');
  return data;
}
function applySave(data) {
  G.world = generateWorld(data.seed);
  const OBJS = { '': null };
  data.tiles.forEach((s, i) => {
    const [st, obj, crop, grown, watered, dry, dead] = s.split('.');
    const t = G.world.tiles[i];
    t.s = st === '0' ? 'wild' : st === '1' ? 'clear' : 'till';
    t.obj = obj || null; t.crop = crop || null;
    t.grown = +grown; t.watered = watered === '1'; t.dry = +dry; t.dead = dead === '1';
  });
  G.day = data.day; G.hour = data.hour; G.money = data.money; G.stamina = data.stamina;
  G.inventory = data.inv || {}; G.heldItem = data.held;
  G.pendingChecks = data.checks || []; G.todayShipped = data.shipped || [];
  G.mail = data.mail || []; G.journal = data.journal || [];
  G.flags = data.flags || {}; G.ledger = data.ledger || { unlocked: false, entries: [] };
  G.network = data.network || { connected: {} };
  G.farmName = data.farmName; G.playerName = data.playerName; G.look = data.look || G.look;
  G.hearts = data.hearts || {};
  G.weather = weatherFor(G.day);
  location.hash = '#s=' + data.seed;
  buildWorldScene();
  for (const id in ACTORS) removeActor(id);
  const W = G.world;
  spawnPlayer(W.house.x, W.house.z + W.house.d / 2 + 1.6);
  STORY.onDayStart(G.day, true);
  spawnForage();
  updateCamera(player().x, player().z, true);
  applyGrade();
  if (R.glyphs.general) R.glyphs.general.visible = !!G.network.connected.general;
  updateHUD();
  G.mode = 'play';
}
function downloadSave() {
  const code = saveEncode();
  const blob = new Blob([code], { type: 'application/octet-stream' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = (G.farmName || 'almanac').replace(/\s+/g, '_').toLowerCase() + '_y' + yearOf(G.day) + '.almanac';
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 2000);
}

/* ---- portraits: layered-shape busts (placeholder fidelity for phase 1) ---- */
function drawPortrait(rec) {
  const c = $('dlgPortrait'), ctx = c.getContext('2d');
  ctx.clearRect(0, 0, 84, 84);
  ctx.fillStyle = '#E8DFC4'; ctx.fillRect(0, 0, 84, 84);
  ctx.fillStyle = rec.shirt;
  ctx.beginPath(); ctx.ellipse(42, 84, 30, 26, 0, Math.PI, 0); ctx.fill();
  ctx.fillStyle = rec.skin;
  ctx.beginPath(); ctx.arc(42, 42, 24, 0, 7); ctx.fill();
  ctx.fillStyle = rec.hair;
  ctx.beginPath(); ctx.arc(42, 36, 26, Math.PI * 1.05, Math.PI * 1.95); ctx.fill();
  if (rec.long) { ctx.fillRect(16, 36, 8, 30); ctx.fillRect(60, 36, 8, 30); }
  if (rec.hat) {
    ctx.fillStyle = rec.hat;
    ctx.fillRect(14, 18, 56, 8); ctx.fillRect(26, 6, 32, 14);
  }
  ctx.fillStyle = '#2E2620';
  ctx.beginPath(); ctx.arc(34, 44, 2.6, 0, 7); ctx.arc(50, 44, 2.6, 0, 7); ctx.fill();
}

/* ---- dialogue (typewriter + blip) ---- */
const DLG = { queue: [], active: false, revealing: false, txt: '', shown: 0, cb: null, timer: null };
function say(lines, cb) {
  for (const l of lines) DLG.queue.push(typeof l === 'string' ? { who: '', text: l } : l);
  DLG.cb = cb || DLG.cb;
  if (!DLG.active) nextDialogue();
}
function nextDialogue() {
  if (!DLG.queue.length) {
    DLG.active = false;
    $('dlg').style.display = 'none';
    if (G.uiOpen === 'dialogue') G.uiOpen = null;
    const cb = DLG.cb; DLG.cb = null;
    if (cb) cb();
    return;
  }
  DLG.active = true;
  if (!G.uiOpen) G.uiOpen = 'dialogue';
  const line = DLG.queue.shift();
  const rec = line.who && CAST[line.who];
  $('dlgName').textContent = rec ? rec.name : (line.who === 'player' ? G.playerName : '');
  $('dlgPortrait').style.display = rec ? 'block' : 'none';
  if (rec) drawPortrait(rec);
  DLG.txt = line.text; DLG.shown = 0; DLG.revealing = true;
  $('dlg').style.display = 'block';
  $('dlgText').textContent = '';
  clearInterval(DLG.timer);
  DLG.timer = setInterval(() => {
    DLG.shown += 2;
    $('dlgText').textContent = DLG.txt.slice(0, DLG.shown);
    if (DLG.shown % 6 < 2) sfx('blip');
    if (DLG.shown >= DLG.txt.length) { DLG.revealing = false; clearInterval(DLG.timer); }
  }, 24);
}
function advanceDialogue() {
  if (!DLG.active) return;
  if (DLG.revealing) {
    clearInterval(DLG.timer); DLG.revealing = false;
    $('dlgText').textContent = DLG.txt;
  } else nextDialogue();
}

/* ---- radial ring (hold E) ---- */
const RAD = { open: false, items: [], sel: -1 };
function openRadial() {
  const items = [{ id: null, icon: '✋', name: 'Hands' }];
  for (const id in G.inventory) {
    if (ITEMS[id]) items.push({ id, icon: ITEMS[id].icon, name: ITEMS[id].name });
    if (items.length >= 9) break;
  }
  RAD.open = true; RAD.items = items; RAD.sel = -1;
  G.uiOpen = 'radial';
  const box = $('radial');
  clearEl(box); box.style.display = 'block';
  const ui = $('ui');
  const cx = ui.clientWidth / 2, cy = ui.clientHeight / 2, r = Math.min(cx, cy) * 0.4;
  box.style.left = cx + 'px'; box.style.top = cy + 'px';
  items.forEach((it, i) => {
    const a = i / items.length * Math.PI * 2 - Math.PI / 2;
    const d = el('div', 'radItem', it.icon);
    d.style.left = Math.cos(a) * r + 'px';
    d.style.top = Math.sin(a) * r + 'px';
    d.appendChild(el('div', 'radLbl', it.name));
    box.appendChild(d);
  });
}
function radialAim(dx, dz) {
  if (!RAD.open || (!dx && !dz)) return;
  const ang = Math.atan2(dz, dx) + Math.PI / 2;
  let best = 0, bd = 99;
  RAD.items.forEach((it, i) => {
    const a = i / RAD.items.length * Math.PI * 2;
    const diff = Math.abs(((ang - a) % (Math.PI * 2) + Math.PI * 3) % (Math.PI * 2) - Math.PI);
    if (diff < bd) { bd = diff; best = i; }
  });
  if (best !== RAD.sel) {
    RAD.sel = best;
    [...$('radial').children].forEach((c, i) => c.classList.toggle('sel', i === best));
    sfx('blip');
  }
}
function closeRadial(select) {
  if (!RAD.open) return;
  if (select && RAD.sel >= 0) { G.heldItem = RAD.items[RAD.sel].id; updateHUD(); }
  RAD.open = false;
  $('radial').style.display = 'none';
  if (G.uiOpen === 'radial') G.uiOpen = null;
}

  ctx.beginPath(); ctx.ellipse(wc(W.pool.x), zc(W.pool.z), W.pool.r * 2, W.pool.r * 1.8, 0, 0, 7); ctx.fill();
  for (const p of W.paths) paintPathLine(ctx, p.pts, p.w * 0.8, P.path);

  let flip = false;

  for (const s of W.shops) if (s.name) dot(s.x, s.z, s.name.split(' ')[0], s.roof === 'teal' ? P.roofTeal : P.roofRed);
  dot(W.gazebo.x, W.gazebo.z, 'Square', P.wood);
  dot(W.bench.x, W.bench.z, 'The Shore', P.wood);
  dot(W.marker.x, W.marker.z, 'The Marker', P.stone);
  ctx.fillStyle = P.ink; ctx.font = 'bold 14px Trebuchet MS'; ctx.textAlign = 'center';

}

const KEYS = {};
let holdTimer = null, holdFired = false;
function inputVector() {
  let x = 0, z = 0;
  if (KEYS.KeyW || KEYS.ArrowUp) z -= 1;
  if (KEYS.KeyS || KEYS.ArrowDown) z += 1;
  if (KEYS.KeyA || KEYS.ArrowLeft) x -= 1;
  if (KEYS.KeyD || KEYS.ArrowRight) x += 1;
  x += TOUCH.x; z += TOUCH.z;

  return { x, z };

window.addEventListener('keydown', e => {
  if (e.repeat) { KEYS[e.code] = true; if (e.code === 'Tab') e.preventDefault(); return; }
  KEYS[e.code] = true;
  const ac = audioCtx(); ac && ac.resume && ac.resume();
  if (G.mode === 'title') { TITLE.onKey(e); return; }
  switch (e.code) {
    case 'KeyE': case 'Space': case 'Enter':
      if (document.activeElement && /INPUT|TEXTAREA/.test(document.activeElement.tagName)) break;
      pressAct(); e.preventDefault(); break;
    case 'Tab': e.preventDefault();

    case 'KeyJ': if (G.mode === 'play' && !G.uiOpen) openMenu('Journal'); break;

/* ---- touch ---- */
const TOUCH = { x: 0, z: 0, joyId: null };
function initTouch() {
  const base = $('joyBase'), knob = $('joyKnob');
  const setKnob = (dx, dz) => {
    knob.style.left = 32 + dx * 30 + 'px';
    knob.style.top = 32 + dz * 30 + 'px';
  };
  base.addEventListener('pointerdown', e => {
    TOUCH.joyId = e.pointerId; base.setPointerCapture(e.pointerId);
  });
  base.addEventListener('pointermove', e => {
    if (e.pointerId !== TOUCH.joyId) return;
    const r = base.getBoundingClientRect();
    let dx = (e.clientX - r.left - r.width / 2) / (r.width / 2);
    let dz = (e.clientY - r.top - r.height / 2) / (r.height / 2);
    const d = Math.hypot(dx, dz);
    if (d > 1) { dx /= d; dz /= d; }
    TOUCH.x = dx; TOUCH.z = dz;
    setKnob(dx, dz);
    if (RAD.open) radialAim(dx, dz);
  });
  const joyEnd = e => {
    if (e.pointerId !== TOUCH.joyId) return;
    TOUCH.joyId = null; TOUCH.x = 0; TOUCH.z = 0; setKnob(0, 0);
  };
  base.addEventListener('pointerup', joyEnd);
  base.addEventListener('pointercancel', joyEnd);
  $('actBtn').addEventListener('pointerdown', e => {
    e.preventDefault();
    const ac = audioCtx(); ac && ac.resume && ac.resume();
    pressAct();
  });
  $('actBtn').addEventListener('pointerup', e => { e.preventDefault(); releaseAct(); });
  $('menuBtn').addEventListener('pointerdown', e => {
    e.preventDefault();
    if (MENU.open) closeMenu();
    else if (G.mode === 'play' && !G.uiOpen) openMenu();
  });
}

// Year 1: the authored 6-day prologue (absolute days 6..11), then free Year 2.

const STORY = {
  objective: null, onCantAfford: null, onShopClosed: null,

  meet(id) {
    if (!(id in G.hearts)) { G.hearts[id] = 1; }
  },
  heart(id, n) {
    G.hearts[id] = clamp((G.hearts[id] || 0) + n, 0, 10);
  },

  /* ---- scene runner: walk / say / do, time frozen ---- */
  scene(steps, done) {
    G.mode = 'scene';
    let i = 0;
    const next = () => {
      if (i >= steps.length) {
        if (G.mode === 'scene') G.mode = 'play';   // a step may have started sleep
        done && done();
        return;
      }
      const s = steps[i++];
      if (s.say) say(s.say, next);
      else if (s.walk) {
        const a = ACTORS[s.walk.id];
        if (!a) { next(); return; }
        a.waypoints = [{ x: s.walk.x, z: s.walk.z, onArrive: next }];
      }
      else if (s.tp) {
        const a = ACTORS[s.tp.id];
        if (a) actorSetPos(a, s.tp.x, s.tp.z);
        next();
      }
      else if (s.face) {
        const a = ACTORS[s.face.id];
        if (a) { a.face = s.face.angle; a.group.rotation.y = s.face.angle; }
        next();
      }
      else if (s.fade) { fadeOut(() => { s.fade(); fadeIn(next); }); }
      else if (s.fn) { s.fn(); next(); }
      else if (s.wait) setTimeout(next, s.wait);
      else next();
    };
    next();
  },

        if (!fromLoad) say(['Starlight Eve tonight. And a Restday — though something feels different about the morning.']);
        // Bramm walks to the shore at ~9:00 (flag checked in tickStory)
        G.flags.brammShoreQueued = true;
        break;
      case 12:
        if (!G.flags.year2Card) {
          G.flags.year2Card = true;
          STORY.showYearReview();
          return;
        }
        break;
      default:
        if (day > 12) setObjective(null);
    }
  },

  /* ================= objectives ================= */
  countTiles(fn) { return G.world.tiles.filter(fn).length; },
  checkObjectives() {
    const day = G.day;
    if (day === 6) {
      const planted = STORY.countTiles(t => t.crop === 'turnip');
      const watered = STORY.countTiles(t => t.crop === 'turnip' && t.watered);
      if (G.flags.introDone && planted < 24) setObjective('Till the starter patch and plant your free turnips (hold E to pick seeds)');
      else if (planted >= 24 && watered < planted) setObjective('Water the turnips (face a planted tile, press E)');
      else if (planted >= 24) setObjective('Good work. Sleep when the light goes (farmhouse door, from 18:00)');
    } else if (day === 7) {
      const watered = STORY.countTiles(t => t.crop === 'turnip' && t.watered);
      if (watered >= 20) setObjective('Turnips watered. The Fair starts at noon — don’t be late');
    } else if (day === 8) {
      if (G.dayFlags.shippedAny) {
        setObjective('Shipped. The check comes in two days — Restday evening is yours');
        if (!G.flags.shippedLesson) {
          G.flags.shippedLesson = true;
          say(['The bin takes the turnips. A slip of carbon paper takes their place: "CHECK TO FOLLOW — ALLOW 2 DAYS."',
            'Two days. The seeds at Bramm’s want paying today, but sure — two days.']);
          jline('Shipped the turnip harvest. Payment is now a rumor with a postmark.');
        }
      }
    } else if (day === 10) {
      if (G.ledger.unlocked && !G.network.connected.general) setObjective('Take the ledger to Bramm’s General — Aldwin says he’s the pilot');
      if (G.network.connected.general && !G.flags.coatBought) setObjective('Buy the coat you couldn’t afford yesterday');
      if (G.flags.coatBought) setObjective('Warm at last. The evening is yours');
    } else if (day === 12) {
      if (G.flags.year2Started) {
        const bought = Object.keys(G.inventory).some(id => ITEMS[id] && ITEMS[id].seedOf && CONFIG.CROPS[ITEMS[id].seedOf].seasons.includes('Spring'));
        if (bought) setObjective('Your first spring. The field is yours — no script, just seasons');
      }
    }
  },

  /* ================= mid-day triggers (called every sim tick) ================= */
  tick() {
    const day = G.day, p = player();
    if (!p || G.mode !== 'play' || G.uiOpen) return;
    // Fair auto-start at noon, day 7
    if (day === 7 && G.hour >= 12 && !G.flags.fairDone) {
      G.flags.fairDone = true;
      STORY.runFair();
    }
    // Aldwin at the fence, day 9 (after the shop attempt, or 13:00 regardless)
    if (day === 9 && !G.flags.aldwinDone &&
        (G.flags.squeezeFelt || G.hour >= 13) &&
        zoneAt(p.x, p.z) === 'farm') {
      G.flags.aldwinDone = true;
      STORY.runAldwin();
    }
    // Ledger reveal after reading mail, day 10
    if (day === 10 && !G.ledger.unlocked && G.mail.some(m => m.day === 10 && m.read)) {
      STORY.runLedgerArrives();
    }
    // Bramm walks to the shore, day 11 morning
    if (day === 11 && G.flags.brammShoreQueued && G.hour >= 9) {
      G.flags.brammShoreQueued = false;
      STORY.runBrammShore();
    }
    // Starlight Eve at 18:00
    if (day === 11 && G.hour >= 18 && !G.flags.starlightDone) {
      G.flags.starlightDone = true;
      STORY.runStarlight();
    }
  },

  runLedgerArrives() {
    G.ledger.unlocked = true;
    // Tag year-to-date income so the mini-reveal has numbers to point at.
    const forage = G.ledger.entries.filter(e => e.enterprise === 'Foraging' && e.amount > 0).reduce((s, e) => s + e.amount, 0);
    const turnip = G.ledger.entries.filter(e => e.enterprise === 'Turnip' && e.amount > 0).reduce((s, e) => s + e.amount, 0);
    const lines = [
      'Inside the parcel: a green ledger book, cloth-bound, heavier than it looks. It smells like a bank and a barn at once.',
      'You copy in the season so far. The book sorts every dollar on its own — turnips here, foraged finds there, seeds in red.'
    ];
    if (forage > turnip) {
      lines.push('Huh. The wild mushrooms and walnuts out-earned the turnips. The turnips you watered every day. Nobody watered a walnut.');
    } else {
      lines.push('There it is in green and red: what the field made, what the pockets spent. The farm has a shape now.');
    }
    lines.push('Aldwin’s note, tucked in the flap: "Bramm agreed to pilot the network. Told me it was nonsense. Was holding the sign-up sheet while he said it. Go see him."');
    say(lines, () => {
      jline('The Ledger came. Green book, quiet authority. Foraging beat farming this season, which the turnips and I will not discuss further.');
      STORY.checkObjectives();
    });
  },

  showYearReview() {
    G.mode = 'scene';
    const card = $('yearCard');
    clearEl(card);
    card.style.display = 'block';
    card.appendChild(el('h2', null, 'Year 1 — ' + G.farmName));
    const body = el('div');
    body.id = 'yearBody';
    const by = {};
    for (const e of G.ledger.entries) by[e.enterprise] = (by[e.enterprise] || 0) + e.amount;
    const income = Object.keys(by).filter(k => by[k] > 0);
    const spendKeys = Object.keys(by).filter(k => by[k] < 0);
    body.appendChild(el('b', null, 'The Ledger says:'));
    for (const k of income) body.appendChild(el('div', null, '  ' + k + ': +$' + by[k]));
    for (const k of spendKeys) body.appendChild(el('div', null, '  ' + k + ': −$' + (-by[k])));
    const pend = G.pendingChecks.reduce((s, c) => s + c.amount, 0);
    if (pend) body.appendChild(el('div', null, '  Still in the mail: $' + pend));
    body.appendChild(el('br'));
    body.appendChild(el('b', null, 'The Journal remembers:'));
    const highlights = G.journal.slice(-6).map(e => e.lines[0]).filter(Boolean);
    for (const h of highlights) body.appendChild(el('div', null, '  · ' + h));
    card.appendChild(body);
    const btnJ = el('button', 'uiBtn', 'Export journal (.txt)');
    btnJ.onclick = exportJournal;
    card.appendChild(btnJ);
    const btn = el('button', 'uiBtn', 'Begin Year 2 — your first spring');
    btn.onclick = () => {
      card.style.display = 'none';
      G.flags.year2Started = true;
      fadeOut(() => {
        say(['YEAR 2 — SPRING.',
          'The longest days you’ve had. A field you cleared yourself. And at Bramm’s, seed money that settles the same day you earn it.',
          'The tutorial is over. The farm is yours.'], () => {
          setObjective('Spring! Buy seeds at Bramm’s — your money settles same-day now');
          G.mode = 'play';
        });
        fadeIn();
      });
    };
    card.appendChild(btn);
    const mark = el('div', null, 'ALMANAC · made with Ambrook · ambrook.com · seed ' + G.world.seed);
    mark.style.cssText = 'font-size:10px;color:var(--green);margin-top:10px';
    card.appendChild(mark);
  },

  /* ================= doors & shops ================= */
  enterDoor(door) {
    const W = G.world;
    if (door.id === 'farmhouse') {
      if (G.hour >= CONFIG.SLEEP_FROM) {
        showChoice(['Sleep until morning', 'Not yet'], i => { if (i === 0) doSleep(); });
      } else {
        say(['Too early to turn in — the light’s still worth something. (You can sleep from 18:00.)']);
      }
      return;
    }
    const rest = isRestday(G.day);
    const open = G.hour >= 9 && G.hour < 17;
    if (door.id === 'general') {
      if (rest && G.day !== 11) { say(['CLOSED — RESTDAY, says the sign. Through the side window: a lamp on in the back room, and the slow ka-chunk of an adding machine.']); sfx('kachunk'); return; }
      if (G.day === 11) { say(['The general store is dark. On a Restday, for once, actually dark.']); return; }
      if (!open) { say(['Bramm’s is shut. Hours: 9:00–17:00.']); return; }
      if (G.day === 10 && G.ledger.unlocked && !G.network.connected.general) {
        STORY.runBrammConnect(() => STORY.openGeneral());
        return;
      }
      STORY.openGeneral();
      return;
    }
    if (rest) { say(['Shut for the Restday. The whole street is.']); return; }
    if (!open && door.id !== 'tavern') { say(['Closed for the day.']); return; }
    if (door.id === 'tavern') say([{ who: 'maren', text: 'Bluebird’s open! Well — the door is. The kitchen argues. What’s the news from the farm?' }]);
    else if (door.id === 'forge') say([{ who: 'hetta', text: 'Forge is hot, tools are cold. Come spring I’ll upgrade that sad hoe of yours — copper, then we talk.' }]);
    else if (door.id === 'carpenter') say([{ who: 'corwin', text: 'Corwin! Carpentry! You’ve got a fine porch and I’ve got ideas about it. Come back when you’ve got lumber money.' }]);
    else if (door.id === 'clinic') say([{ who: 'isolde', text: 'Oh — hello. You look… well, you look like farming. Rest when you’re tired. People forget that’s medical advice.' }]);
    else say(['The door is friendly but firm: this is somebody’s home.']);
  },

  openGeneral() {
    const season = seasonOf(G.day);
    const items = [];
    for (const id in CONFIG.CROPS) {
      const c = CONFIG.CROPS[id];
      if (c.seasons.includes(season)) {
        items.push({ icon: '🌱', name: c.name + ' Seeds ×' + c.packet, price: c.seed,
          give: 'seed_' + id, count: c.packet, desc: c.days + ' days to harvest · sells $' + c.sell });
      }
    }
    if (season === 'Winter' && !G.flags.coatBought) {
      items.push({ icon: '🧥', name: 'Winter Coat', price: CONFIG.COAT_PRICE,
        desc: 'Wool, valley-made. You want this.',
        onBuy: () => {
          G.flags.coatBought = true;
          addItem('coat', 1);
          say([{ who: 'bramm', text: 'Good coat. Should’ve had it two days ago, but that wasn’t your fault, was it.' }]);
        } });
    }
    if (!items.length) items.push({ icon: '🫙', name: 'Preserving Jar', price: 12, give: 'walnut', desc: 'For a quieter month. (Seeds return in spring.)' });
    const note = G.network.connected.general ? '✳ settles instantly' : 'cash only, checks by mail';
    STORY.onCantAfford = it => {
      if (G.day === 9 && !G.flags.squeezeFelt) {
        G.flags.squeezeFelt = true;
        say([
          { who: 'bramm', text: 'That’s $' + it.price + '. You’ve got… not that.' },
          { who: 'player', text: 'I have a check coming. ' + (G.pendingChecks.length ? '$' + G.pendingChecks.reduce((s, c) => s + c.amount, 0) + '. ' : '') + 'It exists — it’s just in an envelope somewhere between here and here.' },
          { who: 'bramm', text: 'Everybody’s money is in an envelope somewhere. That’s the whole valley, friend. Come back when yours lands.' }
        ], () => {
          jline('Stood in Bramm’s with a coat in hand and money that technically exists. Put the coat back. The walk home was educational, coldness-wise.');
          setObjective('The check’s still in the mail. Head home — winter days are short');
        });
      } else {
        toast('Not enough cash on hand.');
      }
    };
    openShop("Bramm's General", items, note);
  },

  /* ================= talk ================= */
  talkTo(npc) {
    STORY.meet(npc.id);
    const p = player();
    npc.face = Math.atan2(p.x - npc.x, p.z - npc.z);
    npc.group.rotation.y = npc.face;
    const season = seasonOf(G.day), rest = isRestday(G.day);
    const L = {
      bramm: rest ? 'Store’s shut. I’m only out here because the books blur if I don’t blink some daylight between columns.'
        : 'Need something? It’s on a shelf. Everything’s on a shelf. That’s retail.',
      maren: 'The Bluebird’s always warmer than it looks. Come by after dark and prove me right.',
      hetta: 'That hoe of yours is one season from retirement. When it goes, I’ll build you better.',
      corwin: 'Good bones on your farmhouse. Great bones! Bones deserve floors, eventually. Call me.',
      isolde: G.stamina <= 50 ? 'You’re carrying your shoulders like a full watering can. Sit down for a minute. Doctor’s orders — informally.'
        : 'Nice to see you upright and rested. That’s most of health, honestly.',
      rolf: 'Watering streak. Write it down. A pumpkin remembers every day you skipped — that’s the whole game, neighbor.',
      greta: 'Hens in spring, if you’ve got the coop for it. Come see me when you do. Early — I’m up before the roosters, it embarrasses them.',
      aldwin: G.flags.flyerTaken ? 'The flyer still in your pocket? Good. Paper remembers what people mean to get to.'
        : 'A fine ' + season.toLowerCase() + ' morning to be retired in, and I intend to waste none of it usefully.',
      ness: 'River’s honest. Cold, but honest. That’s more than you can say for most accounting.',
      fen: 'The old marker up the trail — I keep it swept. Why? It likes being swept. Some questions end there.',
      pip: 'The BEST berries are past the big rock, but the SECRET berries — okay I’ll tell you later. When it’s safer.',
      sable: rest ? 'The bench and I have an arrangement. It holds still, and I stay long enough to notice something worth writing down.'
        : 'Just walking. The valley reads differently every day — someone ought to keep up with the drafts.'
    };
    say([{ who: npc.id, text: L[npc.id] || '…' }], () => {
      if (!G.flags['met_' + npc.id]) {
        G.flags['met_' + npc.id] = true;
        STORY.heart(npc.id, 0);   // registered on the wall
      }
    });
  }
};

function startNewGame() {
  if (!G.world) G.world = generateWorld(TITLE.seed || 1234567);
  buildWorldScene();
  buildItems();
  const W = G.world;
  G.day = CONFIG.START_DAY;
  G.hour = 8;
  G.weather = weatherFor(G.day);
  spawnPlayer(W.gazebo.x - 1.5, W.gazebo.z + 6);
  spawnForage();
  updateCamera(player().x, player().z, true);
  applyGrade();
  updateHUD();
  jlineSeed();
  STORY.runIntro();
}
function jlineSeed() {
  jline('Signed the deed this morning. ' + G.farmName + ', ' + G.world.townName + ' valley. The field is a mess and the mess is mine.');
}
/* ============================== MAIN LOOP ================================ */
let lastT = 0, hudT = 0, gradeT = 0;
function frame(tms) {
  requestAnimationFrame(frame);
  const t = tms / 1000;
  const dt = Math.min(0.05, t - lastT || 0.016);
  lastT = t;
  // fps meter (debug/acceptance)
  G.fps.frames++;
  if (t - G.fps.last >= 1) { G.fps.value = G.fps.frames; G.fps.frames = 0; G.fps.last = t; }
  if (!G.world || !R.worldGroup) return;

  tickTime(dt);
  const p = player();
  if (p) {
    if (G.mode === 'play' && !G.uiOpen) {
      const iv = inputVector();
      const moving = (iv.x || iv.z) ? moveActor(p, iv.x, iv.z, dt) : false;
      tickActorAnim(p, dt, moving && (iv.x || iv.z));
    } else if (G.mode === 'scene') {
      tickNPC(p, dt);       // scenes drive the player by waypoint
    } else {
      tickActorAnim(p, dt, false);
    }
    if (RAD.open) { const iv = inputVector(); radialAim(iv.x, iv.z); }
    for (const id in ACTORS) if (id !== 'player') tickNPC(ACTORS[id], dt);
    STORY.tick();
    updateTargetHighlight(t);
    updateCamera(p.x, p.z, false);
  }
  rebuildTiles();
  tickWater(dt);
  tickParticles(dt);
  gradeT += dt;
  if (gradeT > 0.5) { gradeT = 0; applyGrade(); }
  hudT += dt;
  if (hudT > 0.25) { hudT = 0; if (G.mode === 'play') updateHUD(); }
  R.renderer.render(R.scene, R.camera);
}

/* ================================ BOOT =================================== */
function boot() {
  seedRNG(1);                     // texture-speckle stream; real seed re-seeds at worldgen
  buildStaticTextures();
  buildMaterials();
  buildItems();
  initThree();
  initTouch();
  layout();
  TITLE.show();
  requestAnimationFrame(frame);
}
boot();

/* ========================= DEBUG / ACCEPTANCE ============================ */
// Harmless in play; used for the phase self-check. Not part of the game UI.
window.ALMANAC = {
  G, R, CONFIG, CAST, ITEMS,
  fps: () => G.fps.value,
  hour(h) { G.hour = h; updateHUD(); },
  money(n) { G.money = n; updateHUD(); },
  give(id, n) { addItem(id, n || 1); },
  tp(x, z) { const p = player(); actorSetPos(p, x, z); updateCamera(x, z, true); },
  sleep() { doSleep(); },
  state() {
    return { mode: G.mode, day: G.day, season: seasonOf(G.day), hour: +G.hour.toFixed(2),
      weather: G.weather, money: G.money, checks: G.pendingChecks, fps: G.fps.value,
      objective: G.flags.objective, connected: G.network.connected, ui: G.uiOpen,
      dlg: DLG.active, seed: G.world && G.world.seed, town: G.world && G.world.townName };
  },
  skipDialogue() {
    for (let i = 0; i < 200 && (DLG.active || CH.open); i++) {
      if (CH.open) pickChoice(CH.sel);
      else advanceDialogue();
    }
  },
  // Step the sim without waiting on (possibly throttled) rAF. Test-only.
  fastForward(sec, autoAdvance) {
    const dt = 1 / 60;
    const steps = Math.ceil(sec / dt);
    for (let i = 0; i < steps; i++) {
      if (autoAdvance && (DLG.active || CH.open)) this.skipDialogue();
      tickTime(dt);
      const p = player();
      if (p && G.mode === 'scene') tickNPC(p, dt);
      for (const id in ACTORS) if (id !== 'player') tickNPC(ACTORS[id], dt);
      STORY.tick();
      if (autoAdvance && (DLG.active || CH.open)) this.skipDialogue();
    }
    TL.dirty = true;
    updateHUD();
    const p2 = player();
    if (p2) updateCamera(p2.x, p2.z, true);
    return this.state();
  },
  plantStarter() {   // till+plant+water the starter patch (test helper)
    const W = G.world, f = W.field;
    const sx0 = Math.floor(f.w / 2 - 3);
    addItem('seed_turnip', 40);
    for (let tz = 0; tz < 6; tz++) for (let tx = sx0; tx < sx0 + 6; tx++) {
      const t = W.tiles[tz * f.w + tx];
      if (t.s === 'wild') { t.s = 'clear'; t.obj = null; }
      t.s = 'till'; t.crop = 'turnip'; t.grown = 0; t.watered = true; t.dead = false;
    }
    takeItem('seed_turnip', 36);
    TL.dirty = true;
    STORY.checkObjectives();
  },
  waterAll() {
    for (const t of G.world.tiles) if (t.crop) t.watered = true;
    TL.dirty = true; STORY.checkObjectives();
  },
  harvestAll() {
    for (const t of G.world.tiles) {
      if (t.crop && !t.dead && cropVisualStage(t) === 3) { addItem(t.crop, 1); t.crop = null; t.grown = 0; }
    }
    TL.dirty = true;
  },
  shipAll() {
    for (const id of Object.keys(G.inventory)) {
      if (ITEMS[id] && ITEMS[id].sell) { G.heldItem = id; shipHeld(); }
    }
  }
};
