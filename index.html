/* ---- radial ring (hold E) ---- */
const RAD = { open: false, items: [], sel: -1 };
function openRadial() {
  const items = [{ id: null, icon: '✋', name: 'Hands' }];
  for (const id in G.inventory) {
    if (ITEMS[id]) items.push({ id, icon: ITEMS[id].icon, name: ITEMS[id].name });
    if (items.length >= 9) break;
  }
  RAD.open = true; RAD.items = items; RAD.sel = -1;
  G.uiOpen = 'radial';
  const box = $('radial');
  clearEl(box); box.style.display = 'block';
  const ui = $('ui');
  const cx = ui.clientWidth / 2, cy = ui.clientHeight / 2, r = Math.min(cx, cy) * 0.4;
  box.style.left = cx + 'px'; box.style.top = cy + 'px';
  items.forEach((it, i) => {
    const a = i / items.length * Math.PI * 2 - Math.PI / 2;
    const d = el('div', 'radItem', it.icon);
    d.style.left = Math.cos(a) * r + 'px';
    d.style.top = Math.sin(a) * r + 'px';
    d.appendChild(el('div', 'radLbl', it.name));
    box.appendChild(d);
  });
}
function radialAim(dx, dz) {
  if (!RAD.open || (!dx && !dz)) return;
  const ang = Math.atan2(dz, dx) + Math.PI / 2;
  let best = 0, bd = 99;
  RAD.items.forEach((it, i) => {
    const a = i / RAD.items.length * Math.PI * 2;
    const diff = Math.abs(((ang - a) % (Math.PI * 2) + Math.PI * 3) % (Math.PI * 2) - Math.PI);
    if (diff < bd) { bd = diff; best = i; }
  });
  if (best !== RAD.sel) {
    RAD.sel = best;
    [...$('radial').children].forEach((c, i) => c.classList.toggle('sel', i === best));
    sfx('blip');
  }
}
function closeRadial(select) {
  if (!RAD.open) return;
  if (select && RAD.sel >= 0) { G.heldItem = RAD.items[RAD.sel].id; updateHUD(); }
  RAD.open = false;
  $('radial').style.display = 'none';
  if (G.uiOpen === 'radial') G.uiOpen = null;
}

function drawMap(ctx) {
  const W = G.world, P = CONFIG.PALETTE;
  ctx.fillStyle = P.cream; ctx.fillRect(0, 0, 480, 360);
  ctx.fillStyle = P.stone; ctx.fillRect(0, 0, 480, zc(-74));
  if (W.coastal) { ctx.fillStyle = P.water; ctx.fillRect(0, zc(W.oceanZ), 480, 360 - zc(W.oceanZ)); }
  paintPathLine(ctx, W.river, W.riverW, P.water);
  ctx.fillStyle = P.water;
  ctx.beginPath(); ctx.ellipse(wc(W.pool.x), zc(W.pool.z), W.pool.r * 2, W.pool.r * 1.8, 0, 0, 7); ctx.fill();
  for (const p of W.paths) paintPathLine(ctx, p.pts, p.w * 0.8, P.path);
  ctx.fillStyle = '#C9B283';
  ctx.fillRect(wc(W.field.x0), zc(W.field.z0), W.field.w * 2, W.field.h * 2);
  ctx.strokeStyle = P.border; ctx.lineWidth = 2;
  ctx.strokeRect(wc(W.field.x0), zc(W.field.z0), W.field.w * 2, W.field.h * 2);
  let flip = false;
  const dot = (x, z, label, color) => {
    ctx.fillStyle = color || P.roofRed;
    ctx.fillRect(wc(x) - 5, zc(z) - 5, 10, 10);
    ctx.fillStyle = P.ink; ctx.font = 'bold 10px Trebuchet MS'; ctx.textAlign = 'center';
    if (label) ctx.fillText(label, wc(x), zc(z) + (flip ? 18 : -8));
    flip = !flip;
  };
  dot(W.house.x, W.house.z, G.farmName);
  for (const s of W.shops) if (s.name) dot(s.x, s.z, s.name.split(' ')[0], s.roof === 'teal' ? P.roofTeal : P.roofRed);
  dot(W.gazebo.x, W.gazebo.z, 'Square', P.wood);
  dot(W.bench.x, W.bench.z, 'The Shore', P.wood);
  dot(W.marker.x, W.marker.z, 'The Marker', P.stone);
  ctx.fillStyle = P.ink; ctx.font = 'bold 14px Trebuchet MS'; ctx.textAlign = 'center';
  ctx.fillText(W.townName, wc(W.town.x), zc(-40));
}

function buyShopItem() {
  const it = SHOP.items[SHOP.sel];

  if (it.sellAll) {
    const { id, n } = it.sellAll;
    const have = G.inventory[id] || 0;

    const value = ITEMS[id].sell * have;
    takeItem(id, have);
    G.money += value;
    G.ledger.entries.push({ day: G.day, amount: value, enterprise: ITEMS[id].enterprise, note: 'Sold over the counter' });
    sfx('coin');

    SHOP.items.splice(SHOP.sel, 1);
    SHOP.sel = Math.max(0, SHOP.sel - 1);
    updateHUD(); renderShop();
    return;
  }

    return;
  }
  spend(it.price, 'Supplies', it.name);

function layout() {

  const left = (w - sw) / 2, top = (h - sh) / 2;

const KEYS = {};
let holdTimer = null, holdFired = false;
function inputVector() {
  let x = 0, z = 0;
  if (KEYS.KeyW || KEYS.ArrowUp) z -= 1;
  if (KEYS.KeyS || KEYS.ArrowDown) z += 1;
  if (KEYS.KeyA || KEYS.ArrowLeft) x -= 1;
  if (KEYS.KeyD || KEYS.ArrowRight) x += 1;
  x += TOUCH.x; z += TOUCH.z;
  const d = Math.hypot(x, z);
  if (d > 1) { x /= d; z /= d; }
  return { x, z };
}
function pressAct() {

  if (G.mode !== 'play') return;

}
function releaseAct() {
  clearTimeout(holdTimer);

window.addEventListener('keydown', e => {
  if (e.repeat) { KEYS[e.code] = true; if (e.code === 'Tab') e.preventDefault(); return; }
  KEYS[e.code] = true;
  const ac = audioCtx(); ac && ac.resume && ac.resume();
  if (G.mode === 'title') { TITLE.onKey(e); return; }
  switch (e.code) {
    case 'KeyE': case 'Space': case 'Enter':
      if (document.activeElement && /INPUT|TEXTAREA/.test(document.activeElement.tagName)) break;
      pressAct(); e.preventDefault(); break;
    case 'Tab': e.preventDefault();
      if (MENU.open) closeMenu();
      else if (G.mode === 'play' && !G.uiOpen) openMenu();
      break;
    case 'KeyJ': if (G.mode === 'play' && !G.uiOpen) openMenu('Journal'); break;
    case 'KeyM': if (G.mode === 'play' && !G.uiOpen) openMenu('Map'); break;
    case 'KeyH':
      if (document.activeElement && /INPUT|TEXTAREA/.test(document.activeElement.tagName)) break;
      G.hideHUD = !G.hideHUD;
      $('hud').style.display = G.hideHUD ? 'none' : 'block';
      $('held').style.display = G.hideHUD ? 'none' : 'flex';

      if (CH.open) break;

      else if (MENU.open) closeMenu();
      else if (RAD.open) closeRadial(false);
      break;
    case 'ArrowUp':
      if (CH.open) { moveChoice(-1); e.preventDefault(); }
      if (SHOP.open) { SHOP.sel = Math.max(0, SHOP.sel - 1); renderShop(); e.preventDefault(); }

    case 'ArrowDown':
      if (CH.open) { moveChoice(1); e.preventDefault(); }
      if (SHOP.open) { SHOP.sel = Math.min(SHOP.items.length - 1, SHOP.sel + 1); renderShop(); e.preventDefault(); }
      break;
  }
});

  if (e.code === 'KeyE' || e.code === 'Space' || e.code === 'Enter') {
    if (document.activeElement && /INPUT|TEXTAREA/.test(document.activeElement.tagName)) return;

});

/* ---- touch ---- */
const TOUCH = { x: 0, z: 0, joyId: null };
function initTouch() {
  const base = $('joyBase'), knob = $('joyKnob');
  const setKnob = (dx, dz) => {
    knob.style.left = 32 + dx * 30 + 'px';
    knob.style.top = 32 + dz * 30 + 'px';
  };
  base.addEventListener('pointerdown', e => {
    TOUCH.joyId = e.pointerId; base.setPointerCapture(e.pointerId);
  });
  base.addEventListener('pointermove', e => {
    if (e.pointerId !== TOUCH.joyId) return;
    const r = base.getBoundingClientRect();
    let dx = (e.clientX - r.left - r.width / 2) / (r.width / 2);
    let dz = (e.clientY - r.top - r.height / 2) / (r.height / 2);
    const d = Math.hypot(dx, dz);
    if (d > 1) { dx /= d; dz /= d; }
    TOUCH.x = dx; TOUCH.z = dz;
    setKnob(dx, dz);
    if (RAD.open) radialAim(dx, dz);
  });
  const joyEnd = e => {
    if (e.pointerId !== TOUCH.joyId) return;
    TOUCH.joyId = null; TOUCH.x = 0; TOUCH.z = 0; setKnob(0, 0);
  };
  base.addEventListener('pointerup', joyEnd);
  base.addEventListener('pointercancel', joyEnd);
  $('actBtn').addEventListener('pointerdown', e => {
    e.preventDefault();
    const ac = audioCtx(); ac && ac.resume && ac.resume();
    pressAct();
  });
  $('actBtn').addEventListener('pointerup', e => { e.preventDefault(); releaseAct(); });
  $('menuBtn').addEventListener('pointerdown', e => {
    e.preventDefault();
    if (MENU.open) closeMenu();
    else if (G.mode === 'play' && !G.uiOpen) openMenu();
  });
}

/* =============================== STORY =================================== */
// Year 1: the authored 6-day prologue (absolute days 6..11), then free Year 2.
// Dialogue here is placeholder-tier by design (phase 1); real scenes in phase 2.
const STORY = {
  objective: null, onCantAfford: null, onShopClosed: null,

  meet(id) {
    if (!(id in G.hearts)) { G.hearts[id] = 1; }
  },
  heart(id, n) {
    G.hearts[id] = clamp((G.hearts[id] || 0) + n, 0, 10);
  },

  /* ---- scene runner: walk / say / do, time frozen ---- */
  scene(steps, done) {
    G.mode = 'scene';
    let i = 0;
    const next = () => {
      if (i >= steps.length) {
        if (G.mode === 'scene') G.mode = 'play';   // a step may have started sleep
        // scenes moved people; make the schedule re-target so they walk back
        for (const id in ACTORS) if (id !== 'player') delete ACTORS[id].schedKey;
        done && done();
        return;
      }
      const s = steps[i++];
      if (s.say) say(s.say, next);
      else if (s.walk) {
        const a = ACTORS[s.walk.id];
        if (!a) { next(); return; }
        a.waypoints = [{ x: s.walk.x, z: s.walk.z, onArrive: next }];
      }
      else if (s.tp) {
        const a = ACTORS[s.tp.id];
        if (a) actorSetPos(a, s.tp.x, s.tp.z);
        next();
      }
      else if (s.face) {
        const a = ACTORS[s.face.id];
        if (a) { a.face = s.face.angle; if (!a.sprite) a.group.rotation.y = s.face.angle; }
        next();
      }
      else if (s.fade) { fadeOut(() => { s.fade(); fadeIn(next); }); }
      else if (s.fn) { s.fn(); next(); }
      else if (s.wait) setTimeout(next, s.wait);
      else next();
    };
    next();
  },

  spawnVillager(id, x, z) {
    let a = ACTORS[id];
    if (!a) a = makeActor(id, CAST[id], x, z);
    else actorSetPos(a, x, z);
    a.visible = true; a.group.visible = true;
    a.waypoints = [];
    return a;
  },

  /* ---- cast placement: schedule skeletons drive everyone (phase 2) ---- */
  placeCast(day) {
    buildCast();
    assembleSchedules(day);
    snapSchedules();
  },

  /* ================= day starts ================= */
  onDayStart(day, fromLoad) {
    STORY.placeCast(day);
    spawnForage();
    updateHUD();
    applyGrade();
    if (R.glyphs.general) R.glyphs.general.visible = !!G.network.connected.general;
    switch (day) {
      case 6: break;                              // handled by startNewGame intro
      case 7:
        setObjective('Water the turnips — the County Fair starts at noon');
        if (!fromLoad) say(['Bright banners over the square this morning. The County Fair — the whole valley will be there at noon.']);
        jline('Fair day. Everyone in one place, like the valley holding its breath.');
        break;
      case 8:
        setObjective('Restday: harvest your turnips and ship them (bin)');
        if (!fromLoad) say(['Restday. Every shop in ' + G.world.townName + ' is shut tight. The turnips don’t care — they’re ready.']);
        break;
      case 9:
        setObjective('Winter. You’ll want a coat — Bramm’s General sells them');
        if (!fromLoad) say(['Winter came overnight. The kind of cold that gets into your boots.',
          'A coat. Today. Bramm’s will have one.']);
        jline('Winter 1. The cold doesn’t knock first.');
        break;
      case 10:
        if (!G.flags.ledgerMailed) {
          G.flags.ledgerMailed = true;
          G.mail.push({ day: 10, from: 'Aldwin', title: 'That thing I mentioned',
            body: 'The ledger book, like I promised. Funny thing — I mailed it two days ago, same day I saw you. It took the mail two days to cross one valley. That’s rather the point. — A.', read: false });
        }
        setObjective('Something’s in the mailbox');
        if (!fromLoad) say(['The mailbox flag is up.']);
        break;
      case 11:
        setObjective('Restday · Starlight Eve tonight at the gazebo');
        if (!fromLoad) say(['Starlight Eve tonight. And a Restday — though something feels different about the morning.']);
        // Bramm walks to the shore at ~9:00 (flag checked in tickStory)
        G.flags.brammShoreQueued = true;
        break;
      case 12:
        if (!G.flags.year2Card) {
          G.flags.year2Card = true;
          STORY.showYearReview();
          return;
        }
        break;
      default:
        if (day > 12) setObjective(null);
    }
  },

  /* ================= objectives ================= */
  countTiles(fn) { return G.world.tiles.filter(fn).length; },
  checkObjectives() {
    const day = G.day;
    if (day === 6) {
      const planted = STORY.countTiles(t => t.crop === 'turnip');
      const watered = STORY.countTiles(t => t.crop === 'turnip' && t.watered);
      if (G.flags.introDone && planted < 24) setObjective('Till the starter patch and plant your free turnips (hold E to pick seeds)');
      else if (planted >= 24 && watered < planted) setObjective('Water the turnips (face a planted tile, press E)');
      else if (planted >= 24) setObjective('Good work. Sleep when the light goes (farmhouse door, from 18:00)');
    } else if (day === 7) {
      const watered = STORY.countTiles(t => t.crop === 'turnip' && t.watered);
      if (watered >= 20) setObjective('Turnips watered. The Fair starts at noon — don’t be late');
    } else if (day === 8) {
      if (G.dayFlags.shippedAny) {
        setObjective('Shipped. The check comes in two days — Restday evening is yours');
        if (!G.flags.shippedLesson) {
          G.flags.shippedLesson = true;
          say(['The bin takes the turnips. A slip of carbon paper takes their place: "CHECK TO FOLLOW — ALLOW 2 DAYS."',
            'Two days. The seeds at Bramm’s want paying today, but sure — two days.']);
          jline('Shipped the turnip harvest. Payment is now a rumor with a postmark.');
        }
      }
    } else if (day === 10) {
      if (G.ledger.unlocked && !G.network.connected.general) setObjective('Take the ledger to Bramm’s General — Aldwin says he’s the pilot');
      if (G.network.connected.general && !G.flags.coatBought) setObjective('Buy the coat you couldn’t afford yesterday');
      if (G.flags.coatBought) setObjective('Warm at last. The evening is yours');
    } else if (day === 12) {
      if (G.flags.year2Started) {
        const bought = Object.keys(G.inventory).some(id => ITEMS[id] && ITEMS[id].seedOf && CONFIG.CROPS[ITEMS[id].seedOf].seasons.includes('Spring'));
        if (bought) setObjective('Your first spring. The field is yours — no script, just seasons');
      }
    }
  },

  /* ================= mid-day triggers (called every sim tick) ================= */
  tick() {
    const day = G.day, p = player();
    if (!p || G.mode !== 'play' || G.uiOpen) return;
    // Fair auto-start at noon, day 7
    if (day === 7 && G.hour >= 12 && !G.flags.fairDone) {
      G.flags.fairDone = true;
      STORY.runFair();
    }
    // Aldwin at the fence, day 9 (after the shop attempt, or 13:00 regardless)
    if (day === 9 && !G.flags.aldwinDone &&
        (G.flags.squeezeFelt || G.hour >= 13) &&
        zoneAt(p.x, p.z) === 'farm') {
      G.flags.aldwinDone = true;
      STORY.runAldwin();
    }
    // Ledger reveal after reading mail, day 10
    if (day === 10 && !G.ledger.unlocked && G.mail.some(m => m.day === 10 && m.read)) {
      STORY.runLedgerArrives();
    }
    // Bramm walks to the shore, day 11 morning
    if (day === 11 && G.flags.brammShoreQueued && G.hour >= 9) {
      G.flags.brammShoreQueued = false;
      STORY.runBrammShore();
    }
    // Starlight Eve at 18:00
    if (day === 11 && G.hour >= 18 && !G.flags.starlightDone) {
      G.flags.starlightDone = true;
      STORY.runStarlight();
    }
  },

  runLedgerArrives() {
    G.ledger.unlocked = true;
    // Tag year-to-date income so the mini-reveal has numbers to point at.
    const forage = G.ledger.entries.filter(e => e.enterprise === 'Foraging' && e.amount > 0).reduce((s, e) => s + e.amount, 0);
    const turnip = G.ledger.entries.filter(e => e.enterprise === 'Turnip' && e.amount > 0).reduce((s, e) => s + e.amount, 0);
    const lines = [
      'Inside the parcel: a green ledger book, cloth-bound, heavier than it looks. It smells like a bank and a barn at once.',
      'You copy in the season so far. The book sorts every dollar on its own — turnips here, foraged finds there, seeds in red.'
    ];
    if (forage > turnip) {
      lines.push('Huh. The wild mushrooms and walnuts out-earned the turnips. The turnips you watered every day. Nobody watered a walnut.');
    } else {
      lines.push('There it is in green and red: what the field made, what the pockets spent. The farm has a shape now.');
    }
    lines.push('Aldwin’s note, tucked in the flap: "Bramm agreed to pilot the network. Told me it was nonsense. Was holding the sign-up sheet while he said it. Go see him."');
    say(lines, () => {
      jline('The Ledger came. Green book, quiet authority. Foraging beat farming this season, which the turnips and I will not discuss further.');
      STORY.checkObjectives();
    });
  },

        { who: 'bramm', text: 'You. Aldwin’s new convert. Fine — see the box on the counter? Thirty years of receipts. THE box. Sit down, you’re helping.' },

  showYearReview() {
    G.mode = 'scene';
    const card = $('yearCard');
    clearEl(card);
    card.style.display = 'block';
    card.appendChild(el('h2', null, 'Year 1 — ' + G.farmName));
    const body = el('div');
    body.id = 'yearBody';
    const by = {};
    for (const e of G.ledger.entries) by[e.enterprise] = (by[e.enterprise] || 0) + e.amount;
    const income = Object.keys(by).filter(k => by[k] > 0);
    const spendKeys = Object.keys(by).filter(k => by[k] < 0);
    body.appendChild(el('b', null, 'The Ledger says:'));
    for (const k of income) body.appendChild(el('div', null, '  ' + k + ': +$' + by[k]));
    for (const k of spendKeys) body.appendChild(el('div', null, '  ' + k + ': −$' + (-by[k])));
    const pend = G.pendingChecks.reduce((s, c) => s + c.amount, 0);
    if (pend) body.appendChild(el('div', null, '  Still in the mail: $' + pend));
    body.appendChild(el('br'));
    body.appendChild(el('b', null, 'The Journal remembers:'));
    const highlights = G.journal.slice(-6).map(e => e.lines[0]).filter(Boolean);
    for (const h of highlights) body.appendChild(el('div', null, '  · ' + h));
    card.appendChild(body);
    const btnJ = el('button', 'uiBtn', 'Export journal (.txt)');
    btnJ.onclick = exportJournal;
    card.appendChild(btnJ);
    const btn = el('button', 'uiBtn', 'Begin Year 2 — your first spring');
    btn.onclick = () => {
      card.style.display = 'none';
      G.flags.year2Started = true;
      fadeOut(() => {
        say(['YEAR 2 — SPRING.',
          'The longest days you’ve had. A field you cleared yourself. And at Bramm’s, seed money that settles the same day you earn it.',
          'The tutorial is over. The farm is yours.'], () => {
          setObjective('Spring! Buy seeds at Bramm’s — your money settles same-day now');
          G.mode = 'play';
        });
        fadeIn();
      });
    };
    card.appendChild(btn);
    const mark = el('div', null, 'ALMANAC · made with Ambrook · ambrook.com · seed ' + G.world.seed);
    mark.style.cssText = 'font-size:10px;color:var(--green);margin-top:10px';
    card.appendChild(mark);
  },

  /* ================= doors & shops ================= */
  enterDoor(door) {
    const W = G.world;
    if (door.id === 'farmhouse') {
      if (G.hour >= CONFIG.SLEEP_FROM) {
        showChoice(['Sleep until morning', 'Not yet'], i => { if (i === 0) doSleep(); });
      } else {
        say(['Too early to turn in — the light’s still worth something. (You can sleep from 18:00.)']);
      }
      return;
    }
    const rest = isRestday(G.day);
    const open = G.hour >= 9 && G.hour < 17;
    if (door.id === 'general') {
      if (rest && G.day !== 11) { say(['CLOSED — RESTDAY, says the sign. Through the side window: a lamp on in the back room, and the slow ka-chunk of an adding machine.']); sfx('kachunk'); return; }
      if (G.day === 11) { say(['The general store is dark. On a Restday, for once, actually dark.']); return; }
      if (!open) { say(['Bramm’s is shut. Hours: 9:00–17:00.']); return; }
      if (G.day === 10 && G.ledger.unlocked && !G.network.connected.general) {
        STORY.runBrammConnect(() => STORY.openGeneral());
        return;
      }
      STORY.openGeneral();
      return;
    }
    if (rest) { say(['Shut for the Restday. The whole street is.']); return; }
    if (!open && door.id !== 'tavern') { say(['Closed for the day.']); return; }
    if (door.id === 'tavern') say([{ who: 'maren', text: 'Bluebird’s open! Well — the door is. The kitchen argues. What’s the news from the farm?' }]);
    else if (door.id === 'forge') STORY.openForge();
    else if (door.id === 'carpenter') say([{ who: 'corwin', text: 'Corwin! Carpentry! You’ve got a fine porch and I’ve got ideas about it. Come back when you’ve got lumber money.' }]);
    else if (door.id === 'clinic') say([{ who: 'isolde', text: 'Oh — hello. You look… well, you look like farming. Rest when you’re tired. People forget that’s medical advice.' }]);
    else say(['The door is friendly but firm: this is somebody’s home.']);
  },

  openForge() {
    const items = [];
    G.toolTiers = G.toolTiers || {};
    if (G.toolAway) {
      say([{ who: 'hetta', text: 'Your ' + G.toolAway.tool + '’s still in the fire. One thing at a time — that’s how they come out right.' }]);
      return;
    }
    const TOOL_NAMES = { hoe: 'Hoe', can: 'Watering Can', axe: 'Axe', hammer: 'Hammer', sickle: 'Sickle' };
    for (const t of G.tools) {
      if ((G.toolTiers[t] || 0) >= 1) continue;
      items.push({ icon: '⚒', name: 'Copper ' + TOOL_NAMES[t], price: CONFIG.TOOL_PRICES.copper,
        desc: CONFIG.TOOL_TURNAROUND + '-day turnaround — you lose the ' + t + '. Lighter swing after.',
        onBuy: () => {
          G.toolAway = { tool: t, backDay: G.day + CONFIG.TOOL_TURNAROUND };
          closeShop();
          say([{ who: 'hetta', text: 'Good. Leave it. ' + CONFIG.TOOL_TURNAROUND + ' days — and plan your watering around the loss, farmer. Rain is your friend now.' }]);
          jline('Left the ' + t + ' at the forge. Two days of working around its absence. Hetta looked delighted. The ' + t + ' looked resigned.');
        } });
    }
    if (!items.length) { say([{ who: 'hetta', text: 'Everything you own is already copper. Iron’s a conversation for after you’ve worn the copper in.' }]); return; }
    openShop("Hetta's Forge & Supply", items, 'estimates chalked on the wall');
  },

  // last season's per-crop earnings, shown as profit chips once the Ledger exists
  profitChip(cropName) {
    if (!G.ledger.unlocked) return '';
    const seasonStart = Math.floor(G.day / 3) * 3 - 3;
    if (seasonStart < 0) return '';
    const earned = G.ledger.entries
      .filter(e => e.enterprise === cropName && e.amount > 0 && e.day >= seasonStart && e.day < seasonStart + 3)
      .reduce((s, e) => s + e.amount, 0);
    return earned > 0 ? ' · last season: +$' + earned : '';
  },

  openGeneral() {
    const season = seasonOf(G.day);
    const items = [];
    for (const id in CONFIG.CROPS) {
      const c = CONFIG.CROPS[id];
      if (c.seasons.includes(season)) {
        items.push({ icon: '🌱', name: c.name + ' Seeds ×' + c.packet, price: c.seed,
          give: 'seed_' + id, count: c.packet,
          desc: c.days + ' days to harvest · sells $' + c.sell + STORY.profitChip(c.name) });
      }
    }
    // sell from your pockets — same price as the bin, instant cash
    for (const id of Object.keys(G.inventory)) {
      const it = ITEMS[id];
      if (!it || !it.sell) continue;
      const n = G.inventory[id];
      items.push({ icon: it.icon, name: 'Sell ' + it.name + ' ×' + n, price: 0,
        priceLabel: '+$' + it.sell * n, sellAll: { id, n },
        desc: 'over the counter, cash today' });
    }
    if (season === 'Winter' && !G.flags.coatBought) {
      items.push({ icon: '🧥', name: 'Winter Coat', price: CONFIG.COAT_PRICE,
        desc: 'Wool, valley-made. You want this.',
        onBuy: () => {
          G.flags.coatBought = true;
          addItem('coat', 1);
          say([{ who: 'bramm', text: 'Good coat. Should’ve had it two days ago, but that wasn’t your fault, was it.' }]);
        } });
    }
    if (!items.length) items.push({ icon: '🫙', name: 'Preserving Jar', price: 12, give: 'walnut', desc: 'For a quieter month. (Seeds return in spring.)' });
    const note = G.network.connected.general ? '✳ settles instantly' : 'cash only, checks by mail';
    STORY.onCantAfford = it => {
      if (G.day === 9 && !G.flags.squeezeFelt) {
        G.flags.squeezeFelt = true;
        say([
          { who: 'bramm', text: 'That’s $' + it.price + '. You’ve got… not that.' },
          { who: 'player', text: 'I have a check coming. ' + (G.pendingChecks.length ? '$' + G.pendingChecks.reduce((s, c) => s + c.amount, 0) + '. ' : '') + 'It exists — it’s just in an envelope somewhere between here and here.' },
          { who: 'bramm', text: 'Everybody’s money is in an envelope somewhere. That’s the whole valley, friend. Come back when yours lands.' }
        ], () => {
          jline('Stood in Bramm’s with a coat in hand and money that technically exists. Put the coat back. The walk home was educational, coldness-wise.');
          setObjective('The check’s still in the mail. Head home — winter days are short');
        });
      } else {
        toast('Not enough cash on hand.');
      }
    };
    openShop("Bramm's General", items, note);
  },

  /* ================= talk (line banks + gifts, phase 2) ================= */
  talkTo(npc) { socialTalk(npc); }
};

function startNewGame() {
  if (!G.world) G.world = generateWorld(TITLE.seed || 1234567);
  buildWorldScene();
  buildItems();
  bakeAllSprites();
  const W = G.world;
  G.day = CONFIG.START_DAY;
  G.hour = 8;
  G.weather = weatherFor(G.day);
  spawnPlayer(W.gazebo.x - 1.5, W.gazebo.z + 6);
  buildCast();
  assembleSchedules(G.day);
  snapSchedules();
  spawnForage();
  updateCamera(player().x, player().z, true);
  applyGrade();
  updateHUD();
  jlineSeed();
  STORY.runIntro();
}
function jlineSeed() {
  jline('Signed the deed this morning. ' + G.farmName + ', ' + G.world.townName + ' valley. The field is a mess and the mess is mine.');
}
/* ============================== MAIN LOOP ================================ */
let lastT = 0, hudT = 0, gradeT = 0;
function frame(tms) {
  requestAnimationFrame(frame);
  const t = tms / 1000;
  const dt = Math.min(0.05, t - lastT || 0.016);
  lastT = t;
  // fps meter (debug/acceptance)
  G.fps.frames++;
  if (t - G.fps.last >= 1) { G.fps.value = G.fps.frames; G.fps.frames = 0; G.fps.last = t; }
  if (!G.world || !R.worldGroup) return;

  tickTime(dt);
  const p = player();
  if (p) {
    if (G.mode === 'play' && !G.uiOpen) {
      const iv = inputVector();
      const moving = (iv.x || iv.z) ? moveActor(p, iv.x, iv.z, dt) : false;
      tickActorAnim(p, dt, moving && (iv.x || iv.z));
    } else if (G.mode === 'scene') {
      tickNPC(p, dt);       // scenes drive the player by waypoint
    } else {
      tickActorAnim(p, dt, false);
    }
    if (RAD.open) { const iv = inputVector(); radialAim(iv.x, iv.z); }
    if (!simPaused()) tickSchedules();
    for (const id in ACTORS) if (id !== 'player') tickNPC(ACTORS[id], dt);
    STORY.tick();
    updateTargetHighlight(t);
    updateCamera(p.x, p.z, false);
  }
  rebuildTiles();
  tickWater(dt);
  tickParticles(dt);
  gradeT += dt;
  if (gradeT > 0.5) { gradeT = 0; applyGrade(); }
  hudT += dt;
  if (hudT > 0.25) { hudT = 0; if (G.mode === 'play') updateHUD(); }
  R.renderer.render(R.scene, R.camera);
}

/* ================================ BOOT =================================== */
function boot() {
  seedRNG(1);                     // texture-speckle stream; real seed re-seeds at worldgen
  buildStaticTextures();
  buildMaterials();
  buildItems();
  initThree();
  initTouch();
  layout();
  TITLE.show();
  requestAnimationFrame(frame);
}
boot();

/* ========================= DEBUG / ACCEPTANCE ============================ */
// Harmless in play; used for the phase self-check. Not part of the game UI.
window.ALMANAC = {
  G, R, CONFIG, CAST, ITEMS,
  fps: () => G.fps.value,
  hour(h) { G.hour = h; updateHUD(); },
  money(n) { G.money = n; updateHUD(); },
  give(id, n) { addItem(id, n || 1); },
  tp(x, z) { const p = player(); actorSetPos(p, x, z); updateCamera(x, z, true); },
  sleep() { doSleep(); },
  state() {
    return { mode: G.mode, day: G.day, season: seasonOf(G.day), hour: +G.hour.toFixed(2),
      weather: G.weather, money: G.money, checks: G.pendingChecks, fps: G.fps.value,
      objective: G.flags.objective, connected: G.network.connected, ui: G.uiOpen,
      dlg: DLG.active, seed: G.world && G.world.seed, town: G.world && G.world.townName };
  },
  skipDialogue() {
    for (let i = 0; i < 200 && (DLG.active || CH.open); i++) {
      if (CH.open) pickChoice(CH.sel);
      else advanceDialogue();
    }
  },
  // Step the sim without waiting on (possibly throttled) rAF. Test-only.
  fastForward(sec, autoAdvance) {
    const dt = 1 / 60;
    const steps = Math.ceil(sec / dt);
    for (let i = 0; i < steps; i++) {
      if (autoAdvance && (DLG.active || CH.open)) this.skipDialogue();
      tickTime(dt);
      const p = player();
      if (p && G.mode === 'scene') tickNPC(p, dt);
      if (!simPaused()) tickSchedules();
      for (const id in ACTORS) if (id !== 'player') tickNPC(ACTORS[id], dt);
      STORY.tick();
      if (autoAdvance && (DLG.active || CH.open)) this.skipDialogue();
    }
    TL.dirty = true;
    updateHUD();
    const p2 = player();
    if (p2) updateCamera(p2.x, p2.z, true);
    return this.state();
  },
  plantStarter() {   // till+plant+water the starter patch (test helper)
    const W = G.world, f = W.field;
    const sx0 = Math.floor(f.w / 2 - 3);
    addItem('seed_turnip', 40);
    for (let tz = 0; tz < 6; tz++) for (let tx = sx0; tx < sx0 + 6; tx++) {
      const t = W.tiles[tz * f.w + tx];
      if (t.s === 'wild') { t.s = 'clear'; t.obj = null; }
      t.s = 'till'; t.crop = 'turnip'; t.grown = 0; t.watered = true; t.dead = false;
    }
    takeItem('seed_turnip', 36);
    TL.dirty = true;
    STORY.checkObjectives();
  },
  waterAll() {
    for (const t of G.world.tiles) if (t.crop) t.watered = true;
    TL.dirty = true; STORY.checkObjectives();
  },
  harvestAll() {
    for (const t of G.world.tiles) {
      if (t.crop && !t.dead && cropVisualStage(t) === 3) { addItem(t.crop, 1); t.crop = null; t.grown = 0; }
    }
    TL.dirty = true;
  },
  shipAll() {
    for (const id of Object.keys(G.inventory)) {
      if (ITEMS[id] && ITEMS[id].sell) { G.heldItem = id; shipHeld(); }
    }
  }
};
