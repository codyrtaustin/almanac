<!--
  ALMANAC — Phases 1–4: complete build against SPEC.md v1.0.
  Single file, Three.js r128, no storage APIs.

  DESIGN DECISIONS (unspecified in spec, chosen per pillars):
  - Characters are baked at boot into sprite atlases (8 directions x 4 poses:
    idle/step/step-back/tool) rendered under the headlamp light, displayed as
    camera-facing billboard quads; live 3D chibis remain the automatic fallback
    if the bake throws (§3). Low-stamina slump reads via swing speed + journal
    tells rather than sprite tilt (billboards don't lean well).
  - Gameplay plane is flat (y=0); the "gentle fBm heightmap" is expressed visually
    via the painted ground canvas + ridge scenery. Walkable height deferred.
  - Ground outside the farm field is one painted canvas texture (2px/m); the farm
    field itself is the tile grid with InstancedMesh overlays.
  - Interiors remain mini-scene stubs: farmhouse door prompts sleep, shop doors
    open shop panels behind a cream fade. "Inside" villagers hide at their anchor.
  - The spec names seven focus villagers but says "6 focus, 2 birthdays/season";
    all seven (Bramm, Hetta, Corwin, Isolde, Rolf, Maren, Greta) get birthdays,
    placed on days 1/3 of seasons so festivals stay clear.
  - Gift hearts: loved +2 / liked +1 / disliked -1; birthday roughly x2-x5 via
    doubling+bonus, keeping the 0-10 integer heart scale readable.
  - Upgraded tools return by mail/gate drop rather than a pickup trip (one fewer
    errand in 3-minute winter days); Hetta's letter keeps it diegetic.
  - Ledger profit chips show last season's tagged income per crop (seed costs are
    tagged Supplies, not per-crop, so "profit" = earnings; label reads as such).
  - Weather set: sun / cloud / rain / snow.
  - Free turnip packet covers the 6x6 starter patch (36 seeds). Turnip check $216;
    the winter coat is $120 and starting cash $40 so the day-4 squeeze always bites.
  PHASE 3-4 DECISIONS:
  - Contract eligibility is hearts >= 6 + business connected; the spec's "received
    the relevant good a few times" is expressed through the hearts road there.
  - Cows/barn are scope-gated out (spec allows); chickens ship: coop + Greta's
    hens, an egg per hen at rollover, feeding Maren's contract.
  - The fox payoff plays as an authored overlook scene behind a fade rather than
    a live 90-degree camera snap (the only spot the spec allows one; the fixed
    rig everywhere else made a one-off snap read as a glitch in testing).
  - Tavern-door low-pass music leak omitted; the jukebox plays full inside via
    the door menu. Four original tracks; "Checks in the Mail" retires at stage 3.
  - Old Ness's refusal: zero mechanical penalty, +1 heart for the honesty, and
    his bait-worm contract pays cash in person on Restdays, always.
  - The Restday tavern keeps its own hours (shut days, open from dusk) per §5.
  - Blessings from the marker are never announced: doubled forage, an instant
    bite, or a rested morning, drawn from the calendar stream; the Journal only
    ever "notices."
  - Debug hooks exposed on window.ALMANAC for acceptance testing (harmless in play).
  V2 — HM64 MECHANICS TUNING (from a decomp *mechanics* study; numbers used as
  ratios only — no code, text, art, or audio from the game or repo):
  - Weather: per-season weighted tables (85/15, summer 85/10/5 storm, winter
    70/30 snow); wet days get one cool multiply (#B0B0C0); a marker offering
    quietly turns tomorrow's storm to rain; day-after-storm lines for all 12.
  - Affection: hidden points, 13 per displayed heart, cap 130; first talk each
    day +1, loved gift +3 / liked +1 / disliked −2, birthdays ×5; repeat talks
    branch to terse lines; cross-NPC gossip leaks the arcs.
  - Dialogue: the priority-ladder order (situation bits → Restday → affection
    tier → weather override → random variants).
  - Crops: dryness pauses growth (only never-watered seedlings die); the season
    rollover reaps out-of-season crops into visible corpses, reverts unsprouted
    seeds, and spring reclaims half the untended tilled rows; HM64 sell ratios
    re-denominated (turnip 6 … strawberry 15; forage ≈ half the worst crop).
  - Stamina: fatigue counter with rest-only recovery (sleep, the swimming
    hole); one-time tier-crossing tells; upgraded hoe/can cost MORE per swing
    but work a row of three; raw food small, cooked food good, dishes storable.
  - Night mostly *sounds* like night: the overworld loop stops after dark.
  - Year review adds "the valley's regard" (hearts + worked tiles + upgrades).
  V2 — "THE HM64 PASS" (rendering TECHNIQUE only, reproduced from a decomp
  mechanics study; every asset below is generated at boot from original code —
  no textures, models, sprites, or audio from the reference game or repo):
  - True tile-mesh terrain (§1): one indexed BufferGeometry, per-tile atlas
    UVs, corner heights quantized to 0.25m steps (terraced banks/path cuts,
    not smooth noise), per-vertex warm contact shading. Replaces the v1
    painted ground plane.
  - Projection locked to the reference ratio (§2): ZONE_HEIGHT retuned so
    tiles read ~28-32px and a standing character ~56-64px on the 640-wide
    buffer (character billboard set to 1.34x2.0m at that zoom).
  - Props become sprites (§3): well, mailbox, bench, marker, fence posts, and
    both tree kinds are modeled once, baked under the headlamp light at boot,
    and drawn as Y-sorted billboards. Buildings stay true 3D geometry — that
    split is deliberate. Round-tree canopies are an overlapping-lump cluster
    rather than one icosahedron (a single low-poly hull can silhouette as a
    sharp pyramid from the fixed camera; the lump cluster reads as foliage
    from any angle). Crops became painted sprite stages (stage0/1 shared,
    mid/ripe per-crop, plus a shared dead-stalk sprite for the reaper).
  - CI4 palette discipline (§4): every baked texture (terrain atlas, prop
    sprites, crop sprites) runs through a 16-color quantization pass after
    rendering — genuine color-bucket economy, not a filter.
  - Real seasonal texture sets (§5): the terrain atlas and prop sprite bank
    are repainted at boot and on every season change — autumn grass goes dry
    and patchy, winter tiles go snow-textured with dark path cuts — not tinted.
  - Weather/lighting values (§6): unchanged from the v2 mechanics pass, now
    also driving a night-only sparse music arrangement (bass breathing, lead
    surfacing twice a bar) instead of full silence.
  - Animation timing in 30fps ticks (§7): the walk cycle holds 7,8,7,8 ticks
    per frame rather than an even split — the slightly uneven cadence is the
    intended signature, not a bug.
  - Message-box metrics (§8): dialogue re-wraps to ~3 lines/~28 chars, one
    thought per box, via sentence-boundary splitting at the `say()` pipeline;
    the choice menu renders as a small sub-box beside the main box.
  - Not done: the reference's building-interior tile sets (ALMANAC's interiors
    are still cream-fade stubs, unrelated to this pass) and a literal N64
    framebuffer-resolution render target — pixel density is matched via the
    zone-height/character-scale ratio instead, which verified correctly
    on-screen without the extra render-target complexity.

  V3 — ART BIBLE v1.0 PASS (the user's calibration doc; engine-data-derived
  ratios/curves reimplemented as original CSS/canvas/geometry, no expressive
  content ported). Verified in-browser against the doc's own §13 checklist:
  - §1 light curve: applyGrade() rebuilt as five graded stops (day incl. a
    06-08 morning ramp / golden / sunset / dusk / night) keyed off the
    existing seasonal DUSK_HOUR/NIGHT_HOUR anchors (golden = dusk-2h, sunset
    = dusk-1h) rather than fixed clock hours, so winter's early dusk still
    gets its own. Verified numerically: ambient steps 0.68→0.78 by noon,
    holds flat till golden hour, eases to the 0.55 night floor by NIGHT_HOUR.
    Snow now rides the sunny curve (no cool-multiply darkening — confirmed
    ambient stays 0.78 and background matches the sun day exactly); rain/storm
    keep a blue-cap tint only, never a darkness ramp (confirmed ambient never
    drops for weather).
  - §2 seasonal ramps: SEASON_TILES extended with path/stone/water/sky/wood
    per season (previously grass-only); terrain atlas and tree bakes thread
    through it. SCRUFF (unworked farm ground) overlay cut from a 0.45-opacity
    wash to a 0.18 sparse tell — was reading the whole field dull/khaki
    against the reference's lush unworked grass (see VISUAL_NOTES.md finding
    #2, now addressed). Autumn round-tree canopy mixes the three specified
    tones per-lump on one bake rather than a flat hue-shift.
  - §5 crops: full redesign — 32x48 canvases (was 24x24 square), 7 silhouette
    families (root/leafy/vine/cob/gourd/flower/berry) mapped across all 18
    crops so each reads as its species at a glance, saturated fruit-pop color
    against desaturated foliage. This was VISUAL_NOTES.md finding #1, the
    single biggest gap versus the reference — verified fixed: a ripe turnip
    now shows a distinct white root bulb + leaf tuft, not a pale circle.
  - §6 characters: CAST palette re-keyed to the doc's signature-hue table
    (data-only; geometry hooks like glasses/braids/brooms not built — flagged
    below). Found and fixed a real brand-law violation while auditing green
    usage: ledger green was selectable as a player shirt color at character
    creation, breaking "nowhere else, ever" — swapped for a mossy olive.
  - §7 portraits: added the one-step warm shadow the construction recipe
    calls for (shared by all 12 through the existing drawPortraitTo). Ran the
    doc's own gate — evaluated Maren's alone before touching the rest — and
    it reads warm/charming; no fallback ladder needed, so the shared function
    upgrade already covers all twelve without a special case.
  - §8: roof snow-load added as a pre-built, visibility-toggled plane per
    building (not a rebuild-per-season) — confirmed 8 caps show in winter.
  - §9: heart pips recolored to the 5-tier ramp (empty/sprout/gold/warm/deep)
    as a gradient across the EXISTING 10-pip scale — cosmetic only; did not
    change pip count or any of the "N hearts" gates already shipped and
    tested in phases 2-4 (vignettes, contracts, birthdays all cite the 0-10
    scale in dialogue and UI copy). The doc's box-metric spec (cream/border,
    3 lines, portrait left) matches what phase 1 already shipped — no change
    needed there, and it supersedes an earlier ad-hoc "wood-grain box" idea
    from a pre-bible visual-comparison pass (see VISUAL_NOTES.md) — declined.
  - Explicitly NOT done this pass (backlog, flagged not silently dropped):
    §3 shared-family quantization palettes (currently per-texture, already
    hits the ≤16-color banding goal, just not cross-texture-shared) · §4 full
    ~40-tile/season atlas manifest (shore edges, water-edge sets, ford, path
    junction — have a working ~16-tile subset) · §6 character silhouette
    geometry hooks (glasses, braids, brooms, per-character scale) · §7 full
    12-portrait rebuild beyond the shared shadow pass · §9 custom 6x8 bitmap
    font (using the doc's own sanctioned fallback: system font, integer-
    scaled) · §10 the 82-icon manifest (still emoji-based) · §11 ambient
    season particles (petals/fireflies/leaf-drift beyond weather rain/snow).
    §4/diagonal-45°-grid from the earlier visual-notes pass remains flagged,
    not queued, per that doc.

  V4 — REAL CROP ROSTER + BUILDINGS PASS (user feedback: "match the actual
  crops... I want all the crops from the original game" + "buildings look
  bad"). Crop names/seasons/buy:sell ratios are game DATA (public facts about
  the reference, sourced from strategywiki's public crop table), reimplemented
  at our own ÷10 dollar scale; every sprite and line of code is original.
  - Crops: trimmed from 18 invented entries down to the real 7 (turnip,
    potato, cabbage, tomato, corn, eggplant, strawberry) plus two disclosed
    exceptions — sunflower (explicitly liked, kept as-is) and pumpkin (the
    County Fair judging mechanic — Rolf's rivalry, the ribbon, streak-
    weighted size — is load-bearing on it, so it stays alongside the matched
    roster rather than breaking that already-shipped system). Two departures
    from the real game's own data, both already-documented pillar conflicts:
    turnip keeps 2-day growth (not the faster real ratio) because Year 1's
    prologue is authored around a plant-day1/harvest-day3 beat; strawberry
    moves from the real game's Winter/greenhouse slot to Spring because
    ALMANAC's winter is deliberately cropless (SPEC.md §7). Removing the 9
    invented crops required fixing every place that referenced them by name:
    a recipe ingredient, six villagers' gift preferences, and the Seed Swap
    festival's seed grant — all re-mapped to the real roster, verified intact
    (a fresh Seed Swap grants the corrected seeds; Rolf's gift preference for
    potato was confirmed to move his hearts).
  - Crop art: bigger fills, a shadow crease, and a real gloss highlight per
    fruit on every family except flower/sunflower (left alone — explicitly
    liked as-is). Verified: potato/cabbage/tomato/corn/eggplant/strawberry/
    pumpkin all read as distinct species at normal zoom.
  - Buildings: walls get real plank or plaster texture (alternating per
    building, matching the art bible's "plaster or plank" law) instead of a
    flat color; roofs get a painted shingle texture; added a stone foundation
    course, eave fascia trim, window shutters, a plank door with a proper
    frame and threshold step, and a chimney + static smoke wisp on working
    buildings (general, forge, tavern, farmhouse). Verified in-browser on
    both a plank building (general store) and a plaster one (forge) — reads
    as a real rustic-diorama street now, not flat colored boxes.
  Verified: full Year-1 regression (intro/plant/fair/harvest/ship) at 60fps,
  zero console errors, $216 shipment math untouched.

  V5 — CHARACTER GEOMETRY REBUILD (user feedback: "not 3D enough / built out
  enough"). This is a TECHNIQUE change to our own original chibi model —
  rounder, more sculpted construction — not a copy of the reference's actual
  character designs; that line (technique yes, expression never) is the rule
  this whole project has run on since the HM64 mechanics pass, restated
  explicitly here because the request could be misread as asking for literal
  replication. makeChibi() rebuilt: flat boxes replaced with cylinders and
  sphere-stacks (legs = thigh cylinder + shoe-cap sphere, arms = upper-arm
  cylinder + mitt sphere, torso = barrel cylinder + chest bulge + rounded hip,
  a neck cylinder separating head from body, a soft chin-taper on the head
  scale, layered hair with a back-drape for long-hair characters). legs[]/
  arms[] are now pivot GROUPS instead of raw meshes so the existing swing-
  animation code (which only ever sets .rotation.x) kept working with no
  changes elsewhere. Verified two ways: a raw close-up of the live geometry
  (bypassing the sprite bake) shows the neck/torso/shoe detail directly, and
  — more importantly, since sprites are what actually ships — the baked
  in-game sprite atlas was pulled and inspected directly, confirming the
  built-out geometry survives baking and reads in every walk-cycle frame.
  Full Year-1 regression re-run after: 60fps, zero console errors, all 12
  villagers render correctly at the County Fair, $216 shipment math intact.

  V6 — CROPS AS BAKED 3D GEOMETRY (user feedback: "why don't the vegetables
  have the same chonky big look... just recreate that"). Diagnosis: v4's
  flat-painted vector crops weren't a size problem, they were a technique
  problem — a hand-drawn 2D fill reads as a sticker no matter how large,
  while the reference's density comes from real dimensional SHADING on
  rounded volumes. Rebuilt crops on the same baked-3D-geometry pipeline
  already proven for trees/props/characters this session: chunky primitives
  (lump-cluster foliage, sphere-stack fruit) lit by a headlamp light and
  baked to a sprite, not painted. Sunflower (family 'flower') is explicitly
  EXCLUDED and kept on the old flat-painted path — stays exactly as liked.
  A real bug surfaced and got fixed during this pass, logged here in the
  interest of an honest build record: the first camera framing (copied
  proportionally from the tree/prop bake's asymmetric bottom=0 frustum)
  rendered every crop sprite BLANK — confirmed empirically with a debug
  render (a test sphere at the same framing produced zero non-background
  pixels) before touching the real geometry. A symmetric frustum centered
  on the view axis, tuned by iterating on the same debug sphere, fixed it
  (~450 of ~3200 pixels filled, no clipping) and is now what every crop
  bakes through. Verified after the fix: all 8 rebuilt crops (turnip,
  potato, cabbage, tomato, corn, eggplant, strawberry, pumpkin) render with
  visible dimensional shading and fill their tiles; sunflower unchanged;
  full Year-1 regression at 60fps, zero console errors, $216 math intact.

  V6b — SUNFLOWER + FORAGE ONTO THE SAME PIPELINE (user follow-up: "sunflower
  needs it [3D geometry] too, do a review"). Reversed the v6 sunflower
  exclusion — the flat-painted sunflower stood out as the one sticker next
  to baked-3D neighbors even though its color/silhouette was liked, so
  FAM3D.flower rebuilds that same yellow-petal/brown-disc language from real
  primitives (a radial ring of flattened box petals + a speckled cylinder
  disc on a stem), paintFlowerSprites() removed as dead code. Review of the
  rest of the game for the same flat-vs-3D gap found one more instance: the
  9-11 forage pickups (mushroom, walnut, berries, wintergreen, pinecone,
  daffodil, wildleek, honeycomb, worm, fern, shell) were raw emoji glyphs
  painted onto a billboard via emojiTex() — the exact same "sticker in a lit
  3D world" problem crops had. Rebuilt all of them as small baked-3D
  clusters on the same renderer/frustum, keyed 'forage_<id>' in the shared
  CropSprites bank, with an emoji fallback only if the bake doesn't run.
  Two world-space glyphs were reviewed and deliberately left flat: the
  shop-connection checkmark and the mailbox flag are status indicators, not
  objects with volume — matching the Art Bible's UI-chrome register, not the
  world-object one. Portraits and item-grid icons are also correctly out of
  scope for the same reason (distinct visual registers, not oversights).

  V6c — CROPS MATCHED AGAINST A REAL HM64 SCREENSHOT (user: "the crops don't
  look the same... it should be a giant ear of corn rather than a corn
  plant"). Pulled a real farm-field screenshot (RPGFan's HM64 gallery) and
  did an actual side-by-side. The fact that carried over — a ratio, not any
  traced art — is that a ripe HM64 crop tile IS the harvestable item,
  oversized, sitting straight on the ground; foliage is a thin collar
  underneath it, not a stem-and-leaves plant wearing the fruit as an
  accessory. Every FAM3D ripe-stage generator was rebuilt on that ratio:
  visible stems removed from ripe corn/tomato/eggplant, foliage lumps pulled
  down near the ground and shrunk, fruit primitives sized up so they
  dominate the silhouette. Corn specifically is now two big standing ears
  with a leaf collar and no stalk — the user's own example. Eggplant split
  off the shared 'vine' family into its own 'cluster' family (almost all
  fruit, per the reference) since tomato keeps more visible bush than
  eggplant does. Verified by pulling the live CropSprites bank into an
  on-page debug grid and by force-planting corn/eggplant/tomato in the live
  3D world at close camera range — both match the reference construction.
  Full Year-1 regression after: 60fps, zero console errors, harvest adds the
  right items to inventory.
-->
<style>
  :root {
    --cream:#F2E8CE; --border:#7A5C3E; --ink:#3E3226; --green:#4E7A5A;
    --wood:#A97B55; --path:#B99A6B;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:100%; height:100%; overflow:hidden; background:#2A241B;
    font-family:'Trebuchet MS','Verdana',sans-serif; touch-action:none;
    -webkit-user-select:none; user-select:none; }
  #app { position:fixed; inset:0; }
  #stage { position:absolute; overflow:hidden; background:#BFDCE8; }
  #c { position:absolute; left:0; top:0; width:100%; height:100%;
    image-rendering:pixelated; image-rendering:crisp-edges; display:block; }
  .grade { position:absolute; inset:0; pointer-events:none;
    transition:background-color 1.2s linear, opacity 1.2s linear; }
  #gradeSoft { mix-blend-mode:soft-light; background:#E8A87C; opacity:0; }
  #gradeMult { mix-blend-mode:multiply; background:#e0c0b0; opacity:0; }
  #ui { position:absolute; overflow:hidden; pointer-events:none; color:var(--ink); }
  #ui > * { pointer-events:auto; }

  /* HUD */
  #hud { position:absolute; left:10px; top:10px; pointer-events:none; }
  .plaque { background:var(--cream); border:3px solid var(--border); border-radius:10px;
    padding:6px 12px; font-weight:bold; line-height:1.25; box-shadow:0 2px 0 rgba(62,50,38,.25);
    font-size:14px; }
  #hudDate { font-size:15px; }
  #hudTime { font-size:13px; opacity:.85; }
  #hudMoney { color:#5a4a2e; font-size:14px; }
  #objective { position:absolute; left:50%; top:10px; transform:translateX(-50%);
    background:rgba(242,232,206,.92); border:2px solid var(--border); border-radius:8px;
    padding:3px 12px; font-size:12.5px; font-weight:bold; pointer-events:none;
    white-space:nowrap; }
  #held { position:absolute; right:12px; bottom:12px; width:64px; height:64px;
    background:var(--cream); border:3px solid var(--border); border-radius:12px;
    display:flex; align-items:center; justify-content:center; flex-direction:column;
    pointer-events:none; }
  #heldIcon { font-size:26px; line-height:1; }
  #heldName { font-size:9px; font-weight:bold; max-width:60px; text-align:center;
    overflow:hidden; }
  #heldCount { position:absolute; right:4px; bottom:2px; font-size:11px; font-weight:bold; }
  #toast { position:absolute; left:50%; bottom:118px; transform:translateX(-50%);
    background:rgba(242,232,206,.95); border:2px solid var(--border); border-radius:8px;
    padding:5px 14px; font-size:13px; font-weight:bold; opacity:0;
    transition:opacity .35s; pointer-events:none; white-space:nowrap; }

  /* Dialogue */
  #dlg { position:absolute; left:50%; bottom:14px; transform:translateX(-50%);
    width:86%; max-width:760px; background:var(--cream); border:4px solid var(--border);
    border-radius:14px; padding:12px 16px 14px; display:none; min-height:92px; }
  #dlgName { font-weight:bold; font-size:13px; color:#6b4a2e; margin-bottom:3px; }
  #dlgText { font-size:19px; line-height:1.4; min-height:80px; max-width:34ch; }
  #dlgMore { position:absolute; right:14px; bottom:6px; font-size:14px;
    animation:bob 1s ease-in-out infinite; }
  #dlgPortrait { position:absolute; left:-10px; top:-74px; width:84px; height:84px;
    border:4px solid var(--border); border-radius:12px; background:var(--cream);
    display:none; image-rendering:pixelated; }
  @keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(4px)} }
  #choices { position:absolute; right:8%; bottom:132px; display:none;
    flex-direction:column; gap:4px; background:var(--cream);
    border:3px solid var(--border); border-radius:10px; padding:6px; }
  .choiceBtn { background:var(--cream); border:3px solid var(--border); border-radius:10px;
    padding:7px 18px; font-size:15px; font-weight:bold; color:var(--ink); cursor:pointer;
    font-family:inherit; text-align:left; }
  .choiceBtn.sel { background:#e6d8b4; border-color:#5d452e; }

  /* Panels (menu, shop, title) */
  .panel { position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
    background:var(--cream); border:4px solid var(--border); border-radius:16px;
    padding:16px 20px; display:none; max-height:88%; overflow:auto; }
  #menu { width:82%; max-width:720px; height:80%; }
  .tabRow { display:flex; gap:6px; margin-bottom:12px; flex-wrap:wrap; }
  .tabBtn { background:#E4D6B4; border:2px solid var(--border); border-radius:8px 8px 0 0;
    padding:5px 12px; font-weight:bold; font-size:13px; cursor:pointer; color:var(--ink);
    font-family:inherit; }
  .tabBtn.on { background:var(--cream); border-bottom-color:var(--cream); }
  .tabBtn.ledger { color:var(--green); }
  #tabBody { font-size:14px; line-height:1.5; }
  .invGrid { display:grid; grid-template-columns:repeat(auto-fill,64px); gap:8px; }
  .invCell { width:64px; height:64px; background:#EADCBC; border:2px solid var(--border);
    border-radius:10px; display:flex; flex-direction:column; align-items:center;
    justify-content:center; cursor:pointer; position:relative; }
  .invCell.sel { outline:3px solid var(--green); }
  .invIcon { font-size:24px; } .invName { font-size:8px; font-weight:bold; text-align:center; }
  .invCt { position:absolute; right:3px; bottom:1px; font-size:10px; font-weight:bold; }
  button.uiBtn { background:#E4D6B4; border:3px solid var(--border); border-radius:10px;
    padding:6px 16px; font-weight:bold; font-size:14px; cursor:pointer; color:var(--ink);
    font-family:inherit; margin:4px 4px 4px 0; }
  button.uiBtn:active { transform:translateY(1px); }
  textarea.saveBox { width:100%; height:70px; font-size:11px; border:2px solid var(--border);
    border-radius:8px; background:#fff8e8; color:var(--ink); padding:6px; resize:none; }
  .shopRow { display:flex; align-items:center; gap:10px; padding:6px 4px;
    border-bottom:1px dashed #c9b68d; cursor:pointer; border-radius:6px; }
  .shopRow.sel { background:#e8dab6; }
  .shopIcon { font-size:22px; width:30px; text-align:center; }
  .shopName { flex:1; font-weight:bold; font-size:15px; }
  .shopPrice { font-weight:bold; font-size:15px; color:#5a4a2e; }
  .shopPrice.cant { color:#a55; }

  /* Radial ring */

/* ============================== CONFIG =================================== */
const CONFIG = {

              { id: 'wildleek', name: 'Wild Leek', icon: '🧅', sell: 5 } ],
    Summer: [ { id: 'honeycomb', name: 'Honeycomb', icon: '🍯', sell: 7 } ]
  },

  PALETTE: {
    grass: '#7FA86A', grassShade: '#5E8A55', grassWinter: '#A8B098',
    grassWinterShade: '#8C9682',
    tilled: '#8A6248', wateredSoil: '#6B4A3A', cleared: '#96865E',
    path: '#B99A6B', wood: '#A97B55', roofRed: '#B3574C', roofTeal: '#5E8E8A',
    stone: '#9C9C94', water: '#6FA3B8', sky: '#BFDCE8', skyNight: '#3A4260',
    cream: '#F2E8CE', border: '#7A5C3E', ink: '#3E3226', green: '#4E7A5A',
    sand: '#D8C494'

/* ================================ RNG ==================================== */
// sfc32 + splitmix32 seeding. Three streams: gen (worldgen, consumed once),
// calendar (per-day, index-addressed), live (moment-to-moment).
function splitmix32(a) {
  return function () {
    a |= 0; a = a + 0x9e3779b9 | 0;
    let t = a ^ a >>> 16; t = Math.imul(t, 0x21f0aaad);
    t = t ^ t >>> 15; t = Math.imul(t, 0x735a2d97);
    return ((t = t ^ t >>> 15) >>> 0) / 4294967296;
  };
}
function sfc32(a, b, c, d) {
  return function () {
    a >>>= 0; b >>>= 0; c >>>= 0; d >>>= 0;
    let t = (a + b) | 0;
    a = b ^ b >>> 9; b = c + (c << 3) | 0; c = (c << 21 | c >>> 11);
    d = d + 1 | 0; t = t + d | 0; c = c + t | 0;
    return (t >>> 0) / 4294967296;
  };
}
function makeStream(seed, key) {
  const mix = splitmix32((seed ^ key) | 0);
  const s = sfc32(mix() * 4294967296, mix() * 4294967296, mix() * 4294967296, mix() * 4294967296);
  for (let i = 0; i < 12; i++) s();   // warm up
  return s;
}
const RNG = { seed: 0, streams: {} };
function seedRNG(seed) {
  RNG.seed = seed >>> 0;
  RNG.streams.gen = makeStream(RNG.seed, 0x67656E);
  RNG.streams.live = makeStream(RNG.seed, 0x6C697665);
}
// The single gateway for all draws.
function rand(stream) { return RNG.streams[stream](); }
function randi(stream, lo, hi) { return lo + Math.floor(rand(stream) * (hi - lo + 1)); }
// Calendar stream: a fresh generator per absolute day so loads never reshuffle.
function calendarDay(dayIndex) {
  const s = makeStream(RNG.seed, 0x63616C ^ Math.imul(dayIndex + 1, 0x9E37));
  return { r: s };
}

/* ============================== HELPERS ================================== */
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
const lerp = (a, b, t) => a + (b - a) * t;
function lerpHex(a, b, t) {
  const pa = parseInt(a.slice(1), 16), pb = parseInt(b.slice(1), 16);
  const ar = pa >> 16 & 255, ag = pa >> 8 & 255, ab = pa & 255;
  const br = pb >> 16 & 255, bg = pb >> 8 & 255, bb = pb & 255;
  const r = Math.round(lerp(ar, br, t)), g = Math.round(lerp(ag, bg, t)), bl = Math.round(lerp(ab, bb, t));
  return '#' + ((1 << 24) + (r << 16) + (g << 8) + bl).toString(16).slice(1);
}
const dist2 = (ax, az, bx, bz) => { const dx = ax - bx, dz = az - bz; return dx * dx + dz * dz; };
const $ = id => document.getElementById(id);
function seasonOf(day) { return CONFIG.SEASONS[Math.floor(day / CONFIG.SEASON_DAYS) % 4]; }
function dayOfSeason(day) { return day % CONFIG.SEASON_DAYS + 1; }
function yearOf(day) { return Math.floor(day / CONFIG.YEAR_DAYS) + 1; }
function isRestday(day) { return dayOfSeason(day) === 3; }
function fmtHour(h) {
  const hh = Math.floor(h), mm = Math.floor((h - hh) * 60);
  return hh + ':' + String(mm).padStart(2, '0');
}
function b64encode(str) { return btoa(unescape(encodeURIComponent(str))); }
function b64decode(str) { return decodeURIComponent(escape(atob(str))); }

/* ============================ GAME STATE ================================= */
const G = {
  mode: 'boot',            // boot | title | play | scene | sleep
  world: null,
  day: CONFIG.START_DAY,
  hour: CONFIG.DAY_START,
  weather: 'sun',
  money: CONFIG.START_MONEY,
  stamina: CONFIG.STAMINA_MAX,
  fatigue: 0,
  collapsedYesterday: false,
  inventory: {},           // itemId -> count
  heldItem: null,          // itemId or tool id
  tools: ['hoe', 'can', 'axe', 'hammer', 'sickle'],
  pendingChecks: [],       // {amount, arriveDay, label}
  todayShipped: [],        // {id, name, count, value, enterprise}
  mail: [],                // {day, from, title, body, read}
  journal: [],             // {day, lines[]}
  dayFlags: {},            // reset each rollover; feeds journal
  flags: {},               // persistent story flags
  ledger: { unlocked: false, entries: [] },  // {day, amount, enterprise, note}
  network: { connected: {} },
  jobs: [],                // invoiced odd jobs
  toolTiers: {},           // tool -> tier (0 base, 1 copper, …)
  toolAway: null,          // {tool, backDay} while at the forge
  contracts: {},           // castId -> standing order
  backpack: 12,            // inventory kinds cap: 12 → 24 → 36
  upgrades: {},            // kitchen, porch, …
  farmName: 'Sundrop Farm',
  playerName: 'You',
  look: { skin: 0, hair: 0, shirt: 0 },
  hearts: {},
  paused: false,
  uiOpen: null,            // 'menu' | 'shop' | 'dialogue' | 'radial' | 'year'
  hideHUD: false,
  autosave: null,
  input: { x: 0, z: 0, act: false },
  fps: { frames: 0, last: 0, value: 60 }
};
/* ============================== WORLDGEN ================================= */
function genTownName() {
  const starts = ['Bell', 'Har', 'Wil', 'Ash', 'Fern', 'Cop', 'Mar', 'Dun', 'Hazel', 'Bram', 'Stone', 'Alder'];
  const mids = ['low', 'ren', 'der', 'ber', 'ing', 'ne', ''];
  const ends = ['mere', 'ford', 'holt', 'wyck', 'dale', 'brook'];
  return starts[randi('gen', 0, starts.length - 1)] +
         mids[randi('gen', 0, mids.length - 1)] +
         ends[randi('gen', 0, ends.length - 1)];
}

function generateWorld(seed) {
  seedRNG(seed);
  const W = { seed, colliders: [], circles: [] };
  W.townName = genTownName();
  W.coastal = rand('gen') < 0.4;

  // ---- macro layout (gen stream, consumed in fixed order) ----
  const pathZ = 4;
  W.pathZ = pathZ;
  W.riverX = -20 + rand('gen') * 22;                 // [-20, 2]
  W.riverPhase = rand('gen') * Math.PI * 2;
  const farmX = -76 + rand('gen') * 10;              // field centre x
  const townX = 42 + rand('gen') * 14;
  W.farm = { x: farmX };
  W.town = { x: townX };
  W.shoreX = W.riverX + (rand('gen') < 0.5 ? -1 : 1) * (14 + rand('gen') * 12);
  W.trailX = townX - 26 + rand('gen') * 10;

  // river polyline (north edge to the shore pool)
  W.riverW = 6;
  W.river = [];
  for (let z = -90; z <= 38; z += 8) {
    W.river.push({ x: W.riverX + Math.sin(z * 0.06 + W.riverPhase) * 3, z });
  }
  W.river.push({ x: lerp(W.riverX, W.shoreX, 0.5), z: 48 });
  W.river.push({ x: W.shoreX, z: 58 });
  W.pool = { x: W.shoreX, z: 66, r: 9 };
  if (W.coastal) W.river.push({ x: W.shoreX, z: 76 });
  W.oceanZ = 74;                                     // coastal seeds only

  // ---- farm ----
  const fx0 = Math.round(farmX) - 15, fz0 = -6;
  W.field = { x0: fx0, z0: fz0, w: CONFIG.FIELD_W, h: CONFIG.FIELD_H };
  W.house = { x: fx0 + 15, z: fz0 - 5.5, w: 9, d: 7 };
  W.bin = { x: fx0 + 23, z: fz0 - 3.5 };
  W.well = { x: fx0 + 7, z: fz0 - 3.5 };
  W.mailbox = { x: fx0 + 30.5, z: pathZ - 2 };
  W.gate = { x: fx0 + 30, z: pathZ };
  W.farmRect = { x0: fx0 - 8, z0: fz0 - 12, x1: fx0 + 38, z1: fz0 + CONFIG.FIELD_H + 4 };

  // ---- town: constant businesses, seeded order along the street ----
  const shopDefs = [
    { id: 'general', name: "Bramm's General",     roof: 'red',  w: 10, d: 8, wallStyle: 'plank', chimney: true },
    { id: 'forge',   name: "Hetta's Forge & Supply", roof: 'teal', w: 9, d: 7, wallStyle: 'plaster', chimney: true },
    { id: 'carpenter', name: "Corwin's Carpentry", roof: 'red',  w: 9, d: 7, wallStyle: 'plank' },
    { id: 'clinic',  name: 'Clinic',               roof: 'teal', w: 8, d: 7, wallStyle: 'plaster' },
    { id: 'tavern',  name: 'The Bluebird',         roof: 'red',  w: 11, d: 9, wallStyle: 'plankTeal', chimney: true },
    { id: 'home1',   name: '',                     roof: 'teal', w: 7, d: 6, wallStyle: 'plaster' },
    { id: 'home2',   name: '',                     roof: 'red',  w: 7, d: 6, wallStyle: 'plank' }
  ];
  // shuffle with gen stream (Fisher-Yates)
  for (let i = shopDefs.length - 1; i > 0; i--) {
    const j = randi('gen', 0, i);
    [shopDefs[i], shopDefs[j]] = [shopDefs[j], shopDefs[i]];
  }
  W.shops = [];
  let sx = townX - 36;
  for (const def of shopDefs) {
    W.shops.push(Object.assign({ x: sx + def.w / 2, z: -3.5 }, def));
    sx += def.w + 4;
  }
  W.gazebo = { x: townX, z: 16 };
  W.ranchGate = { x: townX + 42, z: pathZ };
  W.townRect = { x0: townX - 42, z0: -14, x1: townX + 46, z1: 26 };

  // ---- shore & ridge ----
  W.bench = { x: W.pool.x + 6, z: W.pool.z - 7 };
  W.dock = { x: W.pool.x - 2, z: W.pool.z - 5 };
  W.marker = { x: W.trailX, z: -62 };
  W.overlook = { x: W.trailX - 9, z: -70 };

  // ---- paths (painted + kept clear of trees) ----
  W.paths = [
    { pts: [{ x: W.gate.x, z: pathZ }, { x: townX - 38, z: pathZ }, { x: townX + 40, z: pathZ }], w: 3 },
    { pts: [{ x: townX, z: pathZ }, { x: townX, z: 16 }], w: 2.5 },                        // square
    { pts: [{ x: townX - 6, z: pathZ }, { x: W.pool.x + 2, z: W.pool.z - 8 }], w: 2 },     // shore trail
    { pts: [{ x: W.trailX + 4, z: pathZ }, { x: W.trailX, z: -30 }, { x: W.marker.x, z: W.marker.z + 3 }], w: 2 }, // ridge trail
    { pts: [{ x: W.house.x, z: W.house.z + 4 }, { x: W.house.x, z: fz0 + 3 }], w: 1.5 }    // porch
  ];

  // ---- walkability mask (1 = blocked) ----
  const MW = CONFIG.WORLD_W, MH = CONFIG.WORLD_H;
  const mask = new Uint8Array(MW * MH);
  const mi = (x, z) => (Math.floor(z) + 90) * MW + (Math.floor(x) + 120);
  const block = (x, z) => { if (x >= -120 && x < 120 && z >= -90 && z < 90) mask[mi(x, z)] = 1; };
  // world edges
  for (let x = -120; x < 120; x++) for (let z = -90; z < 90; z++) {
    if (x < -117 || x > 116 || z < -87 || z > 86) block(x, z);
  }
  // ridge face
  for (let x = -120; x < 120; x++) for (let z = -90; z < -74; z++) block(x, z);
  // river (skip bridge span)
  W.bridge = { x: 0, z: pathZ, w: 8 };
  for (let i = 0; i < W.river.length - 1; i++) {
    const a = W.river[i], b = W.river[i + 1];
    const steps = Math.ceil(Math.hypot(b.x - a.x, b.z - a.z));
    for (let s = 0; s <= steps; s++) {
      const x = lerp(a.x, b.x, s / steps), z = lerp(a.z, b.z, s / steps);
      if (Math.abs(z - pathZ) < 2.6) { W.bridge.x = x; continue; }   // bridge crossing
      for (let dx = -W.riverW / 2; dx <= W.riverW / 2; dx++) block(x + dx, z);
    }
  }
  // pool
  for (let x = -120; x < 120; x++) for (let z = -90; z < 90; z++) {
    if (dist2(x + 0.5, z + 0.5, W.pool.x, W.pool.z) < W.pool.r * W.pool.r) block(x, z);
  }
  // ocean
  if (W.coastal) {
    for (let x = -120; x < 120; x++) for (let z = W.oceanZ; z < 90; z++) block(x, z);
  }
  W.mask = mask;
  W.walkable = (x, z) => {

    if (inRect(W.farmRect, x, z) || inRect(W.townRect, x, z)) continue;
    if (!W.walkable(x, z) || nearPath(x, z)) continue;
    if (dist2(x, z, W.pool.x, W.pool.z) < 200) continue;
    if (dist2(x, z, W.marker.x, W.marker.z) < 40) continue;
    let ok = true;
    for (const t of W.trees) if (dist2(x, z, t.x, t.z) < 22) { ok = false; break; }
    if (!ok) continue;

    if (!W.walkable(x, z) || nearPath(x, z)) continue;

        else if (r < 0.655) obj = 'boulder';

  const pal = [...buckets.values()].sort((a, b) => b[0] - a[0]).slice(0, n)
    .map(b => [b[1] / b[0], b[2] / b[0], b[3] / b[0]]);
  if (!pal.length) return canvas;
  for (let i = 0; i < d.length; i += 4) {
    if (d[i + 3] < 40) { d[i + 3] = 0; continue; }
    let best = 0, bd = 1e9;
    for (let p = 0; p < pal.length; p++) {
      const dr = d[i] - pal[p][0], dg = d[i + 1] - pal[p][1], db = d[i + 2] - pal[p][2];
      const dist = dr * dr + dg * dg + db * db;
      if (dist < bd) { bd = dist; best = p; }
    }
    d[i] = pal[best][0]; d[i + 1] = pal[best][1]; d[i + 2] = pal[best][2];
    d[i + 3] = 255;
  }
  ctx.putImageData(img, 0, 0);

}

/* ---- seasonal tile-family palettes: real repaints, not hue shifts ---- */
// Art Bible §2: per-material seasonal ramps (our own original palette,
// calibrated against the reference's color RELATIONSHIPS, not copied values).
const SEASON_TILES = {
  Spring: { grass: '#7FA86A', grassLight: '#93B87C', grassDark: '#5E8A55', fleck: '#C8DCA0',
    path: '#B99A6B', stone: '#9C9C94', water: '#6FA3B8', sky: '#BFDCE8', particle: '#E8C8D4', wood: '#A97B55' },
  Summer: { grass: '#8CA85E', grassLight: '#A6B468', grassDark: '#6E8A4E', fleck: '#B4C078',
    path: '#C2A070', stone: '#9C9C94', water: '#64A0B4', sky: '#B4D6E4', particle: '#E8E2A0', wood: '#A97B55' },
  Autumn: { grass: '#A0925A', grassLight: '#B0A26A', grassDark: '#7E7346', fleck: '#8A7648',
    path: '#B0926A', stone: '#9C9C94', water: '#7A9AA6', sky: '#C6D8DC', particle: '#C08A4A', wood: '#9A6E4C' },
  Winter: { grass: '#E8EAE6', grassLight: '#F2F4F0', grassDark: '#C9CFCB', fleck: '#9AA08C',
    path: '#A6906B', stone: '#A4A8A2', water: '#8FA8B8', sky: '#D2DCE0', particle: '#F0F2EE', wood: '#8A6248' }

function paintTileInto(ctx, col, row, painter) {

function speck(ctx, colors, count) {

}
function buildTerrainAtlas(season) {
  const S = SEASON_TILES[season], P = CONFIG.PALETTE, T = TER.T;
  const winter = season === 'Winter';

    TER.atlasCanvas = document.createElement('canvas');
    TER.atlasCanvas.width = TER_COLS * TER_PX;
    TER.atlasCanvas.height = TER_ROWS * TER_PX;
  }

  const at = i => [i % TER_COLS, Math.floor(i / TER_COLS)];
  const grassPainter = variant => c => {
    c.fillStyle = S.grass; c.fillRect(0, 0, 32, 32);
    speck(c, [S.grassLight, S.grassDark, S.fleck], 60 + variant * 25);
    if (season === 'Autumn') {           // dry and patchy, not hue-shifted
      c.fillStyle = '#B8A468';
      for (let i = 0; i < 3 + variant; i++) {
        c.beginPath();
        c.ellipse(rand('live') * 32, rand('live') * 32, 3 + rand('live') * 4, 2 + rand('live') * 3, 0, 0, 7);
        c.fill();
      }
      speck(c, ['#C8B478', S.grassDark], 30);
    }
    if (winter) {                        // snow tiles with grass poking through
      c.fillStyle = 'rgba(160,172,150,0.8)';
      for (let i = 0; i < 6; i++) c.fillRect(Math.floor(rand('live') * 32), Math.floor(rand('live') * 32), 2, 1);
    }
    if (season === 'Spring' && variant === 2) {   // scattered blossom flecks
      c.fillStyle = '#EAD8E4';
      for (let i = 0; i < 5; i++) c.fillRect(Math.floor(rand('live') * 32), Math.floor(rand('live') * 32), 1, 1);
    }
  };
  [T.GRASS0, T.GRASS1, T.GRASS2].forEach((idx, v) => paintTileInto(ctx, ...at(idx), grassPainter(v)));
  const pathColor = S.path;   // seasonal (§2) — winter's is already the dark packed-cut tone
  paintTileInto(ctx, ...at(T.PATH), c => {
    c.fillStyle = pathColor; c.fillRect(0, 0, 32, 32);
    speck(c, [winter ? '#7A6A50' : '#A8895C', winter ? '#9C8A6C' : '#C9AC7C'], 70);
  });
  paintTileInto(ctx, ...at(T.TILLED), c => {
    c.fillStyle = P.tilled; c.fillRect(0, 0, 32, 32);
    speck(c, ['#7d573f', '#966c50'], 60);
    c.fillStyle = 'rgba(60,40,28,.5)';
    for (let y = 3; y < 32; y += 7) c.fillRect(0, y, 32, 2);
  });
  paintTileInto(ctx, ...at(T.WATERED), c => {
    c.fillStyle = P.wateredSoil; c.fillRect(0, 0, 32, 32);
    speck(c, ['#5d4033', '#785443'], 60);

    for (let y = 3; y < 32; y += 7) c.fillRect(0, y, 32, 2);
  });
  paintTileInto(ctx, ...at(T.SAND), c => {
    c.fillStyle = winter ? '#C8BCA4' : P.sand; c.fillRect(0, 0, 32, 32);
    speck(c, ['#C4B084', '#E8D8AC'], 50);
  });
  paintTileInto(ctx, ...at(T.STONE), c => {
    c.fillStyle = S.stone; c.fillRect(0, 0, 32, 32);
    speck(c, ['#8C8C84', '#AEAEA6', winter ? '#D8DCD8' : '#90948C'], 55);
  });
  // grass→path transition edges (§1): fringe on the path side
  const edge = dir => c => {
    grassPainter(0)(c);
    c.fillStyle = pathColor;

    if (dir === 'S') { c.fillRect(0, 25, 32, 7); speck2(c, 0, 22, 32, 5); }
    if (dir === 'W') { c.fillRect(0, 0, 7, 32); speck2(c, 5, 0, 5, 32); }
    if (dir === 'E') { c.fillRect(25, 0, 7, 32); speck2(c, 22, 0, 5, 32); }
  };
  const speck2 = (c, x, y, w, h) => {
    c.fillStyle = pathColor;
    for (let i = 0; i < 14; i++) c.fillRect(x + Math.floor(rand('live') * w), y + Math.floor(rand('live') * h), 2, 1);
  };
  paintTileInto(ctx, ...at(T.EDGE_N), edge('N'));
  paintTileInto(ctx, ...at(T.EDGE_E), edge('E'));
  paintTileInto(ctx, ...at(T.EDGE_S), edge('S'));
  paintTileInto(ctx, ...at(T.EDGE_W), edge('W'));
  // Art Bible §2 correction: HM64 keeps unworked field grass vividly green —
  // only tilled soil goes brown. SCRUFF (the base under still-wild farm
  // tiles) previously carried a heavy brown speckle that dulled the whole
  // field; cut it to a light, sparse tell rather than a wash.
  paintTileInto(ctx, ...at(T.SCRUFF), c => {
    grassPainter(1)(c);
    c.fillStyle = winter ? 'rgba(150,140,110,0.22)' : 'rgba(150,132,94,0.18)';
    for (let i = 0; i < 4; i++) c.fillRect(Math.floor(rand('live') * 30), Math.floor(rand('live') * 30), 3, 2);
  });
  paintTileInto(ctx, ...at(T.WATER), c => {
    c.fillStyle = S.water; c.fillRect(0, 0, 32, 32);
    speck(c, ['#5E96AC', '#84B4C8'], 40);
  });
  paintTileInto(ctx, ...at(T.WEDGE), c => {   // shallow water edge
    c.fillStyle = '#8CB8C4'; c.fillRect(0, 0, 32, 32);
    speck(c, ['#A4CCD4', S.water], 45);
  });
  paintTileInto(ctx, ...at(T.SNOWP), c => {   // spare tile: packed snow / pale rock
    c.fillStyle = '#E8ECE8'; c.fillRect(0, 0, 32, 32);
    speck(c, ['#D4DCD4', '#F6F8F6'], 40);
  });

  quantizeCanvas(TER.atlasCanvas, 48);   // ~16 per family across 3 families
  if (!TER.atlasTex) {
    TER.atlasTex = nearestTex(TER.atlasCanvas);
  } else TER.atlasTex.needsUpdate = true;
}

/* ---- tile classification from the same worldgen data ---- */
const TCLS = { GRASS: 0, PATH: 1, SAND: 2, WATER: 3, WEDGE: 4, STONE: 5, SCRUFF: 6 };
function classifyTerrain() {
  const W = G.world;
  const MW = CONFIG.WORLD_W, MH = CONFIG.WORLD_H;
  const cls = new Uint8Array(MW * MH);
  const nearPathDist = (x, z) => {
    let best = 1e9;
    for (const p of W.paths) for (let i = 0; i < p.pts.length - 1; i++) {
      const a = p.pts[i], b = p.pts[i + 1];
      const l2 = dist2(a.x, a.z, b.x, b.z) || 1;
      let t = ((x - a.x) * (b.x - a.x) + (z - a.z) * (b.z - a.z)) / l2;
      t = clamp(t, 0, 1);
      best = Math.min(best, dist2(x, z, lerp(a.x, b.x, t), lerp(a.z, b.z, t)) - p.w * p.w / 4);
    }
    return best;
  };
  for (let iz = 0; iz < MH; iz++) for (let ix = 0; ix < MW; ix++) {
    const x = ix - 120 + 0.5, z = iz - 90 + 0.5;
    let c = TCLS.GRASS;
    if (z < -74) c = TCLS.STONE;
    else if (isWaterAt(x, z)) c = TCLS.WATER;
    else if (W.coastal && z > W.oceanZ - 3) c = TCLS.SAND;
    else if (dist2(x, z, W.pool.x, W.pool.z) < (W.pool.r + 2.5) ** 2) c = TCLS.SAND;
    else if (nearPathDist(x, z) < 0) c = TCLS.PATH;
    else if (dist2(x, z, W.gazebo.x, W.gazebo.z) < 110) c = TCLS.PATH;   // the square apron
    else if (x >= W.field.x0 && x < W.field.x0 + W.field.w && z >= W.field.z0 && z < W.field.z0 + W.field.h) c = TCLS.SCRUFF;
    cls[iz * MW + ix] = c;
  }
  // shallow edges: water next to land
  for (let iz = 0; iz < MH; iz++) for (let ix = 0; ix < MW; ix++) {
    if (cls[iz * MW + ix] !== TCLS.WATER) continue;
    const n = [cls[iz * MW + Math.max(0, ix - 1)], cls[iz * MW + Math.min(MW - 1, ix + 1)],
      cls[Math.max(0, iz - 1) * MW + ix], cls[Math.min(MH - 1, iz + 1) * MW + ix]];
    if (n.some(v => v !== TCLS.WATER && v !== TCLS.WEDGE)) cls[iz * MW + ix] = TCLS.WEDGE;
  }
  TER.cls = cls;
}

/* ---- corner heights on the shared lattice, snapped to 0.25m (§1) ---- */
function cornerHeight(ix, iz) {
  const W = G.world;
  const x = ix - 120, z = iz - 90;
  // water cuts
  if (isWaterAt(x, z)) return -0.5;
  let near = false;
  for (const [dx, dz] of [[0.9, 0], [-0.9, 0], [0, 0.9], [0, -0.9]]) {
    if (isWaterAt(x + dx, z + dz)) { near = true; break; }
  }
  if (near) return -0.25;
  // the ridge rises in hand-cut terraces; the trail is cut flat into it
  if (z < -58) {
    let h = Math.min(3, (Math.floor((-58 - z) / 5) + 1) * 0.5);
    const tdx = Math.abs(x - W.trailX), mdx = Math.abs(x - W.marker.x);
    if ((tdx < 3.5 || mdx < 4.5) && z > -72) h = Math.min(h, 0.25);   // trail cut + marker shelf
    return h;
  }
  // beaches slope a step down
  if (W.coastal && z > W.oceanZ - 4) return -0.25;
  // flat play zones
  const inRect = (r) => x > r.x0 - 2 && x < r.x1 + 2 && z > r.z0 - 2 && z < r.z1 + 2;
  if (inRect(W.farmRect) || inRect(W.townRect)) return 0;
  const c = TER.cls && TER.cls[clamp(iz, 0, 179) * 240 + clamp(ix, 0, 239)];
  if (c === TCLS.PATH || c === TCLS.SAND) return 0;
  // gentle terraced relief in the wilds: worldgen noise, quantized
  const cellHash = Math.abs(Math.sin(Math.floor(ix / 7) * 127.1 + Math.floor(iz / 7) * 311.7) * 43758.5);
  const f = cellHash - Math.floor(cellHash);
  return f < 0.6 ? 0 : f < 0.85 ? 0.25 : 0.5;
}
function terrainHeightAt(x, z) {
  const ix = clamp(Math.floor(x + 120), 0, 239), iz = clamp(Math.floor(z + 90), 0, 179);
  const fx = x + 120 - ix, fz = z + 90 - iz;
  const h00 = cornerHeight(ix, iz), h10 = cornerHeight(ix + 1, iz);
  const h01 = cornerHeight(ix, iz + 1), h11 = cornerHeight(ix + 1, iz + 1);
  return lerp(lerp(h00, h10, fx), lerp(h01, h11, fx), fz);
}

/* ---- the mesh: one indexed BufferGeometry, one draw call ---- */
function buildTerrainMesh() {
  classifyTerrain();
  const MW = 240, MH = 180, T = TER.T;
  const cls = TER.cls;
  const pos = new Float32Array(MW * MH * 4 * 3);
  const uv = new Float32Array(MW * MH * 4 * 2);
  const col = new Float32Array(MW * MH * 4 * 3);
  const idx = new Uint32Array(MW * MH * 6);
  const du = 1 / TER_COLS, dv = 1 / TER_ROWS;
  const W = G.world;
  const tileIndexFor = (ix, iz) => {
    const c = cls[iz * MW + ix];
    if (c === TCLS.WATER) return T.WATER;
    if (c === TCLS.WEDGE) return T.WEDGE;
    if (c === TCLS.SAND) return T.SAND;
    if (c === TCLS.STONE) return T.STONE;
    if (c === TCLS.SCRUFF) return T.SCRUFF;
    if (c === TCLS.PATH) return T.PATH;
    // grass: transition edge if a path neighbours it, else a random variant
    const n = (dx, dz) => cls[clamp(iz + dz, 0, MH - 1) * MW + clamp(ix + dx, 0, MW - 1)];
    if (n(0, -1) === TCLS.PATH) return T.EDGE_N;
    if (n(1, 0) === TCLS.PATH) return T.EDGE_E;
    if (n(0, 1) === TCLS.PATH) return T.EDGE_S;
    if (n(-1, 0) === TCLS.PATH) return T.EDGE_W;
    const h = Math.abs(Math.sin(ix * 12.99 + iz * 78.23) * 43758.5);
    return [T.GRASS0, T.GRASS1, T.GRASS2][Math.floor((h - Math.floor(h)) * 3)];
  };
  let v = 0, u = 0, ci = 0, ii = 0, vertIndex = 0;
  for (let iz = 0; iz < MH; iz++) for (let ix = 0; ix < MW; ix++) {
    const x0 = ix - 120, z0 = iz - 90;
    const ti = tileIndexFor(ix, iz);
    const tc = ti % TER_COLS, tr = Math.floor(ti / TER_COLS);
    const corners = [
      [x0, cornerHeight(ix, iz), z0],
      [x0 + 1, cornerHeight(ix + 1, iz), z0],
      [x0, cornerHeight(ix, iz + 1), z0 + 1],
      [x0 + 1, cornerHeight(ix + 1, iz + 1), z0 + 1]
    ];
    for (const cpt of corners) { pos[v++] = cpt[0]; pos[v++] = cpt[1]; pos[v++] = cpt[2]; }
    // v flipped: atlas rows top-down
    const u0 = tc * du, v1 = 1 - tr * dv, v0 = v1 - dv;
    uv[u++] = u0; uv[u++] = v1;  uv[u++] = u0 + du; uv[u++] = v1;
    uv[u++] = u0; uv[u++] = v0;  uv[u++] = u0 + du; uv[u++] = v0;
    // per-vertex warm contact shading (§1): darker near water, cliffs, banks
    for (let k = 0; k < 4; k++) {
      const cy = corners[k][1];
      let shade = 1 - Math.max(0, -cy) * 0.35;         // banks darken toward water
      if (cy > 0) shade = 1 - cy * 0.06;               // terrace tops slightly cooler
      const wob = 0.97 + (Math.abs(Math.sin((ix + k) * 91.7 + iz * 47.3) * 10) % 1) * 0.05;
      shade *= wob;
      col[ci++] = shade; col[ci++] = shade * 0.995; col[ci++] = shade * 0.97;   // warm, never grey
    }
    idx[ii++] = vertIndex; idx[ii++] = vertIndex + 2; idx[ii++] = vertIndex + 1;
    idx[ii++] = vertIndex + 1; idx[ii++] = vertIndex + 2; idx[ii++] = vertIndex + 3;
    vertIndex += 4;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('uv', new THREE.BufferAttribute(uv, 2));
  geo.setAttribute('color', new THREE.BufferAttribute(col, 3));
  geo.setIndex(new THREE.BufferAttribute(idx, 1));
  geo.computeVertexNormals();
  const mat = new THREE.MeshLambertMaterial({ map: TER.atlasTex, vertexColors: true });
  TER.mesh = new THREE.Mesh(geo, mat);
  TER.mesh.frustumCulled = false;
  return TER.mesh;
}
function repaintTerrainSeason(season) {
  if (TER.season === season) return;
  TER.season = season;
  buildTerrainAtlas(season);
}
/* ============ RENDER: props become sprites (HM64 pass §3) ================ */
// Trees, fences, the well, mailbox, bench and marker are modeled once, baked
// under the headlamp light to painted sprites at boot, and drawn as
// billboards Y-sorted with the characters. Architecture stays true 3D —
// that geometry/sprite split is the signature look.

const PropBank = {};   // key -> { tex, w, h }  (w/h in world units)
// Art Bible §2: tree canopy row. Autumn is three mixed tones per tree, not one
// hue-shift — applied per-lump below so a single baked sprite reads mottled.
const SEASON_CANOPY = {
  Spring: { round: '#6E9A5E', pine: '#4E7A55', extra: '#EAD8E4' },
  Summer: { round: '#5E8A55', pine: '#3E6A48', extra: null },
  Autumn: { round: ['#B3674C', '#C08A4A', '#8A6D42'], pine: '#5E7A50', extra: null },
  Winter: { round: '#6E5A48', pine: '#7A8A80', extra: '#E8EAE6' }   // bare wood + snow cap
};

function bakePropSprites(season) {
  if (!CONFIG.BAKE_SPRITES) return;
  let rend = null;
  try {
    rend = new THREE.WebGLRenderer({ antialias: false, alpha: true, preserveDrawingBuffer: true });
    rend.setPixelRatio(1);
    const scene = new THREE.Scene();
    scene.add(new THREE.AmbientLight(0xffffff, 0.78));
    const dir = new THREE.DirectionalLight(0xfff4e0, 0.55);
    dir.position.set(0, 2.8, 2.4);
    scene.add(dir); scene.add(dir.target);
    dir.target.position.set(0, 0.8, 0);
    dir.target.updateMatrixWorld();
    const C = SEASON_CANOPY[season];

    const bake = (key, buildFn, worldW, worldH, px) => {
      const model = buildFn();
      scene.add(model);
      const pw = px || 96;
      const ph = Math.round(pw * worldH / worldW);
      rend.setSize(pw, ph, false);
      const cam = new THREE.OrthographicCamera(-worldW / 2, worldW / 2, worldH, 0, 0.1, 30);
      cam.position.set(0, 2.8, 6);
      cam.lookAt(0, worldH * 0.4, 0);
      rend.setClearColor(0x000000, 0);
      rend.render(scene, cam);
      const canvas = document.createElement('canvas');
      canvas.width = pw; canvas.height = ph;
      canvas.getContext('2d').drawImage(rend.domElement, 0, 0);
      quantizeCanvas(canvas, 16);          // CI4 flavor per sprite (§4)
      scene.remove(model);
      if (PropBank[key] && PropBank[key].tex) {
        PropBank[key].tex.image = canvas;
        PropBank[key].tex.needsUpdate = true;
        PropBank[key].w = worldW; PropBank[key].h = worldH;
      } else {
        PropBank[key] = { tex: nearestTex(canvas), w: worldW, h: worldH };
      }
    };

    bake('treeRound', () => {
      // A cluster of overlapping low-poly blobs, not one icosahedron: from any
      // bake angle this silhouettes round-and-fluffy rather than a single
      // sharp apex (an icosahedron's 12-vertex arrangement can project as a
      // pyramid from a near-frontal camera — the classic low-poly tree trick
      // is to break the canopy into several smaller lumps instead).
      const g = new THREE.Group();
      const woodTone = (SEASON_TILES[season] && SEASON_TILES[season].wood) || '#7d5a3e';
      const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.3, 1.3, 6), lambert(woodTone));
      trunk.position.y = 0.65; g.add(trunk);
      // Autumn: three mixed tones cycled per lump (§2), not one hue-shift —
      // a single baked sprite reads mottled instead of flatly recolored.
      const autumnMats = Array.isArray(C.round) ? C.round.map(lambert) : null;
      const canMat = autumnMats ? null : lambert(C.round);
      const lumps = [
        [0, 2.55, 0, 1.15], [-0.75, 2.15, 0.3, 0.85], [0.8, 2.2, -0.2, 0.85],
        [0.1, 2.9, -0.5, 0.8], [-0.3, 2.85, 0.5, 0.75]
      ];
      lumps.forEach(([lx, ly, lz, lr], i) => {
        const mat = autumnMats ? autumnMats[i % autumnMats.length] : canMat;
        const lump = new THREE.Mesh(new THREE.IcosahedronGeometry(lr, 1), mat);
        lump.position.set(lx, ly, lz);
        g.add(lump);
      });
      if (C.extra && season === 'Spring') {   // blossom flecks
        for (let i = 0; i < 5; i++) {
          const fleck = new THREE.Mesh(new THREE.SphereGeometry(0.14, 5, 4), lambert(C.extra));
          const a = i / 5 * Math.PI * 2;
          fleck.position.set(Math.cos(a) * 1.3, 2.4 + Math.sin(a * 2) * 0.7, 0.9 + Math.sin(a) * 0.3);
          g.add(fleck);
        }
      }
      if (season === 'Winter' && C.extra) {   // snow cap, from the seasonal ramp
        for (const [lx, ly, lz, lr] of lumps) {
          const snow = new THREE.Mesh(new THREE.IcosahedronGeometry(lr * 1.05, 1), lambert(C.extra));
          snow.position.set(lx, ly + lr * 0.35, lz - 0.1);
          snow.scale.set(1, 0.55, 1);
          g.add(snow);
        }
      }
      return g;
    }, 4.0, 4.6);

    bake('treePine', () => {
      const g = new THREE.Group();
      const woodTone2 = (SEASON_TILES[season] && SEASON_TILES[season].wood) || '#6d4e36';
      const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.28, 1.2, 6), lambert(woodTone2));
      trunk.position.y = 0.6; g.add(trunk);
      const cone = new THREE.Mesh(new THREE.ConeGeometry(1.5, 3.4, 7), lambert(C.pine));
      cone.position.y = 2.6; g.add(cone);
      if (season === 'Winter') {
        const cap = new THREE.Mesh(new THREE.ConeGeometry(1.0, 1.4, 7), lambert('#F0F4F0'));
        cap.position.y = 3.6; g.add(cap);
      }
      return g;
    }, 3.4, 4.6);

    bake('well', () => {
      const g = new THREE.Group();
      const base = new THREE.Mesh(new THREE.CylinderGeometry(0.9, 1, 0.9, 10), lambert(CONFIG.PALETTE.stone));
      base.position.y = 0.45; g.add(base);
      for (const px2 of [-0.8, 0.8]) {
        const post = new THREE.Mesh(new THREE.BoxGeometry(0.15, 1.8, 0.15), lambert('#8a6244'));

      }
      const roof = new THREE.Mesh(new THREE.ConeGeometry(1.2, 0.8, 6), lambert(CONFIG.PALETTE.roofRed));
      roof.position.y = 2.2; g.add(roof);
      return g;
    }, 2.6, 2.8);

    bake('mailbox', () => {
      const g = new THREE.Group();
      const post = new THREE.Mesh(new THREE.BoxGeometry(0.12, 1.1, 0.12), lambert('#8a6244'));
      post.position.y = 0.55; g.add(post);
      const box = new THREE.Mesh(new THREE.BoxGeometry(0.55, 0.4, 0.35), lambert(CONFIG.PALETTE.roofRed));
      box.position.y = 1.25; g.add(box);
      return g;
    }, 1.2, 1.6, 48);

    bake('bench', () => {
      const g = new THREE.Group();
      const seat = new THREE.Mesh(new THREE.BoxGeometry(2, 0.12, 0.5), lambert(CONFIG.PALETTE.wood));
      seat.position.y = 0.5; g.add(seat);
      const back = new THREE.Mesh(new THREE.BoxGeometry(2, 0.5, 0.1), lambert(CONFIG.PALETTE.wood));
      back.position.set(0, 0.85, -0.22); g.add(back);
      for (const lx of [-0.8, 0.8]) {
        const leg = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.5, 0.4), lambert('#8a6244'));
        leg.position.set(lx, 0.25, 0); g.add(leg);
      }
      return g;
    }, 2.4, 1.3, 72);

    bake('marker', () => {
      const g = new THREE.Group();
      const stone = new THREE.Mesh(new THREE.BoxGeometry(0.9, 1.6, 0.5), lambert(CONFIG.PALETTE.stone));
      stone.position.y = 0.8; g.add(stone);
      const ledge = new THREE.Mesh(new THREE.BoxGeometry(1.3, 0.18, 0.9), lambert('#8C8C84'));
      ledge.position.set(0, 0.5, 0.45); g.add(ledge);
      return g;
    }, 1.6, 1.9, 56);

    bake('fencepost', () => {
      const post = new THREE.Mesh(new THREE.BoxGeometry(0.18, 1.0, 0.18), lambert('#8a6244'));
      post.position.y = 0.5;
      return post;
    }, 0.4, 1.1, 16);
  } catch (e) {
    console.warn('prop bake failed; keeping 3D props', e);
  } finally {
    if (rend) rend.dispose();
  }
}

// Billboard orientation is constant (fixed camera yaw + pitch): one shared quaternion.
function billboardQuat() {
  return R.camera.quaternion;
}
function makePropSprite(key, x, z, scale) {
  const p = PropBank[key];
  if (!p) return null;
  const s = scale || 1;
  const quad = new THREE.Mesh(new THREE.PlaneGeometry(p.w * s, p.h * s),
    new THREE.MeshBasicMaterial({ map: p.tex, transparent: true, alphaTest: 0.4 }));
  const g = new THREE.Group();
  quad.position.y = p.h * s * 0.5;
  quad.quaternion.copy(billboardQuat());
  g.add(quad);
  g.position.set(x, terrainHeightAt(x, z), z);
  g.userData.propQuad = quad;
  return g;
}

/* ---- crops as painted sprite stages (§3) ---- */
const CropSprites = {};   // cropId -> [stage0..stage3] textures, plus 'dead'
// Art Bible §5: bigger painted stages, per-family silhouette language so a
// crop reads as its species from across the field, and "ripe fruit color
// pops as the only saturated note" — foliage stays a mid desaturated green,
// the harvestable part alone carries the crop's full saturated hue.
const CROP_FAMILY = {
  turnip: 'root', potato: 'root',
  cabbage: 'leafy',
  tomato: 'vine', eggplant: 'cluster',
  corn: 'cob',
  pumpkin: 'gourd',
  sunflower: 'flower',
  strawberry: 'berry'
};
const FOLIAGE = '#4E7A48', FOLIAGE_LT = '#5E8A55', STEM = '#3E6A3E';
// Crops as BAKED 3D GEOMETRY, not painted flat vectors (user feedback: the
// vegetables didn't read "chonky" like the reference). A flat vector fill —
// no matter how big — reads as a sticker; the reference's density comes from
// real dimensional shading on rounded forms. Same pipeline as the tree/prop
// bake below: chunky primitives lit by the headlamp light, baked to a sprite,
// CI4-quantized. V6b: sunflower (family 'flower') moved onto this same
// pipeline too — the old flat-painted sunflower read as a sticker next to
// baked-3D neighbors even though its color/silhouette was liked; the new
// build keeps that same yellow-petal / brown-disc language, just built from
// real petal, disc and stem primitives instead of canvas paint.
const hexOf = n => '#' + n.toString(16).padStart(6, '0');
function lumpCluster(color, lumps) {
  const g = new THREE.Group();
  const mat = lambert(color);
  for (const [lx, ly, lz, lr] of lumps) {
    const m = new THREE.Mesh(new THREE.IcosahedronGeometry(lr, 1), mat);
    m.position.set(lx, ly, lz); g.add(m);
  }
  return g;
}
function bakeCropSprites3D() {
  if (!CONFIG.BAKE_SPRITES) return;
  let rend = null;
  try {
    rend = new THREE.WebGLRenderer({ antialias: false, alpha: true, preserveDrawingBuffer: true });
    rend.setPixelRatio(1);
    const scene = new THREE.Scene();
    scene.add(new THREE.AmbientLight(0xffffff, 0.8));
    const dir = new THREE.DirectionalLight(0xfff4e0, 0.6);
    dir.position.set(0, 2.2, 1.8); scene.add(dir); scene.add(dir.target);
    dir.target.position.set(0, 0.4, 0); dir.target.updateMatrixWorld();
    const bake = (key, buildFn, px) => {
      const model = buildFn();
      scene.add(model);
      const worldW = 1.15, worldH = 1.6;
      const pw = px || 48, ph = Math.round(pw * worldH / worldW);
      rend.setSize(pw, ph, false);
      // Symmetric frustum centered on the view axis — an asymmetric
      // bottom=0 frustum (the pattern the tree/prop bake uses) does not
      // scale down to crop-sized objects; verified empirically (a test
      // sphere rendered zero pixels with the asymmetric version, ~450px
      // filled with this one) before wiring it in here.
      const cam = new THREE.OrthographicCamera(-worldW / 2, worldW / 2, 0.42, -0.42, 0.1, 20);
      cam.position.set(0, 0.4, 0.85); cam.lookAt(0, 0.35, 0);
      rend.setClearColor(0x000000, 0);
      rend.render(scene, cam);
      const canvas = document.createElement('canvas');
      canvas.width = pw; canvas.height = ph;
      canvas.getContext('2d').drawImage(rend.domElement, 0, 0);
      quantizeCanvas(canvas, 16);
      scene.remove(model);
      CropSprites[key] = nearestTex(canvas);
    };

    const foliageLumps = (n, baseY, scale) => {
      const pts = [];
      for (let i = 0; i < n; i++) {
        const a = i / n * Math.PI * 2;
        pts.push([Math.cos(a) * 0.16 * scale, baseY + (i % 2) * 0.05 * scale, Math.sin(a) * 0.1 * scale, 0.13 * scale]);
      }
      pts.push([0, baseY + 0.1 * scale, 0, 0.15 * scale]);
      return pts;
    };

    // shared stages
    bake('stage0', () => {
      const g = new THREE.Group();
      const mound = new THREE.Mesh(new THREE.IcosahedronGeometry(0.14, 0), lambert('#6B5844'));
      mound.scale.set(1, 0.5, 1); mound.position.y = 0.06; g.add(mound);
      const tip = new THREE.Mesh(new THREE.ConeGeometry(0.03, 0.1, 5), lambert(FOLIAGE));
      tip.position.y = 0.14; g.add(tip);
      return g;
    });
    bake('stage1', () => {
      const g = new THREE.Group();
      const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.025, 0.26, 6), lambert(FOLIAGE));
      stem.position.y = 0.13; g.add(stem);
      for (const sx of [-1, 1]) {
        const leaf = new THREE.Mesh(new THREE.ConeGeometry(0.05, 0.16, 5), lambert(FOLIAGE_LT));
        leaf.position.set(sx * 0.08, 0.22, 0); leaf.rotation.z = sx * 0.9;
        g.add(leaf);
      }
      return g;
    });
    bake('dead', () => {
      const g = new THREE.Group();
      const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.03, 0.32, 6), lambert('#8A7A66'));
      stem.position.set(0.02, 0.16, 0); stem.rotation.z = 0.25; g.add(stem);
      const head = new THREE.Mesh(new THREE.IcosahedronGeometry(0.1, 0), lambert('#6E5A48'));
      head.scale.set(1, 0.7, 1); head.position.set(0.08, 0.3, 0); g.add(head);
      return g;
    });

    // V6c — matched against a real HM64 farm-field screenshot (RPGFan
    // gallery) at the user's request. The fact that carries over (a ratio,
    // not any traced art): a ripe HM64 crop tile is the harvestable item
    // itself, oversized, sitting directly on the ground — 2-4 big fruit/veg
    // shapes filling most of the silhouette, with the plant reduced to a
    // thin foliage collar peeking from underneath. It is NOT a stem-and-
    // leaves plant wearing small fruit as an accessory. Concretely: no
    // visible stem on any ripe stage below, foliage lumps pulled down near
    // the ground and shrunk, and every fruit/veg primitive sized up so it
    // dominates the read. Corn in particular — the user's own example — is
    // now two big standing ears with a leaf collar, no stalk.
    const FAM3D = {
      root: (color, ripe) => {
        const g = new THREE.Group();
        g.add(lumpCluster(FOLIAGE, foliageLumps(4, ripe ? 0.16 : 0.4, ripe ? 0.5 : 0.6)));
        if (ripe) {
          const bulb = new THREE.Mesh(new THREE.IcosahedronGeometry(0.23, 1), lambert(color));
          bulb.scale.set(1, 0.85, 1); bulb.position.y = 0.19; g.add(bulb);
        }
        return g;
      },
      leafy: (color, ripe) => {
        const scale = ripe ? 1.4 : 0.75;
        return lumpCluster(ripe ? color : FOLIAGE, foliageLumps(6, ripe ? 0.15 : 0.3, scale));
      },
      // tomato: a low leafy bush with fruit sitting on top (reference keeps
      // more foliage here than eggplant/corn — the bush is visibly green)
      vine: (color, ripe) => {
        const g = new THREE.Group();
        if (!ripe) {
          g.add(lumpCluster(FOLIAGE, foliageLumps(5, 0.46, 0.7)));
          const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.03, 0.5, 6), lambert(STEM));
          stem.position.y = 0.25; g.add(stem);
          return g;
        }
        g.add(lumpCluster(FOLIAGE, foliageLumps(5, 0.18, 0.6)));
        const fruitMat = lambert(color);
        const spots = [[-0.12, 0.3, 0.09, 0.15], [0.13, 0.36, -0.05, 0.14], [0, 0.22, -0.12, 0.13]];
        for (const [x, y, z, r] of spots) {
          const f = new THREE.Mesh(new THREE.IcosahedronGeometry(r, 1), fruitMat);
          f.position.set(x, y, z); g.add(f);
        }
        return g;
      },
      // eggplant: almost all fruit — a tight stack of big glossy ovoids
      // with only a thin leaf fringe at the base, per the reference
      cluster: (color, ripe) => {
        const g = new THREE.Group();
        g.add(lumpCluster(FOLIAGE, foliageLumps(3, ripe ? 0.06 : 0.32, ripe ? 0.3 : 0.55)));
        if (!ripe) return g;
        const fruitMat = lambert(color);
        const spots = [[-0.1, 0.24, 0.05, 0.6], [0.1, 0.3, -0.04, -0.5], [0, 0.15, -0.1, 0.2], [0.02, 0.4, 0.06, 0.1]];
        for (const [x, y, z, tilt] of spots) {
          const f = new THREE.Mesh(new THREE.IcosahedronGeometry(0.1, 1), fruitMat);
          f.scale.set(1, 1.7, 1); f.rotation.z = tilt; f.position.set(x, y, z); g.add(f);
        }
        return g;
      },
      // corn: two big standing ears, no stalk once ripe — the user's own
      // "giant ear of corn, not a corn plant" example
      cob: (color, ripe) => {
        const g = new THREE.Group();
        if (!ripe) {
          g.add(lumpCluster(FOLIAGE, foliageLumps(4, 0.2, 0.65)));
          const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.04, 0.55, 6), lambert(STEM));
          stem.position.y = 0.28; g.add(stem);
          return g;
        }
        g.add(lumpCluster(FOLIAGE, foliageLumps(4, 0.06, 0.4)));
        const cobMat = lambert(color);
        for (const [ex, ez, tilt] of [[-0.1, 0.03, -0.1], [0.1, -0.03, 0.1]]) {
          const cob = new THREE.Mesh(new THREE.IcosahedronGeometry(0.13, 1), cobMat);
          cob.scale.set(1, 2.3, 1); cob.position.set(ex, 0.3, ez); cob.rotation.z = tilt;
          g.add(cob);
          const husk = new THREE.Mesh(new THREE.ConeGeometry(0.145, 0.18, 6, 1, true), lambert(FOLIAGE_LT));
          husk.position.set(ex, 0.08, ez); husk.rotation.z = tilt;
          husk.material.side = THREE.DoubleSide;
          g.add(husk);
        }
        return g;
      },
      gourd: (color, ripe) => {
        const g = new THREE.Group();
        if (!ripe) { g.add(lumpCluster(FOLIAGE, foliageLumps(5, 0.28, 0.8))); return g; }
        g.add(lumpCluster(FOLIAGE, foliageLumps(3, 0.1, 0.4)));
        const gourd = new THREE.Mesh(new THREE.IcosahedronGeometry(0.29, 1), lambert(color));
        gourd.scale.set(1, 0.82, 1); gourd.position.y = 0.24; g.add(gourd);
        const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.035, 0.1, 6), lambert(STEM));
        stem.position.y = 0.47; g.add(stem);
        return g;
      },
      berry: (color, ripe) => {
        const g = new THREE.Group();
        g.add(lumpCluster(FOLIAGE, foliageLumps(5, ripe ? 0.13 : 0.3, ripe ? 0.55 : 0.6)));
        if (ripe) {
          const fruitMat = lambert(color);
          const spots = [[-0.13, 0.09, 0.09], [0.13, 0.08, -0.07], [0, 0.16, -0.11], [0.09, 0.04, 0.11]];
          for (const [x, y, z] of spots) {
            const berry = new THREE.Mesh(new THREE.IcosahedronGeometry(0.09, 1), fruitMat);
            berry.scale.set(1, 1.15, 1); berry.position.set(x, y, z); g.add(berry);
          }
          const flowerMat = lambert('#F2E8CE');
          for (let i = 0; i < 2; i++) {
            const fl = new THREE.Mesh(new THREE.SphereGeometry(0.02, 5, 4), flowerMat);
            fl.position.set(-0.05 + i * 0.14, 0.2, 0.02); g.add(fl);
          }
        }
        return g;
      },
      // Sunflower: same liked color language (bright petal ring + brown
      // speckled disc on a tall green stem) rebuilt as real geometry — a
      // radial ring of flattened box petals facing the bake camera, a
      // squat cylinder disc with seed-speckle bumps, on a taller stem than
      // the other families (sunflowers read tall in the reference too).
      flower: (color, ripe) => {
        const g = new THREE.Group();
        g.add(lumpCluster(FOLIAGE, foliageLumps(3, ripe ? 0.16 : 0.2, ripe ? 0.55 : 0.45)));
        const stemH = ripe ? 0.48 : 0.3;
        const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.035, stemH, 6), lambert(STEM));
        stem.position.y = stemH / 2; g.add(stem);
        if (!ripe) {
          const bud = new THREE.Mesh(new THREE.IcosahedronGeometry(0.07, 1), lambert(FOLIAGE_LT));
          bud.position.y = stemH + 0.03; g.add(bud);
          return g;
        }
        const headY = stemH + 0.02;
        const petalMat = lambert(color);
        const nPetals = 10;
        for (let i = 0; i < nPetals; i++) {
          const a = i / nPetals * Math.PI * 2;
          const petal = new THREE.Mesh(new THREE.BoxGeometry(0.075, 0.19, 0.025), petalMat);
          petal.position.set(Math.cos(a) * 0.135, headY + Math.sin(a) * 0.135, 0.03 + Math.abs(Math.sin(a)) * 0.015);
          petal.rotation.z = a + Math.PI / 2;
          g.add(petal);
        }
        const disc = new THREE.Mesh(new THREE.CylinderGeometry(0.11, 0.11, 0.05, 12), lambert('#6E5A38'));
        disc.rotation.x = Math.PI / 2; disc.position.set(0, headY, 0.05); g.add(disc);
        const speckMat = lambert('#4E3E28');
        for (let i = 0; i < 6; i++) {
          const sa = i * 1.7 + 0.4, sr = 0.02 + (i % 3) * 0.025;
          const sp = new THREE.Mesh(new THREE.SphereGeometry(0.012, 5, 4), speckMat);
          sp.position.set(Math.cos(sa) * sr, headY + Math.sin(sa) * sr, 0.075); g.add(sp);
        }
        return g;
      }
    };

    for (const id in CONFIG.CROPS) {
      const color = hexOf(CONFIG.CROPS[id].color);
      const fam = FAM3D[CROP_FAMILY[id] || 'vine'];
      bake('mid_' + id, () => fam(color, false));
      bake('ripe_' + id, () => fam(color, true));
    }

    // ---- forage pickups: same "phenomenon" as crops used to have — flat
    // emoji billboards standing in a game world where everything else is
    // lit 3D geometry. Rebuilt on the same bake pipeline/camera so a
    // mushroom, a walnut, a sprig of wintergreen etc. all get real
    // dimensional shading instead of a sticker glyph. CropSprites also
    // holds these now, keyed 'forage_<id>'.
    const forageIds = new Set(['worm']);
    for (const season in CONFIG.FORAGE) for (const f of CONFIG.FORAGE[season]) forageIds.add(f.id);
    const FORAGE_FAMILY = {
      mushroom: 'mushroom', walnut: 'nut', berries: 'berrycluster',
      wintergreen: 'herb', pinecone: 'cone',
      daffodil: 'daffodil', wildleek: 'leek',
      honeycomb: 'comb', worm: 'worm',
      fern: 'fern', shell: 'shell'
    };
    const FORAGE_FAM3D = {
      mushroom: () => {
        const g = new THREE.Group();
        const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.035, 0.045, 0.16, 6), lambert('#EDE3C8'));
        stem.position.y = 0.08; g.add(stem);
        const cap = new THREE.Mesh(new THREE.SphereGeometry(0.11, 8, 6, 0, Math.PI * 2, 0, Math.PI / 2), lambert('#B5493A'));
        cap.position.y = 0.16; g.add(cap);
        const rim = new THREE.Mesh(new THREE.TorusGeometry(0.095, 0.015, 5, 10), lambert('#8F3A2E'));
        rim.position.y = 0.155; rim.rotation.x = Math.PI / 2; g.add(rim);
        return g;
      },
      nut: () => {
        const g = new THREE.Group();
        const mat = lambert('#7A5A38');
        for (const [x, y, z, r] of [[-0.06, 0.06, 0.03, 0.09], [0.07, 0.05, -0.02, 0.085]]) {
          const n = new THREE.Mesh(new THREE.IcosahedronGeometry(r, 1), mat);
          n.position.set(x, y, z); g.add(n);
        }
        return g;
      },
      berrycluster: () => {
        const g = new THREE.Group();
        g.add(lumpCluster(FOLIAGE_LT, foliageLumps(3, 0.1, 0.4)));
        const mat = lambert('#4A5FA8');
        for (const [x, y, z] of [[-0.06, 0.14, 0.05], [0.05, 0.15, -0.03], [0, 0.19, 0.02]]) {
          const b = new THREE.Mesh(new THREE.IcosahedronGeometry(0.045, 1), mat);
          b.position.set(x, y, z); g.add(b);
        }
        return g;
      },
      herb: () => {
        const g = new THREE.Group();
        g.add(lumpCluster(FOLIAGE, foliageLumps(4, 0.13, 0.5)));
        const mat = lambert('#B23B3B');
        for (const [x, y, z] of [[-0.04, 0.17, 0.04], [0.05, 0.15, -0.02]]) {
          const berry = new THREE.Mesh(new THREE.SphereGeometry(0.025, 5, 4), mat);
          berry.position.set(x, y, z); g.add(berry);
        }
        return g;
      },
      cone: () => {
        const g = new THREE.Group();
        const body = new THREE.Mesh(new THREE.ConeGeometry(0.07, 0.24, 8), lambert('#5E4630'));
        body.position.y = 0.13; body.rotation.z = 0.5; g.add(body);
        const ringMat = lambert('#6E5438');
        for (let i = 0; i < 3; i++) {
          const ring = new THREE.Mesh(new THREE.TorusGeometry(0.05 - i * 0.012, 0.012, 4, 8), ringMat);
          ring.position.set(0.03 - i * 0.015, 0.06 + i * 0.06, 0);
          ring.rotation.x = Math.PI / 2; ring.rotation.z = 0.5;
          g.add(ring);
        }
        return g;
      },
      daffodil: () => {
        const g = new THREE.Group();
        g.add(lumpCluster(FOLIAGE, foliageLumps(3, 0.16, 0.4)));
        const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.018, 0.024, 0.34, 6), lambert(STEM));
        stem.position.y = 0.17; g.add(stem);
        const headY = 0.36;
        const petalMat = lambert('#F3E7A8');
        for (let i = 0; i < 8; i++) {
          const a = i / 8 * Math.PI * 2;
          const petal = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.13, 0.015), petalMat);
          petal.position.set(Math.cos(a) * 0.075, headY + Math.sin(a) * 0.075, 0.02);
          petal.rotation.z = a + Math.PI / 2;
          g.add(petal);
        }
        const trumpet = new THREE.Mesh(new THREE.CylinderGeometry(0.028, 0.02, 0.05, 8), lambert('#E8A23C'));
        trumpet.rotation.x = Math.PI / 2; trumpet.position.set(0, headY, 0.045);
        g.add(trumpet);
        return g;
      },
      leek: () => {
        const g = new THREE.Group();
        const bulb = new THREE.Mesh(new THREE.IcosahedronGeometry(0.06, 1), lambert('#E8E2C8'));
        bulb.scale.set(1, 0.8, 1); bulb.position.y = 0.05; g.add(bulb);
        const bladeMat = lambert(FOLIAGE_LT);
        for (const [sx, rot] of [[-1, 0.25], [0, 0], [1, -0.2]]) {
          const blade = new THREE.Mesh(new THREE.ConeGeometry(0.02, 0.32, 4), bladeMat);
          blade.position.set(sx * 0.03, 0.24, 0); blade.rotation.z = rot; g.add(blade);
        }
        return g;
      },
      comb: () => {
        const g = new THREE.Group();
        const body = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 0.14, 6), lambert('#D8962E'));
        body.rotation.z = Math.PI / 2; body.rotation.y = 0.3; body.position.y = 0.12; g.add(body);
        const drip = new THREE.Mesh(new THREE.ConeGeometry(0.025, 0.05, 5), lambert('#C6841E'));

      worm: () => {

          frond.position.set((i - 1) * 0.05, 0.05 + i * 0.03, 0);

        body.scale.set(1.3, 0.5, 1); body.position.y = 0.07; g.add(body);

function initThree() {
  const P = CONFIG.PALETTE;
  R.renderer = new THREE.WebGLRenderer({ canvas: $('c'), antialias: false });

  const aspect = CONFIG.VIEW_W / CONFIG.VIEW_H;
  R.camera = new THREE.OrthographicCamera(-R.viewH * aspect / 2, R.viewH * aspect / 2,
    R.viewH / 2, -R.viewH / 2, 0.1, 200);
