  } else if (season === 'Autumn') {
    const best = G.flags.bestPumpkin || 0;
    const cal = calendarDay(G.day).r;
    const rival1 = 55 + Math.floor(cal() * 15);
    const rival2 = 55 + Math.floor(cal() * 15);
    const rolfSize = 78 + Math.floor(cal() * 8);
    const win = best > rolfSize;
    STORY.scene([
      { fade: () => { gatherCastAtSquare(); } },
      { say: [
        'The County Fair. Pie tables, a fiddle, and the judging stand groaning under this year’s pumpkins.',
        { who: 'aldwin', text: 'The gourds! ' + (best ? 'Four entries this year — including, I note with interest, one from the new farm.' : 'Three entries this year. The new farm abstains — wisely or timidly, the record will show.') },
        ...(best ? [
          { who: 'aldwin', text: 'The scores: the Widow Hale’s at ' + rival1 + ' points, Pip’s alarming entry at ' + rival2 + ', Rolf’s at ' + rolfSize + '… and the new farm’s at ' + best + '.' },
          win ? { who: 'rolf', text: '…Huh. Well. There it is. You watered every day, didn’t you. Every single day. …Good. Somebody should push me.', mood: 'sad' }
              : { who: 'rolf', text: 'The ribbon stays east of the river. ' + (best > 70 ? 'But that’s a real pumpkin you grew, neighbor. Next year, then.' : 'Keep your streaks honest and come back heavier.') }
        ] : [
          { who: 'rolf', text: 'Ribbon number six. The secret’s the streak — every day, no gaps. Grow one next year and I’ll even judge it fair.' }
        ]),
        'The afternoon runs long and golden: pie, the fiddle, a wheelbarrow race that ends in the creek.'
      ] },
      { fn: () => {
        if (win) {
          G.money += 100;
          G.ledger.entries.push({ day: G.day, amount: 100, enterprise: 'Odd Jobs', note: 'Fair ribbon prize' });
          STORY.heart('rolf', 8);
          jline('WON THE FAIR. The ribbon is blue and the pumpkin was ' + best + ' points of stubborn daily watering. Rolf shook my hand like it cost him, which is how you know it counted.');
        } else if (best) {
          jline('Entered the fair: ' + best + ' points. Rolf took the ribbon again at ' + rolfSize + '. "Next year" is starting to sound like a family motto.');
        } else {
          jline('The County Fair came and went without a pumpkin from my field. Noted, calendar. Noted.');
        }
      } },
      { fn: endDay }
    ]);
  } else if (season === 'Winter') {
    STORY.scene([
      { fade: () => {
        gatherCastAtSquare();
        G.weather = 'snow';
        G.hour = 19;
        applyGrade();
      } },
      { say: [
        'Starlight Eve. Snow through lantern light, the gazebo strung with little flames, the whole town breathing steam.',
        { who: 'maren', text: 'The draw! One name to a slip, one gift to a name. The box has spoken since before any of us could argue with it.' },
        ...((G.romance && G.romance.step >= 3 && !G.flags.romancePaired) ? [
          'Slips are drawn — and the box, which has spoken since before anyone could argue with it, draws Bramm for Sable and Sable for Bramm. Maren’s face is a masterpiece of neutrality.',
          'He gives her a book, wrapped in store paper, corners squared like inventory. She gives him a page from the notebook, framed. Nobody applauds, because everybody understands.',
          { who: 'maren', text: '…ANYWAY. More slips! More parcels! Nothing to see here but community spirit!' }
        ] : [
          'Slips are drawn, parcels change hands, someone laughs too loudly at a hand-knit hat.'
        ]),
        { who: 'aldwin', text: 'Another year in the books. Some of it even balanced. We’ll take it, valley. We’ll take it.' }
      ] },
      { fn: () => {
        if (G.romance && G.romance.step >= 3 && !G.flags.romancePaired) {
          G.flags.romancePaired = true;
          G.romance.step = ROMANCE_STEPS.length;
          jline('The Starlight draw paired Bramm and Sable. The box has never once been shaken, audited, or wrong. The whole square pretended not to see, together, in perfect coordination.');
        }
      } },
      { fn: () => {
        addItem('scarf', 1);
        jline('Starlight Eve again. Snow, lanterns, the draw. A year ago I was the stranger who got the town’s scarf. Tonight I knew every name in the square.');
      } },
      { fn: () => { G.flags.pendingYearReview = true; doSleep(); } }
    ]);
  }
}

function tryVignette(id) {
  const v = VIG[id];
  if (!v) return false;
  const hearts = displayHearts(id);
  const thresholds = Object.keys(v).map(Number).sort((a, b) => a - b);
  for (const t of thresholds) {
    if (hearts < t || G.flags['vig_' + id + '_' + t]) continue;
    const sc = v[t];
    if (sc.gated === 'stage5' && (G.network.stage || 0) < 5) continue;
    G.flags['vig_' + id + '_' + t] = true;
    say(sc.lines, () => {
      showChoice(sc.choice, i => {
        const reply = sc.replies[i];
        say([typeof reply === 'string' ? reply : reply], () => {
          STORY.heart(id, 6);
          jline('A moment with ' + CAST[id].name + ' today — the kind that doesn’t fit in small talk. (' + t + ' hearts.)');
        });
      });
    });
    return true;
  }
  return false;
}

function connectShop(id, glyphKey) {

  if (R.glyphs[glyphKey || id]) R.glyphs[glyphKey || id].visible = true;
}

  // called from STORY.tick
  tick() {
    const year = yearOf(G.day), season = seasonOf(G.day);
    if (G.mode !== 'play' || G.uiOpen) return;
    if (year >= 2 && season === 'Summer' && (G.network.stage || 0) >= 3 &&
        !G.flags.chainDone && G.hour >= 9 && G.hour < 12) {
      ARC.runChainMorning();
    }
  }

// A standing order each Restday at +15%, proposed BY the villager.
const CONTRACT_DEFS = {
  maren:  { good: 'egg',         qty: 4, conn: 'tavern',  ask: 'The Bluebird goes through eggs like the river goes through water. A standing order — four eggs, every Restday, fifteen percent over market, settled the moment they land. You’d be the tavern’s farm.' },
  bramm:  { good: 'turnip',      qty: 6, conn: 'general', ask: 'The window shelf. People ask whose produce it is. So: your goods, my window, every Restday — six of your turnips to start, fifteen over market, settled instant. Storefront partners. Hm.' },
  isolde: { good: 'wintergreen', qty: 3, conn: null,      ask: 'The clinic goes through more wintergreen than I can gather between patients. Three bunches every Restday? Fifteen percent over market — (I checked what fair looks like. Twice.)' },
  // Old Ness pays cash in person, Restdays, always (§10). No network, no checks.
  ness:   { good: 'worm',        qty: 4, conn: null, cash: true, ask: 'Worms. Four, Restdays. I pay cash, at the dock, in person, same as the last forty years. No green marks involved. That a problem? …Didn’t think so.' }

function contractEligible(id) {
  const def = CONTRACT_DEFS[id];
  if (!def || (G.contracts && G.contracts[id])) return false;
  if (displayHearts(id) < 6) return false;
  if (def.conn && !G.network.connected[def.conn]) return false;
  return true;
}
function proposeContract(npc) {
  const id = npc.id, def = CONTRACT_DEFS[id];
  if (!contractEligible(id)) return false;
  ITEMS.egg = ITEMS.egg || { name: 'Egg', icon: '🥚', sell: 8, enterprise: 'Eggs' };
  say([
    { who: id, text: def.ask },
    { who: id, text: '(A standing order is an honor here — it means the town counts on you.)' }
  ], () => {
    showChoice(['Shake on it', 'Not yet'], i => {
      if (i !== 0) { say([{ who: id, text: 'When you’re ready. The offer keeps.' }]); return; }
      G.contracts = G.contracts || {};
      G.contracts[id] = { good: def.good, qty: def.qty, premium: 1.15, status: 'active', miss: 0 };
      sfx('chime');
      STORY.heart(id, 8);
      say([{ who: id, text: 'Then it’s standing. First delivery this Restday. Welcome to being counted on.', mood: 'happy' }]);
      jline(CAST[id].name + ' asked me to be their standing supplier — ' + def.qty + '× ' + ITEMS[def.good].name.toLowerCase() + ' every Restday at a premium. In this valley, that’s a medal.');
    });
  });
  return true;
}
function resumeContract(npc) {
  const id = npc.id, ct = G.contracts && G.contracts[id];
  if (!ct || ct.status !== 'paused') return false;
  if ((G.inventory[ct.good] || 0) < ct.qty) {
    say([{ who: id, text: 'The standing order’s on pause — no hard feelings. Bring ' + ct.qty + '× ' + ITEMS[ct.good].name.toLowerCase() + ' in person and we’ll call it running again.' }]);
    return true;
  }
  takeItem(ct.good, ct.qty);
  ct.status = 'active'; ct.miss = 0;
  const pay = Math.round(ITEMS[ct.good].sell * ct.qty * ct.premium);
  G.money += pay;
  G.ledger.entries.push({ day: G.day, amount: pay, enterprise: ITEMS[ct.good].enterprise, note: 'Contract resumed — ' + CAST[id].name });
  sfx('chime');
  say([{ who: id, text: 'Hand-delivered and back in business. That’s all a pause ever needs to be.', mood: 'happy' }]);
  jline('Squared things with ' + CAST[id].name + ' in person. The standing order stands again.');
  return true;
}
// Rollover step 9: contract fulfillment on Restdays.
function fulfillContracts(newDay) {
  if (!isRestday(newDay) || !G.contracts) return;
  for (const id in G.contracts) {
    const ct = G.contracts[id];
    if (ct.status !== 'active') continue;
    const have = G.inventory[ct.good] || 0;
    if (have >= ct.qty) {
      takeItem(ct.good, ct.qty);
      const pay = Math.round(ITEMS[ct.good].sell * ct.qty * ct.premium);
      const def = CONTRACT_DEFS[id];
      const instant = def.cash || (def.conn && G.network.connected[def.conn]);
      if (instant) {
        G.money += pay;
        G.ledger.entries.push({ day: newDay, amount: pay, enterprise: ITEMS[ct.good].enterprise, note: 'Standing order — ' + CAST[id].name });
      } else {
        G.pendingChecks.push({ amount: pay, arriveDay: newDay + CONFIG.CHECK_LAG_DAYS, label: CAST[id].name + '’s standing order', enterprises: { [ITEMS[ct.good].enterprise]: pay } });
      }
      ct.miss = 0;
      jline('Standing order filled: ' + ct.qty + '× ' + ITEMS[ct.good].name.toLowerCase() + ' to ' + CAST[id].name + (instant ? ' — settled by sunup.' : ' — check to follow.'));
    } else {
      ct.miss++;
      if (ct.miss >= 2) {
        ct.status = 'paused';
        G.mail.push({ day: newDay, from: CAST[id].name, title: 'About the standing order',
          body: 'Two Restdays without ' + ITEMS[ct.good].name.toLowerCase() + 's — so I’m pausing the order, not ending it. Farms have seasons; I know how it goes. Bring a delivery by in person whenever, and it starts right back up. — ' + CAST[id].name, read: false });
        jline('Missed ' + CAST[id].name + '’s order twice running. The pause letter was kinder than I deserved, which is somehow worse.');
      } else {
        jline('Came up short for ' + CAST[id].name + '’s standing order. One miss is weather; two is a habit.');
      }
    }
  }
}

/* ---- forecast strip: projected 6-day income (stage 3) ---- */
function computeForecast() {
  let total = 0;
  const parts = [];
  const checks = G.pendingChecks.reduce((s, c) => s + c.amount, 0);
  if (checks) { total += checks; parts.push('checks $' + checks); }
  const inv = (G.jobs || []).filter(j => j.status === 'invoiced').reduce((s, j) => s + j.reward, 0);
  if (inv) { total += inv; parts.push('invoices $' + inv); }
  let regrow = 0;
  for (const t of G.world.tiles) {
    if (!t.crop || t.dead) continue;
    const c = CONFIG.CROPS[t.crop];
    if (c.regrow) regrow += Math.floor(6 / c.regrow) * c.sell;
    else if (t.grown < c.days) regrow += c.sell;
  }
  if (regrow) { total += regrow; parts.push('field ~$' + regrow); }
  let contracts = 0;
  for (const id in (G.contracts || {})) {
    const ct = G.contracts[id];
    if (ct.status === 'active') contracts += Math.round(ITEMS[ct.good].sell * ct.qty * ct.premium) * 2;
  }
  if (contracts) { total += contracts; parts.push('standing orders $' + contracts); }
  return { total, parts };
}

// A tiny 16-step sequencer. All tracks original; the jukebox evokes 90s
// country as a genre — twangy lead, walking bass, train-beat brushes (§15).
const MUS = { current: null, timer: null, step: 0, vol: 0.30, jukeboxUntil: 0, sparse: false };
function nf(n) { return n ? 440 * Math.pow(2, (n - 69) / 12) : 0; }
function mvoice(freq, dur, type, vol) {
  const ctx = audioCtx();
  if (!ctx || !freq || AU.vol <= 0) return;
  const t = ctx.currentTime;
  const o = ctx.createOscillator(), g = ctx.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(vol * MUS.vol * AU.vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o.connect(g); g.connect(ctx.destination);
  o.start(t); o.stop(t + dur + 0.05);
}

function playTrack(name) {
  stopMusic();
  const tr = TRACKS[name];
  if (!tr) return;
  MUS.current = name; MUS.step = 0;
  const stepMs = 60000 / tr.bpm / 2;   // 8ths
  MUS.timer = setInterval(() => {
    if (AU.vol <= 0) return;
    const i = MUS.step % 16;
    const juke = tr.juke;
    if (MUS.sparse && !juke) {
      // night: bass breathing, the lead only surfacing now and then
      if (i % 4 === 0) mvoice(nf(tr.bass[i]), stepMs / 1000 * 2.4, tr.bassType, 0.2);
      if (i === 0 || i === 10) mvoice(nf(tr.lead[i] || tr.lead[0]), stepMs / 1000 * 3, 'sine', 0.08);
      MUS.step++;
      if (MUS.jukeboxUntil && Date.now() > MUS.jukeboxUntil) startSeasonMusic();
      return;
    }
    mvoice(nf(tr.bass[i]), stepMs / 1000 * 1.8, tr.bassType, juke ? 0.5 : 0.32);
    mvoice(nf(tr.lead[i]), stepMs / 1000 * (juke ? 1.2 : 2.2), tr.leadType, juke ? 0.22 : 0.16);
    if (juke && i % 4 === 2) mvoice(2400 + (i % 8) * 60, 0.03, 'square', 0.05);  // brush tick
    MUS.step++;
    if (MUS.jukeboxUntil && Date.now() > MUS.jukeboxUntil) startSeasonMusic();
  }, stepMs);
}
function stopMusic() {
  clearInterval(MUS.timer);
  MUS.timer = null; MUS.current = null;
}
function startSeasonMusic(sparse) {
  MUS.jukeboxUntil = 0;
  MUS.sparse = !!sparse;
  playTrack(seasonOf(G.day).toLowerCase());
}
function playJukebox(id) {
  MUS.sparse = false;
  MUS.jukeboxUntil = Date.now() + 40000;   // one "spin", then back to the season

}

/* ---- dialogue (typewriter + blip) ---- */
// HM64 box metric (§8): ~3 lines × ~28 chars, one thought per box. Long lines
// split at sentence boundaries into successive boxes.
const BOX_CHARS = 84;
function boxify(text) {
  if (text.length <= BOX_CHARS + 8) return [text];
  const parts = text.match(/[^.!?…]+[.!?…]+["»)\u2019]*\s*|.+$/g) || [text];
  const out = [];
  let cur = '';
  for (const s of parts) {
    if ((cur + s).length > BOX_CHARS && cur) { out.push(cur.trim()); cur = s; }
    else cur += s;
  }
  if (cur.trim()) out.push(cur.trim());
  return out.flatMap(t => {
    if (t.length <= BOX_CHARS + 12) return [t];
    const words = t.split(' ');
    const chunks = [];
    let c = '';
    for (const w of words) {
      if ((c + ' ' + w).length > BOX_CHARS && c) { chunks.push(c); c = w; }
      else c = c ? c + ' ' + w : w;
    }
    if (c) chunks.push(c);
    return chunks;
  });
}
const DLG = { queue: [], active: false, revealing: false, txt: '', shown: 0, cb: null, timer: null };
function say(lines, cb) {
  for (const l of lines) {
    const entry = typeof l === 'string' ? { who: '', text: l } : l;
    for (const chunk of boxify(entry.text)) {
      DLG.queue.push({ who: entry.who, text: chunk, mood: entry.mood });
    }
  }
  DLG.cb = cb || DLG.cb;
  if (!DLG.active) nextDialogue();
}
function nextDialogue() {
  if (!DLG.queue.length) {
    DLG.active = false;
    $('dlg').style.display = 'none';
    if (G.uiOpen === 'dialogue') G.uiOpen = null;
    const cb = DLG.cb; DLG.cb = null;
    if (cb) cb();
    return;
  }
  DLG.active = true;
  if (!G.uiOpen) G.uiOpen = 'dialogue';
  const line = DLG.queue.shift();
  const rec = line.who && CAST[line.who];
  $('dlgName').textContent = rec ? rec.name : (line.who === 'player' ? G.playerName : '');
  $('dlgPortrait').style.display = rec ? 'block' : 'none';
  if (rec) {
    if (typeof drawPortraitTo === 'function') drawPortraitTo($('dlgPortrait').getContext('2d'), line.who, line.mood || 'neutral', 84);
    else drawPortrait(rec);
  }
  DLG.txt = line.text; DLG.shown = 0; DLG.revealing = true;
  $('dlg').style.display = 'block';
  $('dlgText').textContent = '';
  clearInterval(DLG.timer);
  DLG.timer = setInterval(() => {
    DLG.shown += 2;
    $('dlgText').textContent = DLG.txt.slice(0, DLG.shown);
    if (DLG.shown % 6 < 2) sfx('blip');
    if (DLG.shown >= DLG.txt.length) { DLG.revealing = false; clearInterval(DLG.timer); }
  }, 24);
}
function advanceDialogue() {
  if (!DLG.active) return;
  if (DLG.revealing) {
    clearInterval(DLG.timer); DLG.revealing = false;
    $('dlgText').textContent = DLG.txt;
  } else nextDialogue();
}

  box.style.left = cx + 'px'; box.style.top = cy + 'px';
  items.forEach((it, i) => {
    const a = i / items.length * Math.PI * 2 - Math.PI / 2;

    d.appendChild(el('div', 'radLbl', it.name));
    box.appendChild(d);
  });

function radialAim(dx, dz) {
  if (!RAD.open || (!dx && !dz)) return;
  const ang = Math.atan2(dz, dx) + Math.PI / 2;
  let best = 0, bd = 99;
  RAD.items.forEach((it, i) => {
    const a = i / RAD.items.length * Math.PI * 2;
    const diff = Math.abs(((ang - a) % (Math.PI * 2) + Math.PI * 3) % (Math.PI * 2) - Math.PI);
    if (diff < bd) { bd = diff; best = i; }
  });
  if (best !== RAD.sel) {
    RAD.sel = best;
    [...$('radial').children].forEach((c, i) => c.classList.toggle('sel', i === best));
    sfx('blip');
  }
}

}

const HEART_EMPTY = '#C9BFA8';

  const seg = clamp(Math.floor(t * (HEART_RAMP.length - 1)), 0, HEART_RAMP.length - 2);

  return lerpHex(HEART_RAMP[seg], HEART_RAMP[seg + 1], frac);

function drawMap(ctx) {

  ctx.fillStyle = P.water;
  ctx.beginPath(); ctx.ellipse(wc(W.pool.x), zc(W.pool.z), W.pool.r * 2, W.pool.r * 1.8, 0, 0, 7); ctx.fill();
  for (const p of W.paths) paintPathLine(ctx, p.pts, p.w * 0.8, P.path);
  ctx.fillStyle = '#C9B283';
  ctx.fillRect(wc(W.field.x0), zc(W.field.z0), W.field.w * 2, W.field.h * 2);

  let flip = false;
  const dot = (x, z, label, color) => {

    if (label) ctx.fillText(label, wc(x), zc(z) + (flip ? 18 : -8));
    flip = !flip;
  };
  dot(W.house.x, W.house.z, G.farmName);
  for (const s of W.shops) if (s.name) dot(s.x, s.z, s.name.split(' ')[0], s.roof === 'teal' ? P.roofTeal : P.roofRed);
  dot(W.gazebo.x, W.gazebo.z, 'Square', P.wood);
  dot(W.bench.x, W.bench.z, 'The Shore', P.wood);
  dot(W.marker.x, W.marker.z, 'The Marker', P.stone);
  ctx.fillStyle = P.ink; ctx.font = 'bold 14px Trebuchet MS'; ctx.textAlign = 'center';
  ctx.fillText(W.townName, wc(W.town.x), zc(-40));
}

const KEYS = {};
let holdTimer = null, holdFired = false;
function inputVector() {
  let x = 0, z = 0;
  if (KEYS.KeyW || KEYS.ArrowUp) z -= 1;
  if (KEYS.KeyS || KEYS.ArrowDown) z += 1;
  if (KEYS.KeyA || KEYS.ArrowLeft) x -= 1;
  if (KEYS.KeyD || KEYS.ArrowRight) x += 1;
  x += TOUCH.x; z += TOUCH.z;
  const d = Math.hypot(x, z);
  if (d > 1) { x /= d; z /= d; }
  return { x, z };
}

window.addEventListener('keydown', e => {
  if (e.repeat) { KEYS[e.code] = true; if (e.code === 'Tab') e.preventDefault(); return; }
  KEYS[e.code] = true;
  const ac = audioCtx(); ac && ac.resume && ac.resume();
  if (G.mode === 'title') { TITLE.onKey(e); return; }
  switch (e.code) {
    case 'KeyE': case 'Space': case 'Enter':
      if (document.activeElement && /INPUT|TEXTAREA/.test(document.activeElement.tagName)) break;
      pressAct(); e.preventDefault(); break;
    case 'Tab': e.preventDefault();

      break;
    case 'KeyJ': if (G.mode === 'play' && !G.uiOpen) openMenu('Journal'); break;
    case 'KeyM': if (G.mode === 'play' && !G.uiOpen) openMenu('Map'); break;
    case 'KeyH':

/* ---- touch ---- */
const TOUCH = { x: 0, z: 0, joyId: null };
function initTouch() {
  const base = $('joyBase'), knob = $('joyKnob');
  const setKnob = (dx, dz) => {
    knob.style.left = 32 + dx * 30 + 'px';
    knob.style.top = 32 + dz * 30 + 'px';
  };
  base.addEventListener('pointerdown', e => {
    TOUCH.joyId = e.pointerId; base.setPointerCapture(e.pointerId);
  });
  base.addEventListener('pointermove', e => {
    if (e.pointerId !== TOUCH.joyId) return;
    const r = base.getBoundingClientRect();
    let dx = (e.clientX - r.left - r.width / 2) / (r.width / 2);
    let dz = (e.clientY - r.top - r.height / 2) / (r.height / 2);
    const d = Math.hypot(dx, dz);
    if (d > 1) { dx /= d; dz /= d; }
    TOUCH.x = dx; TOUCH.z = dz;
    setKnob(dx, dz);
    if (RAD.open) radialAim(dx, dz);
  });
  const joyEnd = e => {
    if (e.pointerId !== TOUCH.joyId) return;
    TOUCH.joyId = null; TOUCH.x = 0; TOUCH.z = 0; setKnob(0, 0);
  };
  base.addEventListener('pointerup', joyEnd);
  base.addEventListener('pointercancel', joyEnd);
  $('actBtn').addEventListener('pointerdown', e => {
    e.preventDefault();
    const ac = audioCtx(); ac && ac.resume && ac.resume();
    pressAct();
  });
  $('actBtn').addEventListener('pointerup', e => { e.preventDefault(); releaseAct(); });
  $('menuBtn').addEventListener('pointerdown', e => {
    e.preventDefault();
    if (MENU.open) closeMenu();
    else if (G.mode === 'play' && !G.uiOpen) openMenu();
  });
}
document.addEventListener('pointerdown', () => { const c = audioCtx(); c && c.resume && c.resume(); }, { once: true });

    bFile.onclick = () => file.click();
    const back = el('button', 'uiBtn', 'Back');
    back.onclick = () => TITLE.render();
    body.appendChild(go); body.appendChild(bFile); body.appendChild(back); body.appendChild(file);
  },
  pickSeed(seed) {
    TITLE.seed = seed >>> 0;
    location.hash = '#s=' + TITLE.seed;
    $('titleWelcome').textContent = '…raising the valley…';
    setTimeout(() => {
      G.world = generateWorld(TITLE.seed);
      $('titleWelcome').textContent = 'Welcome to ' + G.world.townName + (G.world.coastal ? ', by the sea.' : '.');
      TITLE.step = 1;
      TITLE.render();
    }, 60);
  },
  load(code) {
    try {
      const data = saveDecode(code);
      $('title').style.display = 'none';
      applySave(data);
      toast('Welcome back to ' + G.world.townName + '.');
    } catch (e) { $('titleWelcome').textContent = 'That code didn’t take.'; }
  },
  begin() {
    $('title').style.display = 'none';
    startNewGame();
  },
  onKey(e) { if (e.code === 'Enter' && TITLE.step === 0 && TITLE._go) TITLE._go.click(); }
};
/* =============================== STORY =================================== */
// Year 1: the authored 6-day prologue (absolute days 6..11), then free Year 2.
// Dialogue here is placeholder-tier by design (phase 1); real scenes in phase 2.
const STORY = {
  objective: null, onCantAfford: null, onShopClosed: null,

  // Affection is HM64-style hidden points (§4): 13 points per displayed heart,
  // cap 130. A heart ≈ 3-4 days of steady attention; gifts never outweigh talk.
  meet(id) {
    if (!(id in G.hearts)) { G.hearts[id] = 4; }
  },
  heart(id, pts) {
    G.hearts[id] = clamp((G.hearts[id] || 0) + pts, 0, 130);
  },

  /* ---- scene runner: walk / say / do, time frozen ---- */
  scene(steps, done) {
    G.mode = 'scene';
    let i = 0;
    const next = () => {
      if (i >= steps.length) {
        if (G.mode === 'scene') G.mode = 'play';   // a step may have started sleep
        // scenes moved people; make the schedule re-target so they walk back
        for (const id in ACTORS) if (id !== 'player') delete ACTORS[id].schedKey;
        done && done();
        return;
      }
      const s = steps[i++];
      if (s.say) say(s.say, next);
      else if (s.walk) {
        const a = ACTORS[s.walk.id];
        if (!a) { next(); return; }
        a.waypoints = [{ x: s.walk.x, z: s.walk.z, onArrive: next }];
      }
      else if (s.tp) {
        const a = ACTORS[s.tp.id];
        if (a) actorSetPos(a, s.tp.x, s.tp.z);
        next();
      }
      else if (s.face) {
        const a = ACTORS[s.face.id];
        if (a) { a.face = s.face.angle; if (!a.sprite) a.group.rotation.y = s.face.angle; }
        next();
      }
      else if (s.fade) { fadeOut(() => { s.fade(); fadeIn(next); }); }
      else if (s.fn) { s.fn(); next(); }
      else if (s.wait) setTimeout(next, s.wait);
      else next();
    };
    next();
  },

  spawnVillager(id, x, z) {
    let a = ACTORS[id];
    if (!a) a = makeActor(id, CAST[id], x, z);
    else actorSetPos(a, x, z);
    a.visible = true; a.group.visible = true;
    a.waypoints = [];
    return a;
  },

  /* ---- cast placement: schedule skeletons drive everyone (phase 2) ---- */
  placeCast(day) {
    buildCast();
    assembleSchedules(day);
    snapSchedules();
  },

  /* ================= day starts ================= */
  onDayStart(day, fromLoad) {
    STORY.placeCast(day);
    spawnForage();
    updateHUD();
    applyGrade();
    for (const gid in R.glyphs) R.glyphs[gid].visible = !!G.network.connected[gid];
    if (G.network.connected.forge) addForgeAwning();
    startSeasonMusic();
    if (G.flags.pendingYearReview) {
      G.flags.pendingYearReview = false;
      STORY.showYearReview();
      return;
    }
    // stage-4 herald: the barn grant letter, first summer morning of Y2+
    if (yearOf(day) >= 2 && seasonOf(day) === 'Summer' && (G.network.stage || 0) >= 3 &&
        !G.flags.chainDone && !G.flags.chainMailed) {
      G.flags.chainMailed = true;
      G.mail.push({ day, from: 'Greta', title: 'The barn grant CLEARED',
        body: 'Two years of asking and one season of clean books — the grant came through. Corwin starts the barn this week, and everyone he owes gets paid the day he’s paid, which is TODAY. Come watch money move like weather. — G.', read: false });
    }
    switch (day) {
      case 6: break;                              // handled by startNewGame intro
      case 7:
        setObjective('Water the turnips — the County Fair starts at noon');
        if (!fromLoad) say(['Bright banners over the square this morning. The County Fair — the whole valley will be there at noon.']);
        jline('Fair day. Everyone in one place, like the valley holding its breath.');
        break;
      case 8:
        setObjective('Restday: harvest your turnips and ship them (bin)');
        if (!fromLoad) say(['Restday. Every shop in ' + G.world.townName + ' is shut tight. The turnips don’t care — they’re ready.']);
        break;
      case 9:
        setObjective('Winter. You’ll want a coat — Bramm’s General sells them');
        if (!fromLoad) say(['Winter came overnight. The kind of cold that gets into your boots.',
          'A coat. Today. Bramm’s will have one.']);
        jline('Winter 1. The cold doesn’t knock first.');
        break;
      case 10:
        if (!G.flags.ledgerMailed) {
          G.flags.ledgerMailed = true;
          G.mail.push({ day: 10, from: 'Aldwin', title: 'That thing I mentioned',
            body: 'The ledger book, like I promised. Funny thing — I mailed it two days ago, same day I saw you. It took the mail two days to cross one valley. That’s rather the point. — A.', read: false });
        }
        setObjective('Something’s in the mailbox');
        if (!fromLoad) say(['The mailbox flag is up.']);
        break;
      case 11:
        setObjective('Restday · Starlight Eve tonight at the gazebo');
        if (!fromLoad) say(['Starlight Eve tonight. And a Restday — though something feels different about the morning.']);
        // Bramm walks to the shore at ~9:00 (flag checked in tickStory)
        G.flags.brammShoreQueued = true;
        break;
      case 12:
        if (!G.flags.year2Card) {
          G.flags.year2Card = true;
          STORY.showYearReview();
          return;
        }
        break;
      default:
        if (day > 12) setObjective(null);
    }
  },

  /* ================= objectives ================= */
  countTiles(fn) { return G.world.tiles.filter(fn).length; },
  checkObjectives() {
    const day = G.day;
    if (day === 6) {
      const planted = STORY.countTiles(t => t.crop === 'turnip');
      const watered = STORY.countTiles(t => t.crop === 'turnip' && t.watered);
      if (G.flags.introDone && planted < 24) setObjective('Till the starter patch and plant your free turnips (hold E to pick seeds)');
      else if (planted >= 24 && watered < planted) setObjective('Water the turnips (face a planted tile, press E)');
      else if (planted >= 24) setObjective('Good work. Sleep when the light goes (farmhouse door, from 18:00)');
    } else if (day === 7) {
      const watered = STORY.countTiles(t => t.crop === 'turnip' && t.watered);
      if (watered >= 20) setObjective('Turnips watered. The Fair starts at noon — don’t be late');
    } else if (day === 8) {
      if (G.dayFlags.shippedAny) {
        setObjective('Shipped. The check comes in two days — Restday evening is yours');
        if (!G.flags.shippedLesson) {
          G.flags.shippedLesson = true;
          say(['The bin takes the turnips. A slip of carbon paper takes their place: "CHECK TO FOLLOW — ALLOW 2 DAYS."',
            'Two days. The seeds at Bramm’s want paying today, but sure — two days.']);
          jline('Shipped the turnip harvest. Payment is now a rumor with a postmark.');
        }
      }
    } else if (day === 10) {
      if (G.ledger.unlocked && !G.network.connected.general) setObjective('Take the ledger to Bramm’s General — Aldwin says he’s the pilot');
      if (G.network.connected.general && !G.flags.coatBought) setObjective('Buy the coat you couldn’t afford yesterday');
      if (G.flags.coatBought) setObjective('Warm at last. The evening is yours');
    } else if (day === 12) {
      if (G.flags.year2Started) {
        const bought = Object.keys(G.inventory).some(id => ITEMS[id] && ITEMS[id].seedOf && CONFIG.CROPS[ITEMS[id].seedOf].seasons.includes('Spring'));
        if (bought) setObjective('Your first spring. The field is yours — no script, just seasons');
      }
    }
  },

  /* ================= mid-day triggers (called every sim tick) ================= */
  tick() {
    const day = G.day, p = player();
    if (!p || G.mode !== 'play' || G.uiOpen) return;
    ARC.tick();
    LIFE.tick();
    // seasonal festivals, mid-season day 2 (the prologue's fair day is authored)
    if (day > 11 && dayOfSeason(day) === 2 && !G.dayFlags.festivalDone) {
      const season = seasonOf(day);
      const startAt = season === 'Summer' ? 20 : season === 'Winter' ? 18 : 12;
      if (G.hour >= startAt) { runFestival(season); return; }
    }
    // Fair auto-start at noon, day 7
    if (day === 7 && G.hour >= 12 && !G.flags.fairDone) {
      G.flags.fairDone = true;
      STORY.runFair();
    }
    // Aldwin at the fence, day 9 (after the shop attempt, or 13:00 regardless)
    if (day === 9 && !G.flags.aldwinDone &&
        (G.flags.squeezeFelt || G.hour >= 13) &&
        zoneAt(p.x, p.z) === 'farm') {
      G.flags.aldwinDone = true;
      STORY.runAldwin();
    }
    // Ledger reveal after reading mail, day 10
    if (day === 10 && !G.ledger.unlocked && G.mail.some(m => m.day === 10 && m.read)) {
      STORY.runLedgerArrives();
    }
    // Bramm walks to the shore, day 11 morning
    if (day === 11 && G.flags.brammShoreQueued && G.hour >= 9) {
      G.flags.brammShoreQueued = false;
      STORY.runBrammShore();
    }
    // Starlight Eve at 18:00
    if (day === 11 && G.hour >= 18 && !G.flags.starlightDone) {
      G.flags.starlightDone = true;
      STORY.runStarlight();
    }
  },

      { fn: () => {
        addItem('scarf', 1);
        jline('Starlight Eve. Snow, lanterns, the gift draw. The town gave me a scarf. I have lived here six days and it already fits.');
      } },
      { fn: () => {
        // Festival ends the day (spec §13). Straight to sleep & the year review.
        doSleep();
      } }
    ]);
  },

  showYearReview() {
    G.mode = 'scene';
    const reviewYear = yearOf(Math.max(0, G.day - 1));
    const card = $('yearCard');
    clearEl(card);
    card.style.display = 'block';
    card.appendChild(el('h2', null, 'Year ' + reviewYear + ' — ' + G.farmName));
    const body = el('div');
    body.id = 'yearBody';
    const by = {};
    for (const e of G.ledger.entries) by[e.enterprise] = (by[e.enterprise] || 0) + e.amount;
    const income = Object.keys(by).filter(k => by[k] > 0);
    const spendKeys = Object.keys(by).filter(k => by[k] < 0);
    body.appendChild(el('b', null, 'The Ledger says:'));
    for (const k of income) body.appendChild(el('div', null, '  ' + k + ': +$' + by[k]));
    for (const k of spendKeys) body.appendChild(el('div', null, '  ' + k + ': −$' + (-by[k])));
    const pend = G.pendingChecks.reduce((s, c) => s + c.amount, 0);
    if (pend) body.appendChild(el('div', null, '  Still in the mail: $' + pend));
    body.appendChild(el('br'));
    body.appendChild(el('b', null, 'The Journal remembers:'));
    const highlights = G.journal.slice(-6).map(e => e.lines[0]).filter(Boolean);
    for (const h of highlights) body.appendChild(el('div', null, '  · ' + h));
    card.appendChild(body);
    // the valley's regard (§7): relationships graded with the farm, additively
    const regard = Object.keys(G.hearts).reduce((s, id) => s + displayHearts(id), 0);
    const worked = G.world.tiles.filter(t => t.s === 'till' || t.crop).length;
    const exts = Object.keys(G.upgrades || {}).length;
    const rg = el('div', null, 'The valley’s regard: ' + (regard + worked + exts * 5) +
      '  (' + regard + ' hearts · ' + worked + ' worked tiles · ' + exts + ' improvements)');
    rg.style.cssText = 'color:var(--green);font-weight:bold;margin:6px 0';
    card.appendChild(rg);
    // customers strip (standing orders held)
    const customers = Object.keys(G.contracts || {});
    if (customers.length) {
      card.appendChild(el('b', null, 'Your customers: ' + customers.map(id => CAST[id].name).join(' · ')));
      card.appendChild(el('br'));
    }
    const btnJ = el('button', 'uiBtn', 'Export journal (.txt)');
    btnJ.onclick = exportJournal;
    card.appendChild(btnJ);
    const btnP = el('button', 'uiBtn', 'Save as picture (.png)');
    btnP.onclick = () => exportYearReviewPNG(reviewYear);
    card.appendChild(btnP);
    const firstYear = reviewYear === 1;
    const btn = el('button', 'uiBtn', firstYear ? 'Begin Year 2 — your first spring' : 'Begin Year ' + (reviewYear + 1));
    btn.onclick = () => {
      card.style.display = 'none';
      G.flags.year2Started = true;
      fadeOut(() => {
        if (firstYear) {
          say(['YEAR 2 — SPRING.',
            'The longest days you’ve had. A field you cleared yourself. And at Bramm’s, seed money that settles the same day you earn it.',
            'The tutorial is over. The farm is yours.'], () => {
            setObjective('Spring! Buy seeds at Bramm’s — your money settles same-day now');
            G.mode = 'play';
          });
        } else {
          say(['YEAR ' + (reviewYear + 1) + ' — SPRING. The valley turns over another page.'], () => { G.mode = 'play'; });
        }
        fadeIn();
      });
    };
    card.appendChild(btn);
    const mark = el('div', null, 'ALMANAC · made with Ambrook · ambrook.com · seed ' + G.world.seed);
    mark.style.cssText = 'font-size:10px;color:var(--green);margin-top:10px';
    card.appendChild(mark);
  },

  /* ================= doors & shops ================= */
  enterDoor(door) {
    const W = G.world;
    if (door.id === 'farmhouse') {
      const opts = [];
      const canSleep = G.hour >= CONFIG.SLEEP_FROM;
      if (canSleep) opts.push('Sleep until morning');
      if (G.upgrades && G.upgrades.kitchen) opts.push('Cook something');
      opts.push('Not yet');
      if (opts.length === 1) {
        say(['Too early to turn in — the light’s still worth something. (You can sleep from 18:00.)']);
        return;
      }
      showChoice(opts, i => {
        const pick = opts[i];
        if (pick === 'Sleep until morning') doSleep();
        else if (pick === 'Cook something') cookMenu();
      });
      return;
    }
    const rest = isRestday(G.day);
    const open = G.hour >= 9 && G.hour < 17;
    if (door.id === 'general') {
      if (rest && G.day !== 11) { say(['CLOSED — RESTDAY, says the sign. Through the side window: a lamp on in the back room, and the slow ka-chunk of an adding machine.']); sfx('kachunk'); return; }
      if (G.day === 11) { say(['The general store is dark. On a Restday, for once, actually dark.']); return; }
      if (!open) { say(['Bramm’s is shut. Hours: 9:00–17:00.']); return; }
      if (G.day === 10 && G.ledger.unlocked && !G.network.connected.general) {
        STORY.runBrammConnect(() => STORY.openGeneral());
        return;
      }
      STORY.openGeneral();
      return;
    }
    if (door.id === 'ranch') {
      if (rest) { say(['The ranch gate is latched for the Restday. Somewhere beyond it, a goose disapproves of you.']); return; }
      if (typeof openCoopMenu === 'function') openCoopMenu(); else STORY.openRanch();
      return;
    }
    // the tavern keeps its own hours: Restday evenings it's the fullest room in the valley (§5)
    if (door.id === 'tavern' && rest) {
      if (G.hour < 17) { say(['The Bluebird opens at dusk on Restdays — and then the whole valley shows up at once.']); return; }
    } else if (rest) { say(['Shut for the Restday. The whole street is.']); return; }
    else if (!open && door.id !== 'tavern') { say(['Closed for the day.']); return; }
    if (door.id === 'tavern') {
      // Stage 3b: Maren connects (Y2 spring, after Hetta)
      if (yearOf(G.day) >= 2 && G.network.connected.forge && !G.network.connected.tavern) {
        ARC.runMarenConnect();
        return;
      }
      const juke = JUKEBOX.filter(j => !(j.retiresAtStage && (G.network.stage || 0) >= j.retiresAtStage));
      showChoice(['Talk to Maren', 'The grants board', ...juke.map(j => '♪ ' + j.title), 'Leave'], i => {
        if (i === 0) say([{ who: 'maren', text: 'Bluebird’s open! Well — the door is. The kitchen argues. What’s the news from the farm?' }]);
        else if (i === 1) openGrantsBoard();
        else if (i <= juke.length + 1) { playJukebox(juke[i - 2].id); toast('♪ ' + juke[i - 2].title); }
      });
    }
    else if (door.id === 'forge') {
      // Stage 3a: Hetta connects (Y2 spring, estimates → invoices)
      if (yearOf(G.day) >= 2 && G.network.connected.general && !G.network.connected.forge) {
        ARC.runHettaConnect(() => STORY.openForge());
        return;
      }
      STORY.openForge();
    }
    else if (door.id === 'carpenter') {
      G.upgrades = G.upgrades || {};
      const builds = [];
      if (!G.upgrades.kitchen) builds.push({ key: 'kitchen', label: 'Build a kitchen — $250', price: 250,
        done: 'A kitchen! Two burners, one window over the sink, ideas about shelves! Done by tonight — I already had the measurements. Don’t ask how!' });
      else if (!G.upgrades.porch) builds.push({ key: 'porch', label: 'Build the porch — $200', price: 200,
        done: 'THE porch! Evening-facing, rail wide enough to lean a mug on. Your grandfather-house deserves this. DONE.' });
      if (!builds.length) { say([{ who: 'corwin', text: 'Kitchen: built! Porch: built! Next dream on the list is a barn, and that one starts at Greta’s gate, not mine!' }]); return; }
      showChoice([builds[0].label, 'Just saying hello'], i => {
        if (i !== 0) { say([{ who: 'corwin', text: 'Hello back! The offer stands — good bones deserve rooms!' }]); return; }
        if (!spend(builds[0].price, 'Upgrades', builds[0].key)) { toast('Not enough cash on hand.'); return; }
        G.upgrades[builds[0].key] = true;
        sfx('coin');
        say([{ who: 'corwin', text: builds[0].done, mood: 'happy' }], () => {
          jline('Corwin built the ' + builds[0].key + '. He hummed the whole time and signed a beam somewhere he thinks I won’t find.');
        });
      });
    }
    else if (door.id === 'clinic') say([{ who: 'isolde', text: 'Oh — hello. You look… well, you look like farming. Rest when you’re tired. People forget that’s medical advice.' }]);
    else say(['The door is friendly but firm: this is somebody’s home.']);
  },

  openForge() {
    const items = [];
    G.toolTiers = G.toolTiers || {};
    if (G.toolAway) {
      say([{ who: 'hetta', text: 'Your ' + G.toolAway.tool + '’s still in the fire. One thing at a time — that’s how they come out right.' }]);
      return;
    }
    const TOOL_NAMES = { hoe: 'Hoe', can: 'Watering Can', axe: 'Axe', hammer: 'Hammer', sickle: 'Sickle' };
    for (const t of G.tools) {
      if ((G.toolTiers[t] || 0) >= 1) continue;
      items.push({ icon: '⚒', name: 'Copper ' + TOOL_NAMES[t], price: CONFIG.TOOL_PRICES.copper,
        desc: CONFIG.TOOL_TURNAROUND + '-day turnaround — you lose the ' + t + '. Lighter swing after.',
        onBuy: () => {
          G.toolAway = { tool: t, backDay: G.day + CONFIG.TOOL_TURNAROUND };
          closeShop();
          say([{ who: 'hetta', text: 'Good. Leave it. ' + CONFIG.TOOL_TURNAROUND + ' days — and plan your watering around the loss, farmer. Rain is your friend now.' }]);
          jline('Left the ' + t + ' at the forge. Two days of working around its absence. Hetta looked delighted. The ' + t + ' looked resigned.');
        } });
    }
    if (yearOf(G.day) >= 2 && G.network.connected.forge) {
      ITEMS.sprinkler = ITEMS.sprinkler || { name: 'Iron Sprinkler', icon: '🚿', sell: 0 };
      items.push({ icon: '🚿', name: 'Iron Sprinkler', price: 90, give: 'sprinkler',
        desc: 'Set on tilled ground; waters its four neighbours each morning.' });
    }
    if (!items.length) { say([{ who: 'hetta', text: 'Everything you own is already copper. Iron’s a conversation for after you’ve worn the copper in.' }]); return; }
    openShop("Hetta's Forge & Supply", items,
      G.network.connected.forge ? '✳ invoices, settled on completion' : 'estimates chalked on the wall');
  },

  openRanch() {
    ITEMS.egg = ITEMS.egg || { name: 'Egg', icon: '🥚', sell: 8, enterprise: 'Eggs' };
    const items = [
      { icon: '🥚', name: 'Fresh Eggs ×4', price: 26, give: 'egg', count: 4, desc: 'From the good layers. (Your own coop: someday.)' }
    ];
    openShop("Greta's Ranch", items, 'the goose supervises all transactions');
  },

  // last season's per-crop earnings, shown as profit chips once the Ledger exists
  profitChip(cropName) {
    if (!G.ledger.unlocked) return '';
    const seasonStart = Math.floor(G.day / 3) * 3 - 3;
    if (seasonStart < 0) return '';
    const earned = G.ledger.entries
      .filter(e => e.enterprise === cropName && e.amount > 0 && e.day >= seasonStart && e.day < seasonStart + 3)
      .reduce((s, e) => s + e.amount, 0);
    return earned > 0 ? ' · last season: +$' + earned : '';
  },

  openGeneral() {
    const season = seasonOf(G.day);
    const items = [];
    for (const id in CONFIG.CROPS) {
      const c = CONFIG.CROPS[id];
      if (c.seasons.includes(season)) {
        items.push({ icon: '🌱', name: c.name + ' Seeds ×' + c.packet, price: c.seed,
          give: 'seed_' + id, count: c.packet,
          desc: c.days + ' days to harvest · sells $' + c.sell + STORY.profitChip(c.name) });
      }
    }
    // sell from your pockets — same price as the bin, instant cash
    for (const id of Object.keys(G.inventory)) {
      const it = ITEMS[id];
      if (!it || !it.sell) continue;
      const n = G.inventory[id];
      items.push({ icon: it.icon, name: 'Sell ' + it.name + ' ×' + n, price: 0,
        priceLabel: '+$' + it.sell * n, sellAll: { id, n },
        desc: 'over the counter, cash today' });
    }
    if (season === 'Winter' && !G.flags.coatBought) {
      items.push({ icon: '🧥', name: 'Winter Coat', price: CONFIG.COAT_PRICE,
        desc: 'Wool, valley-made. You want this.',
        onBuy: () => {
          G.flags.coatBought = true;
          addItem('coat', 1);
          say([{ who: 'bramm', text: 'Good coat. Should’ve had it two days ago, but that wasn’t your fault, was it.' }]);
        } });
    }
    if (!G.inventory.rod && !G.flags.rodBought) {
      ITEMS.rod = ITEMS.rod || { name: 'Bamboo Rod', icon: '🎣', sell: 0 };
      items.push({ icon: '🎣', name: 'Bamboo Rod', price: 40, desc: 'Cast at any water edge. The river is honest.',
        onBuy: () => { G.flags.rodBought = true; addItem('rod', 1); } });
    }
    const cap = backpackCap();
    if (cap < 36) {
      const next = cap === 12 ? 24 : 36;
      items.push({ icon: '🎒', name: 'Backpack (' + next + ' kinds)', price: CONFIG.BACKPACK_PRICES[next],
        desc: 'Room for a more complicated life.',
        onBuy: () => { G.backpack = next; toast('Backpack upgraded — ' + next + ' kinds of things now fit in your life.'); } });
    }
    if (!items.length) items.push({ icon: '🫙', name: 'Preserving Jar', price: 12, give: 'walnut', desc: 'For a quieter month. (Seeds return in spring.)' });
    const note = G.network.connected.general ? '✳ settles instantly' : 'cash only, checks by mail';
    STORY.onCantAfford = it => {
      if (G.day === 9 && !G.flags.squeezeFelt) {
        G.flags.squeezeFelt = true;
        say([
          { who: 'bramm', text: 'That’s $' + it.price + '. You’ve got… not that.' },
          { who: 'player', text: 'I have a check coming. ' + (G.pendingChecks.length ? '$' + G.pendingChecks.reduce((s, c) => s + c.amount, 0) + '. ' : '') + 'It exists — it’s just in an envelope somewhere between here and here.' },
          { who: 'bramm', text: 'Everybody’s money is in an envelope somewhere. That’s the whole valley, friend. Come back when yours lands.' }
        ], () => {
          jline('Stood in Bramm’s with a coat in hand and money that technically exists. Put the coat back. The walk home was educational, coldness-wise.');
          setObjective('The check’s still in the mail. Head home — winter days are short');
        });
      } else {
        toast('Not enough cash on hand.');
      }
    };
    openShop("Bramm's General", items, note);
  },

  /* ================= talk (line banks + gifts, phase 2) ================= */
  talkTo(npc) { socialTalk(npc); }
};

function startNewGame() {
  if (!G.world) G.world = generateWorld(TITLE.seed || 1234567);
  buildItems();
  bakePropSprites(seasonOf(CONFIG.START_DAY));
  buildWorldScene();
  bakeAllSprites();
  const W = G.world;
  G.day = CONFIG.START_DAY;
  G.hour = 8;
  G.weather = weatherFor(G.day);
  spawnPlayer(W.gazebo.x - 1.5, W.gazebo.z + 6);
  buildCast();
  assembleSchedules(G.day);
  snapSchedules();
  spawnForage();
  updateCamera(player().x, player().z, true);
  applyGrade();
  updateHUD();
  startSeasonMusic();
  jlineSeed();
  STORY.runIntro();
}
function jlineSeed() {
  jline('Signed the deed this morning. ' + G.farmName + ', ' + G.world.townName + ' valley. The field is a mess and the mess is mine.');
}
/* ============================== MAIN LOOP ================================ */
let lastT = 0, hudT = 0, gradeT = 0;
function frame(tms) {
  requestAnimationFrame(frame);
  const t = tms / 1000;
  const dt = Math.min(0.05, t - lastT || 0.016);
  lastT = t;
  // fps meter (debug/acceptance)
  G.fps.frames++;
  if (t - G.fps.last >= 1) { G.fps.value = G.fps.frames; G.fps.frames = 0; G.fps.last = t; }
  if (!G.world || !R.worldGroup) return;

  tickTime(dt);
  const p = player();
  if (p) {
    if (G.mode === 'play' && !G.uiOpen) {
      const iv = inputVector();
      const moving = (iv.x || iv.z) ? moveActor(p, iv.x, iv.z, dt) : false;
      tickActorAnim(p, dt, moving && (iv.x || iv.z));
    } else if (G.mode === 'scene') {
      tickNPC(p, dt);       // scenes drive the player by waypoint
    } else {
      tickActorAnim(p, dt, false);
    }
    if (RAD.open) { const iv = inputVector(); radialAim(iv.x, iv.z); }
    if (!simPaused()) tickSchedules();
    for (const id in ACTORS) if (id !== 'player') tickNPC(ACTORS[id], dt);
    STORY.tick();
    updateTargetHighlight(t);
    updateCamera(p.x, p.z, false);
  }
  rebuildTiles();
  tickWater(dt);
  tickParticles(dt);
  gradeT += dt;
  if (gradeT > 0.5) { gradeT = 0; applyGrade(); }
  hudT += dt;
  if (hudT > 0.25) { hudT = 0; if (G.mode === 'play') updateHUD(); }
  R.renderer.render(R.scene, R.camera);
}

/* ================================ BOOT =================================== */
function boot() {
  seedRNG(1);                     // texture-speckle stream; real seed re-seeds at worldgen
  buildStaticTextures();
  buildMaterials();
  buildItems();
  initThree();
  // orient the camera once so billboard quaternions are final before any bake
  R.camera.position.set(0, CONFIG.CAM_OFFSET.y, CONFIG.CAM_OFFSET.z);
  R.camera.lookAt(0, 0, 0);
  bakeCropSprites3D();
  initTouch();
  layout();
  TITLE.show();
  requestAnimationFrame(frame);
}
boot();

/* ========================= DEBUG / ACCEPTANCE ============================ */
// Harmless in play; used for the phase self-check. Not part of the game UI.
window.ALMANAC = {
  G, R, CONFIG, CAST, ITEMS,
  fps: () => G.fps.value,
  hour(h) { G.hour = h; updateHUD(); },
  money(n) { G.money = n; updateHUD(); },
  give(id, n) { addItem(id, n || 1); },
  tp(x, z) { const p = player(); actorSetPos(p, x, z); updateCamera(x, z, true); },
  sleep() { doSleep(); },
  state() {
    return { mode: G.mode, day: G.day, season: seasonOf(G.day), hour: +G.hour.toFixed(2),
      weather: G.weather, money: G.money, stamina: G.stamina, fatigue: +(G.fatigue || 0).toFixed(1),
      checks: G.pendingChecks, fps: G.fps.value,
      objective: G.flags.objective, connected: G.network.connected, ui: G.uiOpen,
      dlg: DLG.active, seed: G.world && G.world.seed, town: G.world && G.world.townName };
  },
  skipDialogue() {
    for (let i = 0; i < 200 && (DLG.active || CH.open); i++) {
      if (CH.open) pickChoice(CH.sel);
      else advanceDialogue();
    }
  },
  // Step the sim without waiting on (possibly throttled) rAF. Test-only.
  fastForward(sec, autoAdvance) {
    const dt = 1 / 60;
    const steps = Math.ceil(sec / dt);
    for (let i = 0; i < steps; i++) {
      if (autoAdvance && (DLG.active || CH.open)) this.skipDialogue();
      tickTime(dt);
      const p = player();
      if (p && G.mode === 'scene') tickNPC(p, dt);
      if (!simPaused()) tickSchedules();
      for (const id in ACTORS) if (id !== 'player') tickNPC(ACTORS[id], dt);
      STORY.tick();
      if (autoAdvance && (DLG.active || CH.open)) this.skipDialogue();
    }
    TL.dirty = true;
    updateHUD();
    const p2 = player();
    if (p2) updateCamera(p2.x, p2.z, true);
    return this.state();
  },
  plantStarter() {   // till+plant+water the starter patch (test helper)
    const W = G.world, f = W.field;
    const sx0 = Math.floor(f.w / 2 - 3);
    addItem('seed_turnip', 40);
    for (let tz = 0; tz < 6; tz++) for (let tx = sx0; tx < sx0 + 6; tx++) {
      const t = W.tiles[tz * f.w + tx];
      if (t.s === 'wild') { t.s = 'clear'; t.obj = null; }
      t.s = 'till'; t.crop = 'turnip'; t.grown = 0; t.watered = true; t.dead = false;
    }
    takeItem('seed_turnip', 36);
    TL.dirty = true;
    STORY.checkObjectives();
  },
  waterAll() {
    for (const t of G.world.tiles) if (t.crop) t.watered = true;
    TL.dirty = true; STORY.checkObjectives();
  },
  harvestAll() {
    for (const t of G.world.tiles) {
      if (t.crop && !t.dead && cropVisualStage(t) === 3) { addItem(t.crop, 1); t.crop = null; t.grown = 0; }
    }
    TL.dirty = true;
  },
  shipAll() {
    for (const id of Object.keys(G.inventory)) {
      if (ITEMS[id] && ITEMS[id].sell) { G.heldItem = id; shipHeld(); }
    }
  }
};
</script>
