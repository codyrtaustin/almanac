  R.scene.add(R.ambient);
  R.dir = new THREE.DirectionalLight(0xfff4e0, 0.55);
  R.scene.add(R.dir); R.scene.add(R.dir.target);
}

function setFrustum(h) {
  const aspect = CONFIG.VIEW_W / CONFIG.VIEW_H;
  R.camera.left = -h * aspect / 2; R.camera.right = h * aspect / 2;
  R.camera.top = h / 2; R.camera.bottom = -h / 2;
  R.camera.updateProjectionMatrix();
}

function updateCamera(px, pz, snap) {
  const dx = px - R.followX, dz = pz - R.followZ;
  const d = Math.hypot(dx, dz);
  if (snap) { R.followX = px; R.followZ = pz; }
  else if (d > CONFIG.CAM_DEADZONE) {
    R.followX += dx * CONFIG.CAM_LERP; R.followZ += dz * CONFIG.CAM_LERP;
  }
  const zone = zoneAt(px, pz);
  R.viewHTarget = CONFIG.ZONE_HEIGHT[zone] || CONFIG.ZONE_HEIGHT.wild;
  R.viewH = lerp(R.viewH, R.viewHTarget, CONFIG.ZONE_EASE);
  setFrustum(R.viewH);
  const o = CONFIG.CAM_OFFSET;
  R.camera.position.set(R.followX + o.x, o.y, R.followZ + o.z);
  R.camera.lookAt(R.followX, 0, R.followZ);
  // the clay secret: headlamp light rides the camera, target rides the look-at
  R.dir.position.copy(R.camera.position);
  R.dir.target.position.set(R.followX, 0, R.followZ);
  R.dir.target.updateMatrixWorld();
}

const MAT = {};
function lambert(color) { return new THREE.MeshLambertMaterial({ color }); }
function buildMaterials() {
  const P = CONFIG.PALETTE;
  MAT.wood = lambert(P.wood); MAT.woodDark = lambert('#8a6244');
  MAT.roofRed = lambert(P.roofRed); MAT.roofTeal = lambert(P.roofTeal);
  MAT.stone = lambert(P.stone); MAT.plaster = lambert('#E3D6B8');
  MAT.trunk = lambert('#7d5a3e');
  MAT.canopy = lambert('#5E8A55'); MAT.pine = lambert('#4E7A55');
  MAT.door = lambert('#6b4a30');
  MAT.blob = new THREE.MeshBasicMaterial({ map: TEX.blob, transparent: true, depthWrite: false });
}

function addBlob(parent, x, z, s, opacity) {
  const m = new THREE.Mesh(new THREE.PlaneGeometry(s, s * 0.8),
    new THREE.MeshBasicMaterial({ map: TEX.blob, transparent: true, depthWrite: false, opacity: opacity || 1 }));
  m.rotation.x = -Math.PI / 2; m.position.set(x, 0.008, z);
  parent.add(m);
  return m;
}
function registerBox(x, z, hw, hd) { G.world.colliders.push({ x, z, hw, hd }); }

function makeRoof(w, d, h, mat) {
  const shape = new THREE.Shape();
  shape.moveTo(-d / 2, 0); shape.lineTo(d / 2, 0); shape.lineTo(0, h); shape.closePath();
  const geo = new THREE.ExtrudeGeometry(shape, { depth: w, bevelEnabled: false });
  geo.translate(0, 0, -w / 2);
  geo.rotateY(Math.PI / 2);
  return new THREE.Mesh(geo, mat);
}

// Buildings pass: textured plank/plaster walls, shingle roofs, fascia trim,
// a stone foundation course, shuttered windows, a plank door with a real
// threshold, and a chimney + static smoke wisp on working buildings — the
// "rustic diorama" register the art direction calls for, not flat boxes.
const WALL_TEX = { plank: 'plank', plankTeal: 'plankTeal', plaster: 'plaster' };
function wallMaterial(style) {
  const key = 'wall_' + (style || 'plaster');
  if (!MAT[key]) {
    const tex = TEX[WALL_TEX[style] || 'plaster'];
    tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
    MAT[key] = new THREE.MeshLambertMaterial({ map: tex });
  }
  return MAT[key];
}
function roofMaterial(color) {
  const key = 'roofTex_' + color;
  if (!MAT[key]) {
    const tex = color === 'teal' ? TEX.shingleTeal : TEX.shingleRed;
    tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
    MAT[key] = new THREE.MeshLambertMaterial({ map: tex });
  }
  return MAT[key];
}
function makeBuilding(def) {
  const g = new THREE.Group();
  const h = def.h || 3.4;
  const wallMat = wallMaterial(def.wallStyle);
  const wall = new THREE.Mesh(new THREE.BoxGeometry(def.w, h, def.d), wallMat);
  wall.position.y = h / 2; g.add(wall);
  // foundation course
  const found = new THREE.Mesh(new THREE.BoxGeometry(def.w + 0.24, 0.3, def.d + 0.24),
    new THREE.MeshLambertMaterial({ map: TEX.foundation }));
  found.position.y = 0.15; g.add(found);
  const roofH = def.w * 0.32;
  const roof = makeRoof(def.w + 1.2, def.d + 1.2, roofH, roofMaterial(def.roof));
  roof.position.y = h; g.add(roof);
  // fascia trim along the eaves, front and back
  for (const dz of [1, -1]) {
    const fascia = new THREE.Mesh(new THREE.BoxGeometry(def.w + 1.0, 0.16, 0.14), MAT.woodDark);
    fascia.position.set(0, h + 0.02, dz * (def.d / 2 + 0.56)); g.add(fascia);
  }
  // Art Bible §8: roof snow-load on upper faces, winter only — built once,
  // visibility toggled by season rather than rebuilding the building mesh.
  const snowCap = new THREE.Mesh(new THREE.BoxGeometry(def.w * 0.85, 0.12, 0.7),
    new THREE.MeshBasicMaterial({ color: '#E8EAE6' }));
  snowCap.position.set(0, h + roofH - 0.08, 0);
  snowCap.visible = false;
  g.add(snowCap);
  R.roofSnowCaps = R.roofSnowCaps || [];
  R.roofSnowCaps.push(snowCap);
  // oversized plank door, real frame + threshold step
  const door = new THREE.Mesh(new THREE.PlaneGeometry(1.7, 2.5),
    new THREE.MeshLambertMaterial({ map: TEX.doorPlank }));
  door.position.set(0, 1.25, def.d / 2 + 0.03); g.add(door);
  const frame = new THREE.Mesh(new THREE.BoxGeometry(2.0, 2.7, 0.12), MAT.woodDark);
  frame.position.set(0, 1.35, def.d / 2 - 0.02); g.add(frame);
  const step = new THREE.Mesh(new THREE.BoxGeometry(2.1, 0.16, 0.5),
    new THREE.MeshLambertMaterial({ map: TEX.foundation }));
  step.position.set(0, 0.08, def.d / 2 + 0.5); g.add(step);
  // shuttered windows
  if (!MAT.shutter) MAT.shutter = lambert('#5E4A38');
  const shutterMat = MAT.shutter;
  for (const wx of [-def.w / 4 - 0.4, def.w / 4 + 0.4]) {
    const win = new THREE.Mesh(new THREE.PlaneGeometry(1.2, 1.2),
      new THREE.MeshBasicMaterial({ map: TEX.windowDark }));
    win.position.set(wx, 1.7, def.d / 2 + 0.03);

      shutter.position.set(wx + sx, 1.7, def.d / 2 + 0.02); g.add(shutter);
    }
  }
  // chimney + a static smoke wisp on working buildings
  if (def.chimney) {
    const chim = new THREE.Mesh(new THREE.BoxGeometry(0.55, 1.6, 0.55),
      new THREE.MeshLambertMaterial({ map: TEX.foundation }));
    chim.position.set(def.w / 2 - 0.7, h + roofH * 0.55, -0.3); g.add(chim);
    for (let i = 0; i < 3; i++) {
      const puff = new THREE.Mesh(new THREE.PlaneGeometry(0.4 + i * 0.15, 0.4 + i * 0.15),
        new THREE.MeshBasicMaterial({ color: '#C9CFCB', transparent: true, opacity: 0.32 - i * 0.07, depthWrite: false }));
      puff.position.set(def.w / 2 - 0.7 + i * 0.12, h + roofH * 0.55 + 0.9 + i * 0.55, -0.3);
      puff.rotation.x = -Math.PI / 5; g.add(puff);

  if (def.name) {

    sign.position.set(0, h + 0.15, def.d / 2 + 0.05); g.add(sign);
  }
  return g;

  if (roundIM) WG.add(roundIM);
  if (pineIM) WG.add(pineIM);
  for (const t of trees) addBlob(WG, t.x, t.z, 3.4 * t.s, 0.45);

  // target highlight quad
  R.target = new THREE.Mesh(new THREE.PlaneGeometry(0.96, 0.96),
    new THREE.MeshBasicMaterial({ map: TEX.target, transparent: true, opacity: 0.25, depthWrite: false }));
  R.target.rotation.x = -Math.PI / 2; R.target.position.y = 0.03;
  WG.add(R.target);

  buildTileLayers(WG);
  buildParticles(WG);
  R.scene.add(WG);
}

/* ---- instanced farm-tile overlays & crops ---- */
const TL = { layers: {}, dirty: true, group: null };
function cropVisualStage(t) {
  const days = CONFIG.CROPS[t.crop].days;
  if (t.grown >= days) return 3;
  if (t.grown === 0) return 0;
  return t.grown / days >= 0.5 ? 2 : 1;
}
function buildTileLayers(parent) {
  TL.layers = {}; TL.dirty = true;
  const cap = CONFIG.FIELD_W * CONFIG.FIELD_H;
  const planeGeo = new THREE.PlaneGeometry(0.96, 0.96);
  const mk = (name, geo, mat, capacity) => {
    const im = new THREE.InstancedMesh(geo, mat, capacity || cap);
    im.count = 0; im.frustumCulled = false; parent.add(im);
    TL.layers[name] = im;
    return im;
  };
  const flat = tex => new THREE.MeshLambertMaterial({ map: tex });
  mk('clear', planeGeo, flat(TEX.cleared));
  mk('till', planeGeo, flat(TEX.tilled));
  mk('water', planeGeo, flat(TEX.watered));
  mk('weed', new THREE.PlaneGeometry(0.8, 0.8),
    new THREE.MeshLambertMaterial({ map: TEX.weed, transparent: true, side: THREE.DoubleSide }));
  mk('rock', new THREE.DodecahedronGeometry(0.32, 0), MAT.stone);
  mk('stump', new THREE.CylinderGeometry(0.34, 0.42, 0.5, 8), MAT.trunk);
  mk('boulder', new THREE.DodecahedronGeometry(0.62, 0), MAT.stone);
  mk('log', new THREE.CylinderGeometry(0.3, 0.3, 1.4, 8), MAT.trunk);
  mk('sprinkler', new THREE.CylinderGeometry(0.1, 0.16, 0.5, 6), lambert('#8C9499'));
  // crops are painted sprite stages, billboarded like everything alive (§3)
  // Crops are baked from real 3D geometry now (chonky, per user feedback),
  // matching the bake's own worldW/worldH framing so nothing looks stretched.
  const cropQuad = new THREE.PlaneGeometry(1.05, 1.46);
  const sprMat = tex => new THREE.MeshBasicMaterial({ map: tex, transparent: true, alphaTest: 0.4 });
  mk('dead', cropQuad, sprMat(CropSprites.dead));
  mk('crop0', cropQuad, sprMat(CropSprites.stage0));
  mk('crop1', cropQuad, sprMat(CropSprites.stage1));
  for (const id in CONFIG.CROPS) {
    mk('mid_' + id, cropQuad, sprMat(CropSprites['mid_' + id]));
    mk('ripe_' + id, cropQuad, sprMat(CropSprites['ripe_' + id]));
  }
}
const tlDummy = new THREE.Object3D();
function rebuildTiles() {
  if (!TL.dirty) return;
  TL.dirty = false;
  const W = G.world, f = W.field;
  const counts = {};
  const isSprite = layer => layer === 'dead' || layer.startsWith('crop') ||
    layer.startsWith('mid_') || layer.startsWith('ripe_');
  const put = (layer, x, y, z, ry) => {
    const im = TL.layers[layer];
    if (!im) return;
    const i = counts[layer] = (counts[layer] || 0);
    tlDummy.position.set(x, y, z);
    if (isSprite(layer)) tlDummy.quaternion.copy(billboardQuat());
    else {
      tlDummy.rotation.set(layer === 'clear' || layer === 'till' || layer === 'water' ? -Math.PI / 2 : 0, ry || 0, 0);
      if (layer === 'log') tlDummy.rotation.set(0, 0.4, Math.PI / 2);
    }
    tlDummy.scale.set(1, 1, 1);
    tlDummy.updateMatrix();
    im.setMatrixAt(i, tlDummy.matrix);
    counts[layer] = i + 1;
  };
  for (let tz = 0; tz < f.h; tz++) for (let tx = 0; tx < f.w; tx++) {
    const t = W.tiles[tz * f.w + tx];
    const x = f.x0 + tx + 0.5, z = f.z0 + tz + 0.5;
    if (t.s === 'clear') put('clear', x, 0.012, z);
    if (t.s === 'till') put(t.watered ? 'water' : 'till', x, 0.014, z);
    if (t.obj === 'weed') { put('weed', x, 0.4, z, 0.3); put('weed', x, 0.4, z, 1.87); }
    else if (t.obj) put(t.obj, x, t.obj === 'rock' ? 0.2 : 0.25, z);
    if (t.crop && !t.dead) {
      const vs = cropVisualStage(t);
      if (vs === 3) put('ripe_' + t.crop, x, 0.73, z);
      else if (vs === 2) put('mid_' + t.crop, x, 0.73, z);
      else put('crop' + vs, x, 0.73, z);
    }
    if (t.crop && t.dead) put('dead', x, 0.73, z);
  }
  for (const name in TL.layers) {
    TL.layers[name].count = counts[name] || 0;
    TL.layers[name].instanceMatrix.needsUpdate = true;
  }
}

/* ---- forage items on the ground ---- */
const FORAGE_LIVE = [];
function spawnForage() {
  for (const fmesh of FORAGE_LIVE) R.worldGroup.remove(fmesh.mesh);
  FORAGE_LIVE.length = 0;
  let spots = forageForDay(G.day);
  // an unannounced blessing: the valley doubles its gifts today (§13)
  if (G.flags.blessForage) {
    G.flags.blessForage = false;
    spots = spots.concat(forageForDay(G.day ^ 0x77).map(f => ({ x: f.x + 2, z: f.z + 2, item: f.item })));
    jline('The woods were strangely generous today. I have a guess why, and I’m not writing it down.');
  }
  // rain brings worms up along the paths (Ness’s trade)
  if (WET(G.weather) && typeof CONTRACT_DEFS !== 'undefined') {
    ITEMS.worm = ITEMS.worm || { name: 'Bait Worm', icon: '🪱', sell: 3, enterprise: 'Fishing' };
    const cal = calendarDay(G.day ^ 0x3AB).r;
    for (let i = 0; i < 3; i++) {
      const sp = G.world.forageSpots[Math.floor(cal() * G.world.forageSpots.length)];
      if (sp) spots.push({ x: sp.x + 1, z: sp.z - 1, item: { id: 'worm', name: 'Bait Worm', icon: '🪱', sell: 3 } });
    }
  }
  for (const f of spots) {
    if (G.dayFlags['picked_' + Math.round(f.x) + '_' + Math.round(f.z)]) continue;
    const g = new THREE.Group();
    // baked lit-3D forage sprite (§V6b), emoji glyph as a fallback only if
    // the bake didn't run (CONFIG.BAKE_SPRITES off / render failure)
    const forageTex = CropSprites['forage_' + f.item.id] || emojiTex(f.item.icon);
    const sprite = new THREE.Mesh(new THREE.PlaneGeometry(0.5, 0.7),
      new THREE.MeshBasicMaterial({ map: forageTex, transparent: true, alphaTest: 0.4 }));
    sprite.position.y = 0.35; g.add(sprite);
    addBlob(g, 0, 0, 0.9, 0.6);
    g.position.set(f.x, terrainHeightAt(f.x, f.z), f.z);
    R.worldGroup.add(g);
    FORAGE_LIVE.push({ x: f.x, z: f.z, item: f.item, mesh: g, sprite });
  }
}

/* ---- weather particles (rain / snow) ---- */
function buildParticles(parent) {
  const n = 320;
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(n * 3);
  for (let i = 0; i < n; i++) {
    pos[i * 3] = (Math.random() - 0.5) * 40;
    pos[i * 3 + 1] = Math.random() * 16;
    pos[i * 3 + 2] = (Math.random() - 0.5) * 30;
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  const mat = new THREE.PointsMaterial({ color: 0xdde8f0, size: 0.14, transparent: true, opacity: 0.8 });
  R.particles = new THREE.Points(geo, mat);
  R.particles.visible = false; R.particles.frustumCulled = false;
  parent.add(R.particles);
}
function tickParticles(dt) {
  const p = R.particles;
  if (!p) return;
  const raining = WET(G.weather), snowing = G.weather === 'snow';
  const storming = G.weather === 'storm';
  p.visible = raining || snowing;
  if (!p.visible) return;
  p.material.size = snowing ? 0.18 : storming ? 0.13 : 0.1;
  p.material.color.set(snowing ? 0xf4f6f4 : 0xaCc4d4);
  const arr = p.geometry.attributes.position.array;
  const fall = snowing ? 2.2 : storming ? 26 : 16;
  for (let i = 0; i < arr.length; i += 3) {
    arr[i + 1] -= fall * dt;
    if (snowing) arr[i] += Math.sin((arr[i + 1] + i) * 0.8) * dt * 0.6;
    if (arr[i + 1] < 0) {
      arr[i + 1] = 14 + Math.random() * 3;
      arr[i] = (Math.random() - 0.5) * 40;
      arr[i + 2] = (Math.random() - 0.5) * 30;
    }
  }
  p.position.set(R.followX, 0, R.followZ);
  p.geometry.attributes.position.needsUpdate = true;
}

/* ---- day-grade overlays, window lights, sky ---- */
// Art Bible §1: the reference engine steps a 24h light curve (night floor
// ~31% brightness, golden hour holds R while G/B fall, sunset deepens that
// warmth, dusk begins the night stack). Translated as five graded stops keyed
// off the same DUSK_HOUR/NIGHT_HOUR anchors the seasonal daylight system
// already uses — golden hour = dusk-2h, sunset = dusk-1h — rather than fixed
// clock hours, so winter's early dusk still gets its own golden hour etc.
function applyGrade() {
  const season = seasonOf(G.day);
  const duskHour = CONFIG.DUSK_HOUR[season], nightHour = CONFIG.NIGHT_HOUR[season];
  const goldenStart = duskHour - 2, sunsetStart = duskHour - 1;
  const soft = $('gradeSoft'), mult = $('gradeMult');
  const P = CONFIG.PALETTE;
  const h = G.hour;
  let phase = 'day';
  if (h >= nightHour) phase = 'night';
  else if (h >= duskHour) phase = 'dusk';
  else if (h >= sunsetStart) phase = 'sunset';
  else if (h >= goldenStart) phase = 'golden';

  const SOFT = '#E8A87C', MULT_WARM = '#e0c0b0', SOFT_NIGHT = '#8a94c0', MULT_NIGHT = '#4A5578';
  soft.style.background = SOFT;
  if (phase === 'day') {
    soft.style.opacity = 0;
    // morning ramp (§1: 06-07 dimmer, 08-11 brighter, full day from noon)
    if (h < 8) R.ambient.intensity = lerp(0.68, 0.75, clamp((h - 6) / 2, 0, 1));
    else if (h < 12) R.ambient.intensity = lerp(0.75, 0.78, clamp((h - 8) / 4, 0, 1));
    else R.ambient.intensity = 0.78;
    if (WET(G.weather) || G.weather === 'snow') {
      // snow days use the SUNNY curve (§1) — only rain/storm carry the cool
      // multiply; winter gloom is a modern instinct, not a reference fact.
      if (WET(G.weather)) {
        mult.style.background = '#B0B0C0';
        mult.style.opacity = G.weather === 'storm' ? 0.42 : 0.2;
      } else mult.style.opacity = 0;
    } else mult.style.opacity = 0;
    const daySky = (SEASON_TILES[season] && SEASON_TILES[season].sky) || P.sky;
    R.scene.background.set(WET(G.weather) || G.weather === 'cloud' ? '#A8BCC4' : daySky);
  } else if (phase === 'golden') {
    const t = clamp((h - goldenStart) / 1, 0, 1);
    soft.style.opacity = lerp(0, 0.35, t);
    mult.style.opacity = 0;
    R.ambient.intensity = lerp(0.78, 0.75, t);
    R.scene.background.set((SEASON_TILES[season] && SEASON_TILES[season].sky) || P.sky);
  } else if (phase === 'sunset') {
    const t = clamp((h - sunsetStart) / 1, 0, 1);
    soft.style.opacity = lerp(0.35, 0.5, t);
    mult.style.background = MULT_WARM; mult.style.opacity = lerp(0, 0.2, t);
    R.ambient.intensity = lerp(0.75, 0.72, t);
    R.scene.background.set('#D8B49A');
  } else if (phase === 'dusk') {
    // dusk = the night stack fading in to ~70% strength (§1)
    const t = clamp((h - duskHour) / Math.max(0.25, nightHour - duskHour), 0, 1) * 0.7;
    soft.style.background = lerpHex(SOFT, SOFT_NIGHT, t / 0.7);
    soft.style.opacity = lerp(0.5, 0.3, t / 0.7);
    mult.style.background = lerpHex(MULT_WARM, MULT_NIGHT, t / 0.7);
    mult.style.opacity = lerp(0.2, 0.42, t);
    R.ambient.intensity = lerp(0.72, 0.55, t);
    R.scene.background.set(lerpHex('#D8B49A', P.skyNight, t));
  } else {
    soft.style.background = SOFT_NIGHT; soft.style.opacity = 0.3;
    mult.style.background = MULT_NIGHT; mult.style.opacity = 0.42;
    R.ambient.intensity = 0.55;   // lands ≈ the reference's 31% night floor
    R.scene.background.set(P.skyNight);
  }
  R.scene.fog.color.copy(R.scene.background);
  // NIGHTTIME mostly *sounds* like night (§1/§6): the loop thins to a sparse
  // night arrangement after dark instead of playing the day mix
  if (typeof MUS !== 'undefined' && !MUS.jukeboxUntil && G.mode === 'play') {
    const wantSparse = phase === 'night';
    const seasonLoop = MUS.current && !TRACKS[MUS.current].juke;
    if (seasonLoop && MUS.sparse !== wantSparse) startSeasonMusic(wantSparse);
    else if (!MUS.current) startSeasonMusic(wantSparse);
  }
  // roof snow-load, winter only (§8) — toggle, don't rebuild
  if (R.roofSnowCaps) {
    const showSnow = season === 'Winter';
    for (const cap of R.roofSnowCaps) cap.visible = showSnow;
  }
  // windows go emissive by texture swap at dusk
  const lit = phase === 'dusk' || phase === 'night';
  for (const w of R.windowMeshes) {
    const want = lit ? TEX.windowLit : TEX.windowDark;
    if (w.material.map !== want) { w.material.map = want; w.material.needsUpdate = true; }
  }
  // Bramm's back-room light: lit on Restdays until the network frees him (day, too)
  if (R.backroomWindow) {
    const backLit = (!G.network.connected.general && isRestday(G.day)) || lit;
    const want = backLit ? TEX.windowLit : TEX.windowDark;
    if (R.backroomWindow.material.map !== want) {
      R.backroomWindow.material.map = want; R.backroomWindow.material.needsUpdate = true;
    }
  }
}
/* ======================== CAST: chibi characters ========================= */
// Super-deformed: head ≈ 1/3 height, stubby limbs, dot eyes. Live 3D chibis
// (spec-sanctioned fallback); the bake pipeline arrives with phase 2's cast.
const SKINS = ['#E8C49C', '#D4A374', '#B07E52', '#8A5C38'];
const HAIRS = ['#5A4030', '#2E2620', '#B08040', '#C4643C', '#8C8C84', '#E0C070'];
// Ledger green is reserved absolutely (Ledger tab, connected-shop glyphs,
// year-review frame — nowhere else, ever); '#7E8A5E' keeps a mossy-olive
// option in the picker without touching the brand hue.
const SHIRTS = ['#5E8E8A', '#B3574C', '#7E8A5E', '#B99A6B', '#6A6AA0', '#C48A3C'];

// Built out for real dimensionality (user feedback: "not 3D enough"):
// cylinders and sphere-stacks in place of flat boxes, a neck to separate
// head from body, hands and shoe-caps to ground the silhouette, a rounded
// hip/belly bulge for the stubby "clay figure" proportions the style guide
// calls for. No CapsuleGeometry (r128 doesn't have it) — cylinders + spheres
// throughout. legs[]/arms[] are now pivot GROUPS (thigh+shoe, upper+mitt)
// so the existing swing-animation code (which only sets .rotation.x) keeps
// working unchanged; the pivot sits at the hip/shoulder in both cases.
function makeChibi(rec) {
  const g = new THREE.Group();
  const skin = lambert(rec.skin), hair = lambert(rec.hair);
  const shirt = lambert(rec.shirt), pants = lambert(rec.pants || '#6b5a44');
  const shoeMat = lambert('#3E3226');
  const legs = [], arms = [];
  for (const sx of [-0.11, 0.11]) {
    const leg = new THREE.Group();
    const thigh = new THREE.Mesh(new THREE.CylinderGeometry(0.075, 0.095, 0.3, 8), pants);
    thigh.position.y = -0.15; leg.add(thigh);
    const shoe = new THREE.Mesh(new THREE.SphereGeometry(0.1, 8, 6), shoeMat);
    shoe.scale.set(1, 0.55, 1.35); shoe.position.set(0, -0.31, 0.02); leg.add(shoe);
    leg.position.set(sx, 0.33, 0);
    g.add(leg); legs.push(leg);
  }
  // rounded hip/belly bulge under the torso for stubby, sculpted proportions
  const hip = new THREE.Mesh(new THREE.SphereGeometry(0.23, 10, 7), pants);
  hip.scale.set(1, 0.62, 0.95); hip.position.y = 0.35; g.add(hip);
  // torso: a barrel cylinder (rounder than a box), gentle taper to the chest
  const body = new THREE.Mesh(new THREE.CylinderGeometry(0.185, 0.225, 0.4, 10), shirt);
  body.position.y = 0.54; g.add(body);
  const chest = new THREE.Mesh(new THREE.SphereGeometry(0.2, 10, 7), shirt);
  chest.scale.set(1, 0.85, 0.9); chest.position.y = 0.72; g.add(chest);
  const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.095, 0.11, 0.09, 8), skin);
  neck.position.y = 0.83; g.add(neck);
  for (const sx of [-0.28, 0.28]) {
    const arm = new THREE.Group();
    const upper = new THREE.Mesh(new THREE.CylinderGeometry(0.055, 0.07, 0.32, 8), shirt);
    upper.position.y = -0.16; arm.add(upper);
    const mitt = new THREE.Mesh(new THREE.SphereGeometry(0.075, 8, 6), skin);
    mitt.position.y = -0.34; arm.add(mitt);
    arm.position.set(sx, 0.7, 0); g.add(arm); arms.push(arm);
  }
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.34, 12, 10), skin);
  head.scale.set(1, 0.97, 0.93);   // a soft taper toward the chin, sculpted not spherical
  head.position.y = 1.06; g.add(head);
  const cheeks = new THREE.Mesh(new THREE.SphereGeometry(0.34, 12, 10), skin);
  cheeks.scale.set(1.04, 0.9, 0.97); cheeks.position.set(0, 1.0, 0.02); g.add(cheeks);
  const hairM = new THREE.Mesh(new THREE.SphereGeometry(0.375, 12, 10,
    0, Math.PI * 2, 0, Math.PI * 0.56), hair);
  hairM.position.y = 1.12; g.add(hairM);
  if (rec.long) {
    for (const sx of [-0.16, 0.16]) {
      const drape = new THREE.Mesh(new THREE.CylinderGeometry(0.09, 0.05, 0.46, 7), hair);
      drape.position.set(sx, 0.86, -0.12); drape.rotation.z = sx > 0 ? -0.12 : 0.12;
      g.add(drape);
    }
    const back = new THREE.Mesh(new THREE.SphereGeometry(0.28, 8, 6), hair);
    back.scale.set(1, 1.1, 0.55); back.position.set(0, 0.98, -0.2); g.add(back);
  }
  for (const ex of [-0.12, 0.12]) {
    const eye = new THREE.Mesh(new THREE.SphereGeometry(0.038, 6, 5), lambert('#2E2620'));
    eye.position.set(ex, 1.07, 0.31); g.add(eye);
  }
  if (rec.hat) {
    const brim = new THREE.Mesh(new THREE.CylinderGeometry(0.46, 0.5, 0.05, 10), lambert(rec.hat));
    brim.position.y = 1.32; g.add(brim);
    const top = new THREE.Mesh(new THREE.CylinderGeometry(0.26, 0.3, 0.22, 10), lambert(rec.hat));
    top.position.y = 1.44; g.add(top);
  }
  g.userData = { legs, arms };
  return g;
}

const ACTORS = {};   // id -> actor (player + villagers)
function makeActor(id, rec, x, z) {
  const group = new THREE.Group();
  let sprite = null;
  const bank = (typeof SpriteBank !== 'undefined') && SpriteBank[id];
  if (bank) {
    // §2: locked so a standing character reads ~56-64px on the 640-wide buffer
    // at the ~28-32px/tile zoom (2x the original's 320-wide/~28-32px chars).
    const quad = new THREE.Mesh(new THREE.PlaneGeometry(1.34, 2.0),
      new THREE.MeshBasicMaterial({ map: bank.tex, transparent: true, alphaTest: 0.4 }));
    quad.position.y = 0.96;
    group.add(quad);
    sprite = { quad, tex: bank.tex };
  } else {
    group.add(makeChibi(rec));
  }
  group.position.set(x, 0, z);
  const blob = addBlob(group, 0, 0, 1.1, 0.8);
  blob.position.y = 0.01;
  R.scene.add(group);
  const a = {
    id, rec, group, x, z, face: Math.PI,             // face south (camera)
    speed: CONFIG.NPC_SPEED, waypoints: [], moving: false,
    animT: 0, animFrame: 0, hopT: 0, blob, visible: true, sprite
  };
  ACTORS[id] = a;
  return a;
}
function removeActor(id) {
  const a = ACTORS[id];
  if (a) { R.scene.remove(a.group); delete ACTORS[id]; }
}
function actorSetPos(a, x, z) {
  a.x = x; a.z = z;
  a.baseY = terrainHeightAt(x, z);
  a.group.position.set(x, a.baseY, z);
  if (a.id === 'player') updateCamera(x, z, true);
}

/* ---- collision ---- */
function positionFree(x, z, self) {
  const W = G.world;
  const r = 0.3;
  for (const s of [[-r, 0], [r, 0], [0, -r], [0, r]]) {
    if (!W.walkable(x + s[0], z + s[1])) return false;
  }
  for (const c of W.colliders) {
    if (Math.abs(x - c.x) < c.hw + r && Math.abs(z - c.z) < c.hd + r) return false;
  }
  for (const c of W.circles) {
    if (dist2(x, z, c.x, c.z) < (c.r + r) * (c.r + r)) return false;
  }
  return true;
}
function moveActor(a, dx, dz, dt) {
  let moved = false;
  const nx = a.x + dx * a.speed * dt;
  if (positionFree(nx, a.z, a)) { a.x = nx; moved = true; }
  const nz = a.z + dz * a.speed * dt;
  if (positionFree(a.x, nz, a)) { a.z = nz; moved = true; }
  if (dx || dz) a.face = Math.atan2(dx, dz);
  a.baseY = terrainHeightAt(a.x, a.z);
  a.group.position.set(a.x, a.baseY + (a.hopY || 0), a.z);
  if (!a.sprite) a.group.rotation.y = a.face;   // billboards keep camera-facing
  return moved;
}
function tickActorAnim(a, dt, walking) {
  if (a.sprite) { updateSpriteFrame(a, walking, dt); return; }
  const swing = [0, 1, 0, -1];
  if (walking) {
    a.animT += dt;
    if (a.animT > 0.125) { a.animT = 0; a.animFrame = (a.animFrame + 1) % 4; }
  } else { a.animFrame = 0; }
  const s = swing[a.animFrame] * 0.55;
  // low-stamina slump (player only, diegetic tell)
  let slump = 0;
  if (a.id === 'player' && G.stamina <= CONFIG.SLUMP_AT) slump = 0.12;
  if (a.id === 'player' && G.stamina <= CONFIG.SWEAT_AT) slump = 0.2;
  const u = a.group.children[0].userData;
  u.legs[0].rotation.x = s; u.legs[1].rotation.x = -s;
  u.arms[0].rotation.x = -s * 0.8; u.arms[1].rotation.x = s * 0.8;
  a.group.rotation.x = slump * 0.5;
  if (a.hopT > 0) {                    // tool-use hop
    a.hopT -= dt;
    a.hopY = Math.max(0, Math.sin((1 - a.hopT / 0.18) * Math.PI) * 0.16);
    if (a.hopT <= 0) a.hopY = 0;
    a.group.position.y = (a.baseY || 0) + a.hopY;
  }
}
// NPC waypoint walking (interpolated, never teleports)
function tickNPC(a, dt) {
  if (!a.waypoints.length) { tickActorAnim(a, dt, false); return; }
  const wp = a.waypoints[0];
  const dx = wp.x - a.x, dz = wp.z - a.z;
  const d = Math.hypot(dx, dz);
  if (d < 0.25) {
    a.waypoints.shift();
    if (wp.onArrive) wp.onArrive();
    tickActorAnim(a, dt, false);
    return;
  }
  const moved = moveActor(a, dx / d, dz / d, dt);
  if (!moved) {
    // slide along the obstacle: try both perpendiculars, keep whichever works
    a.slideDir = a.slideDir || 1;
    if (!moveActor(a, -dz / d * a.slideDir, dx / d * a.slideDir, dt)) {
      a.slideDir = -a.slideDir;
      moveActor(a, -dz / d * a.slideDir, dx / d * a.slideDir, dt);
    }
    a.face = Math.atan2(dx, dz);   // keep facing the goal while sliding
  } else a.slideDir = 1;
  tickActorAnim(a, dt, true);
}

/* ---- player ---- */
function playerRecipe() {
  return { skin: SKINS[G.look.skin % SKINS.length], hair: HAIRS[G.look.hair % HAIRS.length],
    shirt: SHIRTS[G.look.shirt % SHIRTS.length] };
}
function spawnPlayer(x, z) {
  removeActor('player');
  const p = makeActor('player', playerRecipe(), x, z);
  p.speed = CONFIG.PLAYER_SPEED;
  return p;
}
function player() { return ACTORS.player; }

function facingVector() {
  const p = player();
  return { x: Math.sin(p.face), z: Math.cos(p.face) };
}
function targetTilePos() {
  const p = player(), fv = facingVector();
  return { x: Math.floor(p.x + fv.x * 0.9) + 0.5, z: Math.floor(p.z + fv.z * 0.9) + 0.5 };
}

/* ---- what does the smart button do right now? ---- */
function findAction() {
  const p = player(), fv = facingVector();
  const W = G.world;
  const fx = p.x + fv.x * 0.9, fz = p.z + fv.z * 0.9;
  // villager in front
  let best = null, bestD = CONFIG.INTERACT_DIST ** 2;
  for (const id in ACTORS) {
    if (id === 'player') continue;
    const a = ACTORS[id];
    if (!a.visible) continue;
    const d = dist2(p.x, p.z, a.x, a.z);
    if (d < bestD) { best = a; bestD = d; }
  }
  if (best) return { type: 'talk', npc: best };
  // forage
  for (const f of FORAGE_LIVE) {
    if (dist2(p.x, p.z, f.x, f.z) < 2.6) return { type: 'forage', f };
  }
  // the ridge marker's offering ledge
  if (dist2(p.x, p.z, W.marker.x, W.marker.z) < 7) return { type: 'marker' };
  // the swimming hole: rest for the deep tiredness (fatigue, §3)
  if (G.heldItem !== 'rod' &&
      dist2(p.x, p.z, W.pool.x, W.pool.z) < (W.pool.r + 1.2) * (W.pool.r + 1.2)) {
    return { type: 'swim' };
  }
  // bin / mailbox / doors
  if (dist2(p.x, p.z, W.bin.x, W.bin.z) < 4.4) return { type: 'bin' };
  if (dist2(p.x, p.z, W.mailbox.x, W.mailbox.z) < 3.2) return { type: 'mail' };
  for (const d of W.doors) {
    if (dist2(p.x, p.z, d.x, d.z) < 3.2) return { type: 'door', door: d };
  }
  // farm tile
  const tt = tileAt(fx, fz);
  if (tt) return { type: 'tile', tt };
  return null;
}

function updateTargetHighlight(time) {
  const p = player();
  if (!p || !R.target) return;
  const act = findAction();
  const tp = targetTilePos();
  const onField = tileAt(tp.x, tp.z);
  const show = G.mode === 'play' && !G.uiOpen && onField;
  R.target.visible = !!show;
  if (show) {
    R.target.position.x = tp.x; R.target.position.z = tp.z;
    R.target.material.opacity = 0.18 + Math.sin(time * 2.4) * 0.08;
    let valid = true;
    if (onField) {
      const t = onField.t;
      if (t.obj === 'boulder' || t.obj === 'log') valid = false;   // tool-gated year 1
    }
    R.target.material.color.set(valid ? 0xffffff : 0xE07060);
  }
  return act;
}

function placeOf(name) {
  const W = G.world;
  const shopFront = id => {
    const s = W.shops.find(s => s.id === id);
    return s ? { x: s.x + 1.2, z: s.z + s.d / 2 + 1.5 } : { x: W.gazebo.x, z: W.gazebo.z + 5 };
  };
  switch (name) {
    case 'general': case 'forge': case 'carpenter': case 'clinic': case 'tavern':
    case 'home1': case 'home2': return shopFront(name);
    case 'square': return { x: W.gazebo.x - 2, z: W.gazebo.z + 5 };
    case 'squareE': return { x: W.gazebo.x + 4, z: W.gazebo.z + 6 };
    case 'bench': return { x: W.bench.x + 1.6, z: W.bench.z + 0.9 };
    case 'benchFar': return { x: W.bench.x - 1.6, z: W.bench.z + 0.9 };
    case 'dock': return { x: W.dock.x, z: W.dock.z - 1.2 };
    case 'marker': return { x: W.marker.x + 2, z: W.marker.z + 4 };

    case 'rolfField': return { x: W.ranchGate.x - 12, z: W.pathZ + 9 };
    case 'forestA': return { x: W.trailX - 16, z: -18 };
    case 'shorePath': return { x: (W.gazebo.x + W.pool.x) / 2, z: (W.gazebo.z + W.pool.z) / 2 };
    default: return { x: W.gazebo.x, z: W.gazebo.z + 5 };

// Segment: {t, at, inside, leisure} — leisure segments collapse indoors in rain.

        return [
          { t: 8, at: spots0[Math.floor(r0() * spots0.length)], leisure: true },

function buildCast() {
  for (const id in CAST) {
    if (!ACTORS[id]) makeActor(id, CAST[id], -999, -999);
  }
}

function assembleSchedules(day) {
  SCHED.day = day;
  SCHED.plans = {};
  const wet = G.weather === 'rain' || G.weather === 'snow';
  for (const id in CAST) {
    let segs = scheduleFor(id, day);
    if (wet) {
      // rain collapses leisure: stay wherever the previous segment put them
      segs = segs.filter((s, i) => !(s.leisure && i > 0));
    }
    SCHED.plans[id] = segs;
  }
}

// Overnight placement (behind the sleep fade): everyone starts the day where
// their schedule says, no cross-valley dawn marches.
function snapSchedules() {
  if (!SCHED.plans) return;
  for (const id in SCHED.plans) {
    const a = ACTORS[id];
    if (!a || a.scriptLock) continue;
    const segs = SCHED.plans[id];
    let cur = segs[0];
    for (const s of segs) if (s.t <= G.hour) cur = s;
    const p = placeOf(cur.at);
    actorSetPos(a, p.x + (rand('live') - 0.5) * 1.4, p.z + (rand('live') - 0.5) * 1.4);
    a.schedKey = cur.at + (cur.inside ? '!' : '');
    a.visible = !cur.inside; a.group.visible = !cur.inside;
    a.waypoints = [];
  }
}

function tickSchedules() {
  if (!SCHED.plans || G.mode === 'scene') return;
  for (const id in SCHED.plans) {
    const a = ACTORS[id];
    if (!a || a.scriptLock) continue;
    const segs = SCHED.plans[id];
    let cur = segs[0];
    for (const s of segs) if (s.t <= G.hour) cur = s;
    const key = cur.at + (cur.inside ? '!' : '');
    if (a.schedKey !== key) {
      a.schedKey = key;
      const p = placeOf(cur.at);
      a.visible = true;
      a.group.visible = true;
      a.waypoints = [{ x: p.x, z: p.z, onArrive: cur.inside ? () => {
        a.visible = false; a.group.visible = false;
      } : null }];
    }
  }
}
/* ================= CAST: sprite bake pipeline (phase 2) ================== */
// Bake each code-built chibi under the headlamp light from 8 directions ×
// 4 poses (idle / step / step-back / tool) into a canvas atlas; display as
// camera-facing billboard quads, nearest-filtered. Live-3D chibi remains the
// automatic fallback if baking fails (§3).
const SpriteBank = {};   // id -> { tex, cols, rows, fw, fh }
const BAKE = { fw: 64, fh: 96, cols: 4, rows: 8 };

function bakeAllSprites() {
  if (!CONFIG.BAKE_SPRITES) return;
  let rend = null;
  try {
    rend = new THREE.WebGLRenderer({ antialias: false, alpha: true, preserveDrawingBuffer: true });
    rend.setSize(BAKE.fw, BAKE.fh, false);
    rend.setPixelRatio(1);
    rend.setClearColor(0x000000, 0);
    const scene = new THREE.Scene();
    scene.add(new THREE.AmbientLight(0xffffff, 0.78));
    const dir = new THREE.DirectionalLight(0xfff4e0, 0.55);
    // headlamp geometry matched to the play camera's elevation
    dir.position.set(0, 2.8, 2.4);
    scene.add(dir); scene.add(dir.target);
    dir.target.position.set(0, 0.7, 0);
    dir.target.updateMatrixWorld();
    const cam = new THREE.OrthographicCamera(-0.62, 0.62, 1.36, -0.5, 0.1, 20);
    cam.position.set(0, 2.8, 2.4);
    cam.lookAt(0, 0.62, 0);
    const jobs = Object.keys(CAST).map(id => [id, CAST[id]]);
    jobs.push(['player', playerRecipe()]);
    for (const [id, rec] of jobs) {
      const chibi = makeChibi(rec);
      scene.add(chibi);
      const atlas = document.createElement('canvas');
      atlas.width = BAKE.fw * BAKE.cols; atlas.height = BAKE.fh * BAKE.rows;
      const ctx = atlas.getContext('2d');
      const u = chibi.userData;
      for (let d = 0; d < 8; d++) {
        chibi.rotation.y = d * Math.PI / 4;
        for (let c = 0; c < BAKE.cols; c++) {
          const swing = c === 0 ? 0 : c === 1 ? 0.55 : c === 2 ? -0.55 : 0;
          u.legs[0].rotation.x = swing; u.legs[1].rotation.x = -swing;
          u.arms[0].rotation.x = -swing * 0.8; u.arms[1].rotation.x = swing * 0.8;
          if (c === 3) { u.arms[0].rotation.x = -2.1; u.arms[1].rotation.x = -2.1; }   // tool raise
          rend.render(scene, cam);
          ctx.drawImage(rend.domElement, c * BAKE.fw, d * BAKE.fh);
        }
      }
      scene.remove(chibi);
      const tex = nearestTex(atlas);
      tex.repeat.set(1 / BAKE.cols, 1 / BAKE.rows);
      SpriteBank[id] = { tex, fw: BAKE.fw, fh: BAKE.fh };
    }
  } catch (e) {
    // fallback: live 3D chibis (reads 95% right under the same lighting)
    for (const k in SpriteBank) delete SpriteBank[k];
    console.warn('sprite bake failed; using live chibis', e);
  } finally {
    if (rend) rend.dispose();
  }
}

function dirIndexFromFace(face) {
  const tau = Math.PI * 2;
  return Math.round(((face % tau) + tau) % tau / (Math.PI / 4)) % 8;
}

// Animation timing in 30fps ticks with authored, slightly uneven per-frame
// durations (§7): the walk holds 7,8,7,8 ticks — the toy-like signature.
const WALK_TICKS = [7, 8, 7, 8];
function updateSpriteFrame(a, walking, dt) {
  const s = a.sprite;
  // billboard: face the (fixed-yaw) camera
  s.quad.quaternion.copy(R.camera.quaternion);
  if (walking) {
    a.animT += dt * 30;                    // ticks
    if (a.animT >= WALK_TICKS[a.animFrame]) {
      a.animT = 0;
      a.animFrame = (a.animFrame + 1) % 4;
    }
  } else { a.animFrame = 0; a.animT = 0; }
  let col = [0, 1, 0, 2][a.animFrame];
  if (a.hopT > 0) {
    a.hopT -= dt;
    col = 3;
    a.hopY = Math.max(0, Math.sin((1 - a.hopT / 0.18) * Math.PI) * 0.16);
    if (a.hopT <= 0) a.hopY = 0;
    a.group.position.y = (a.baseY || 0) + a.hopY;
  }
  const row = dirIndexFromFace(a.face);
  // atlas row 0 is direction 0 at the TOP of the canvas; UV v runs bottom-up
  s.tex.offset.set(col / BAKE.cols, 1 - (row + 1) / BAKE.rows);
}
/* ================================ ITEMS ================================== */
const ITEMS = {};
function buildItems() {
  for (const id in CONFIG.CROPS) {
    const c = CONFIG.CROPS[id];
    ITEMS[id] = { name: c.name, icon: c.icon, sell: c.sell, enterprise: c.name };
    ITEMS['seed_' + id] = { name: c.name + ' Seeds', icon: '🌱', sell: 0, seedOf: id };
  }
  for (const season in CONFIG.FORAGE) {

      ITEMS[f.id] = { name: f.name, icon: f.icon, sell: f.sell, enterprise: 'Foraging' };
    }

  ITEMS.coat = { name: 'Winter Coat', icon: '🧥', sell: 0, enterprise: 'Supplies' };
  ITEMS.scarf = { name: 'Knit Scarf', icon: '🧣', sell: 0, enterprise: 'Supplies' };
  ITEMS.worm = { name: 'Bait Worm', icon: '🪱', sell: 3, enterprise: 'Fishing' };
  ITEMS.egg = { name: 'Egg', icon: '🥚', sell: 5, enterprise: 'Eggs' };
}
function addItem(id, n) {
  if (!(id in G.inventory) && typeof backpackCap === 'function' &&
      Object.keys(G.inventory).length >= backpackCap()) {
    toast('Backpack’s full — ' + backpackCap() + ' kinds is the limit. Bramm sells bigger.');
    return;
  }
  G.inventory[id] = (G.inventory[id] || 0) + (n || 1);
  if (!G.heldItem && ITEMS[id]) G.heldItem = id;
  updateHUD();
}
function takeItem(id, n) {
  n = n || 1;
  if ((G.inventory[id] || 0) < n) return false;
  G.inventory[id] -= n;
  if (G.inventory[id] <= 0) {
    delete G.inventory[id];
    if (G.heldItem === id) G.heldItem = null;
  }
  updateHUD();
  return true;
}

/* ================================ AUDIO ================================== */
const AU = { ctx: null, vol: 0.5 };
function audioCtx() {
  if (!AU.ctx) { try { AU.ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} }
  return AU.ctx;
}
function sfx(name) {
  const ctx = audioCtx();
  if (!ctx || AU.vol <= 0) return;
  const t = ctx.currentTime;
  const play = (type, f0, f1, dur, vol, delay) => {
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.type = type; o.frequency.setValueAtTime(f0, t + (delay || 0));
    o.frequency.linearRampToValueAtTime(f1, t + (delay || 0) + dur);
    g.gain.setValueAtTime(vol * AU.vol, t + (delay || 0));
    g.gain.exponentialRampToValueAtTime(0.001, t + (delay || 0) + dur);
    o.connect(g); g.connect(ctx.destination);
    o.start(t + (delay || 0)); o.stop(t + (delay || 0) + dur + 0.02);
  };
  switch (name) {
    case 'blip': play('square', 620, 660, 0.04, 0.06); break;
    case 'thud': play('sine', 130, 60, 0.14, 0.32); break;
    case 'plink': play('sine', 700, 380, 0.16, 0.16); break;
    case 'pick': play('sine', 520, 780, 0.1, 0.14); break;
    case 'creak': play('sawtooth', 180, 240, 0.2, 0.06); break;
    case 'coin': play('square', 880, 1180, 0.09, 0.1); play('square', 1180, 1560, 0.09, 0.08, 0.08); break;
    case 'kachunk': play('square', 220, 160, 0.07, 0.14); play('square', 140, 90, 0.1, 0.16, 0.09); break;
    case 'chime': play('sine', 780, 780, 0.3, 0.14); play('sine', 1170, 1170, 0.4, 0.12, 0.12); play('sine', 1560, 1560, 0.5, 0.09, 0.24); break;
    case 'sleep': play('sine', 440, 220, 0.5, 0.1); break;
  }
}

/* ============================== TIME & SIM =============================== */
function hoursPerSec() {
  const season = seasonOf(G.day);
  return 18 / (CONFIG.DAY_MINUTES[season] * 60);
}
function simPaused() {
  return G.mode !== 'play' || !!G.uiOpen;
}
function tickTime(dt) {
  if (simPaused()) return;
  G.hour += hoursPerSec() * dt;
  if (G.hour >= CONFIG.DAY_END) {
    G.hour = CONFIG.DAY_END - 0.01;
    passOut();
  }
}

function staminaFloor() { return G.day < 12 ? CONFIG.STAMINA_Y1_FLOOR : 0; }
// Two hidden meters (§3): stamina (short-term) and fatigue (long-term wear).
// Crossing a stamina tier interrupts ONCE with a diegetic tell, then lets you work.
const STAMINA_TIERS = [75, 50, 25, 10];
const TIER_TELLS = [
  'You wipe your brow on your sleeve.',
  'Your shoulders have opinions now.',
  'You lean on the handle a moment. The field tilts, politely.',
  'The next swing takes everything you can find.'
];
function spendStamina(n) {
  if ((G.fatigue || 0) >= 75) n += 1;                 // worn down: everything costs more
  const before = G.stamina;
  G.stamina = Math.max(staminaFloor(), G.stamina - n);
  G.fatigue = clamp((G.fatigue || 0) + n * 0.5, 0, 100);
  for (let i = 0; i < STAMINA_TIERS.length; i++) {
    const tier = STAMINA_TIERS[i];
    if (before > tier && G.stamina <= tier && G.flags.staminaTier !== i) {
      G.flags.staminaTier = i;
      toast(TIER_TELLS[i], 2600);
      const p = player();
      if (p) p.hopT = 0.18;
      break;
    }
  }
}
function staminaWord() {
  let w;
  if (G.stamina > 75) w = 'Rested';
  else if (G.stamina > 50) w = 'Fine';
  else if (G.stamina > 25) w = 'Tired';
  else w = 'Exhausted';
  if ((G.fatigue || 0) >= 75) w += ' · Worn down';
  return w;
}
// Food restores stamina; only rest touches fatigue (§3).
function foodValue(id) {
  const it = ITEMS[id];
  if (!it) return 0;
  if (it.food) return it.food;                        // cooked dishes carry their own value
  if (it.enterprise === 'Fishing' && it.sell) return 14;
  if (CONFIG.CROPS[id]) return 8 + Math.min(4, Math.floor(it.sell / 4));
  if (it.enterprise === 'Foraging') return 5;
  if (id === 'egg') return 6;
  return 0;
}
function eatHeld(id) {
  const v = foodValue(id);
  if (!v) { toast('Not the eating kind.'); return; }
  if (!takeItem(id, 1)) return;
  G.stamina = Math.min(CONFIG.STAMINA_MAX + (G.maxStaminaBonus || 0), G.stamina + v);
  G.flags.staminaTier = -1;
  sfx('pick');
  toast('Ate the ' + ITEMS[id].name.toLowerCase() + '. (+' + v + ')');
}

function jline(line) { (G.dayFlags.journal = G.dayFlags.journal || []).push(line); }

/* ---- the sacred 6:00 rollover, in order ---- */
function rollover(newDay) {
  const prevDay = G.day;
  // 1. bin payout
  let binTotal = 0;
  const byEnterprise = {};
  for (const s of G.todayShipped) {
    binTotal += s.value;
    byEnterprise[s.enterprise] = (byEnterprise[s.enterprise] || 0) + s.value;
  }
  if (binTotal > 0) {
    if (G.network.connected.general) {
      G.money += binTotal;
      for (const e in byEnterprise) G.ledger.entries.push({ day: prevDay, amount: byEnterprise[e], enterprise: e, note: 'Shipment (settled instantly)' });
      G.dayFlags.settledInstant = binTotal;
      jline('The shipment settled overnight — $' + binTotal + ' in the account by sunup. Still not used to that.');
    } else {
      const arrive = prevDay + CONFIG.CHECK_LAG_DAYS;
      G.pendingChecks.push({ amount: binTotal, arriveDay: arrive, label: 'Shipment check', enterprises: byEnterprise });
      G.dayFlags.checkMailed = { amount: binTotal, arrive };
      jline('Shipped $' + binTotal + ' worth. The check is in the mail — two days, they say.');
    }
  }
  G.todayShipped = [];
  // 2. check-mail processing
  const arrived = [];
  G.pendingChecks = G.pendingChecks.filter(c => {
    if (c.arriveDay <= newDay) { arrived.push(c); return false; }
    return true;
  });
  for (const c of arrived) {
    G.money += c.amount;
    for (const e in (c.enterprises || {})) G.ledger.entries.push({ day: newDay, amount: c.enterprises[e], enterprise: e, note: 'Check arrived' });
    G.mail.push({ day: newDay, from: 'Valley Post', title: 'A check for $' + c.amount,
      body: 'Your ' + c.label.toLowerCase() + ' for $' + c.amount + ' has cleared. Thank you for your patience.', read: false });
    G.flags.lastCheckAmount = c.amount;
  }
  // 3. crop growth (watering streak feeds the fair pumpkin's size roll).
  // HM64-soft death: dryness pauses growth; only seedlings that have NEVER
  // been watered die of neglect (§6 of the tuning appendix).
  for (const t of G.world.tiles) {
    if (!t.crop || t.dead) continue;
    const c = CONFIG.CROPS[t.crop];
    if (t.watered) {
      t.grown = Math.min(c.days, t.grown + 1);
      t.dry = 0; t.everWatered = true; t.streak = (t.streak || 0) + 1;
    } else {
      t.streak = 0;
      if (t.grown < c.days) {
        t.dry++;
        if (!t.everWatered && t.dry >= 2) { t.dead = true; G.dayFlags.cropDied = true; }
      }
    }
  }
  // storm aftermath: a typhoon flattens a share of the standing crops (§2)
  if (G.weather === 'storm') {
    const cal = calendarDay(prevDay ^ 0x570F).r;
    let lost = 0;
    for (const t of G.world.tiles) {
      if (t.crop && !t.dead && t.grown > 0 && cal() < 0.15) { t.dead = true; lost++; }
    }
    G.flags.stormYesterday = true;
    if (lost) jline('The storm took ' + lost + ' plants overnight — flattened flat, like the sky stepped on them. The rest look embarrassed to be standing.');
    else jline('The storm blew through and somehow took nothing but sleep. The valley will talk of little else today.');
  } else {
    G.flags.stormYesterday = false;
  }
  // 4. watered flags clear (unless rain/storm); sprinklers water their neighbours
  let newWeather = weatherFor(newDay);
  // an offering at the marker turns tomorrow's storm aside — never announced (§13)
  if (newWeather === 'storm' && G.dayFlags.offered) newWeather = 'rain';
  for (const t of G.world.tiles) {
    t.watered = WET(newWeather);
    if (t.watered) t.everWatered = true;
  }
  const f0 = G.world.field;
  G.world.tiles.forEach((t, i) => {
    if (t.obj !== 'sprinkler') return;
    const tx = i % f0.w, tz = Math.floor(i / f0.w);
    for (const [dx, dz] of [[1, 0], [-1, 0], [0, 1], [0, -1]]) {
      const nx = tx + dx, nz = tz + dz;
      if (nx < 0 || nx >= f0.w || nz < 0 || nz >= f0.h) continue;
      G.world.tiles[nz * f0.w + nx].watered = true;
    }
  });
  // 5. weather
  G.weather = newWeather;
  // 6-7. forage respawn (below) + villager schedules
  if (typeof assembleSchedules === 'function') assembleSchedules(newDay);
  // 8. mail / festival / arc flags
  if (typeof processJobInvoices === 'function') {
    processJobInvoices(newDay);
    maybeGenerateJob(newDay);
  }
  // forge turnaround: upgraded tools come back
  if (G.toolAway && G.toolAway.backDay <= newDay) {
    G.toolTiers = G.toolTiers || {};
    G.toolTiers[G.toolAway.tool] = (G.toolTiers[G.toolAway.tool] || 0) + 1;
    G.mail.push({ day: newDay, from: 'Hetta', title: 'Your ' + G.toolAway.tool + ', reborn',
      body: 'Left your copper ' + G.toolAway.tool + ' by your gate before sunup. Swing it with some respect. — H.', read: false });
    jline('Hetta returned the ' + G.toolAway.tool + ' — copper now, lighter than it has any right to be.');
    G.toolAway = null;
  }
  // 9. contract fulfillment (Restdays) + the quieter cycles of the valley
  if (typeof fulfillContracts === 'function') fulfillContracts(newDay);
  if (typeof tickRomance === 'function') tickRomance(newDay);
  if (typeof layEggs === 'function') layEggs();
  if (typeof LIFE !== 'undefined') LIFE.applyBlessing(newDay);
  const seasonChanged = seasonOf(newDay) !== seasonOf(prevDay);
  // season rollover is a reaper (§6): out-of-season crops become visible dead
  // tiles, unsprouted seeds revert to tilled soil, and each new year the wild
  // slowly reclaims untended work.
  if (seasonChanged) {
    const newSeason = seasonOf(newDay);
    let reaped = 0, reverted = 0;
    for (const t of G.world.tiles) {
      if (t.crop && !CONFIG.CROPS[t.crop].seasons.includes(newSeason)) {
        if (t.grown === 0) { t.crop = null; t.streak = 0; reverted++; }
        else if (!t.dead) { t.dead = true; reaped++; }
      }
    }
    if (reaped) jline('The season turned overnight and took the out-of-season plantings with it — ' + reaped + ' withered where they stood. The field keeps its receipts.');
    if (newSeason === 'Spring') {
      const cal = calendarDay(newDay ^ 0x5EED).r;
      let wilded = 0;
      for (const t of G.world.tiles) {
        if (t.s === 'till' && !t.crop && !t.obj && cal() < 0.5) { t.s = 'clear'; wilded++; }
        else if (t.s === 'clear' && !t.obj && cal() < 0.18) { t.obj = 'weed'; t.s = 'wild'; wilded++; }
      }
      if (wilded) jline('Spring found every row I tilled and never planted, and quietly took some back. Fair enough. The land was only ever lending it.');
    }
  }
  G.day = newDay;
  G.hour = CONFIG.DAY_START;
  G.stamina = (G.collapsedYesterday ? 62 : 100) + (G.maxStaminaBonus || 0);
  // sleep is rest: fatigue eases (less so after a collapse)
  G.fatigue = clamp((G.fatigue || 0) - (G.collapsedYesterday ? 15 : 40), 0, 100);
  G.flags.staminaTier = -1;
  G.collapsedYesterday = false;
  if (seasonChanged) {
    repaintTerrainSeason(seasonOf(newDay));
    if (typeof bakePropSprites === 'function') bakePropSprites(seasonOf(newDay));
  }
  TL.dirty = true;
  // 10. autosave (in-memory slot)
  G.autosave = saveEncode();
  // 11. yesterday's Journal entry finalizes
  finalizeJournal(prevDay);
  G.dayFlags = {};
  spawnForage();
  updateHUD();
}

function finalizeJournal(day) {
  const lines = (G.dayFlags.journal || []).slice();
  if (G.dayFlags.cropDied) lines.push('Lost a seedling to dry soil. Two days without water is one too many.');
  if (!lines.length) lines.push('A quiet day. The valley keeps its own time.');
  const season = seasonOf(day), dos = dayOfSeason(day);
  G.journal.push({ day, header: season + ' ' + dos + (isRestday(day) ? ' · Restday' : '') + ', Year ' + yearOf(day), lines });
}

/* ---- sleep & collapse ---- */
function passOut() {
  if (G.mode !== 'play') return;
  G.collapsedYesterday = true;
  jline('I don’t remember getting to bed. Note to self: beds are for walking to, not falling into.');
  doSleep(true);
}
function doSleep(forced) {
  G.mode = 'sleep';
  sfx('sleep');
  fadeOut(() => {
    const next = G.day + 1;
    rollover(next);
    STORY.onDayStart(next);
    const W = G.world;
    const p = player();
    actorSetPos(p, W.house.x, W.house.z + W.house.d / 2 + 1.6);
    p.face = Math.PI;
    updateCamera(p.x, p.z, true);
    applyGrade();
    fadeIn(() => { if (G.mode === 'sleep') G.mode = 'play'; });
  });
}

/* ---- tile & world actions (the smart button) ---- */
function performAction() {
  // rod held + facing water → cast (fishing owns E until resolved)
  if (G.heldItem === 'rod') {
    const p0 = player(), fv0 = facingVector();
    if (isWaterAt(p0.x + fv0.x * 1.6, p0.z + fv0.z * 1.6)) { tryCast(); return; }
  }
  const act = findAction();
  if (!act) return;
  const p = player();
  switch (act.type) {
    case 'talk': STORY.talkTo(act.npc); break;
    case 'forage': {
      const f = act.f;
      addItem(f.item.id, 1);
      G.dayFlags['picked_' + Math.round(f.x) + '_' + Math.round(f.z)] = true;
      R.worldGroup.remove(f.mesh);
      FORAGE_LIVE.splice(FORAGE_LIVE.indexOf(f), 1);
      sfx('pick');
      toast('Picked ' + f.item.name);
      if (!G.flags.firstForage) { G.flags.firstForage = true; jline('Found ' + f.item.name.toLowerCase() + ' growing wild. The valley feeds you, if you look.'); }
      break;
    }
    case 'bin': shipHeld(); break;
    case 'mail': openMail(); break;
    case 'marker': if (typeof LIFE !== 'undefined') LIFE.tryOffering(); break;
    case 'swim': {
      const season = seasonOf(G.day);
      if (season === 'Winter') { say(['The swimming hole has iced its edges. It is not an invitation.']); break; }
      showChoice(['Take a dip (an hour)', 'Not now'], i => {
        if (i !== 0) return;
        G.hour = Math.min(CONFIG.DAY_END - 0.1, G.hour + 1);
        G.fatigue = clamp((G.fatigue || 0) - 25, 0, 100);
        G.flags.staminaTier = -1;
        sfx('plink');
        toast('The cold water takes the week right out of your shoulders.');
        if (!G.dayFlags.swam) { G.dayFlags.swam = true; jline('Swam at the river bend. The kind of tired that food doesn’t fix, fixed.'); }
        updateHUD();
      });
      break;
    }
    case 'door': STORY.enterDoor(act.door); break;
    case 'tile': doTileAction(act.tt); break;
  }
}
function hop() { const p = player(); p.hopT = 0.18; }

// HM64 rule (§3): upgraded tools cost MORE per swing because they do more
// tiles of work — copper hoe/can act on a row of three.
function toolCost(tool) {
  const tier = (G.toolTiers || {})[tool] || 0;
  if (tool === 'hoe' || tool === 'can') return CONFIG.STAMINA_COST[tool] + tier;
  return Math.max(1, CONFIG.STAMINA_COST[tool] - tier);
}
function rowTiles(tt) {
  // target tile plus the two beyond it along the facing direction
  const fv = facingVector();
  const dx = Math.round(fv.x), dz = Math.round(fv.z);
  const f = G.world.field;
  const out = [tt];
  for (let i = 1; i <= 2; i++) {
    const tx = tt.tx + dx * i, tz = tt.tz + dz * i;
    if (tx < 0 || tx >= f.w || tz < 0 || tz >= f.h) break;
    out.push({ t: G.world.tiles[tz * f.w + tx], tx, tz, idx: tz * f.w + tx });
  }
  return out;
}
function waterTileRow(tt) {
  const tiles = (G.toolTiers && G.toolTiers.can >= 1) ? rowTiles(tt) : [tt];
  for (const q of tiles) {
    if (q.t.s === 'till' || q.t.crop) { q.t.watered = true; q.t.everWatered = true; }
  }
  spendStamina(toolCost('can'));
}
function tillRow(tt) {
  const tiles = (G.toolTiers && G.toolTiers.hoe >= 1) ? rowTiles(tt) : [tt];
  for (const q of tiles) {
    if (q.t.s === 'clear' && !q.t.obj) q.t.s = 'till';
  }
  spendStamina(toolCost('hoe'));
}
function toolIsAway(tool) {
  if (G.toolAway && G.toolAway.tool === tool) {
    toast('Your ' + tool + ' is at the forge — back ' + dayName(G.toolAway.backDay) + '.');
    return true;
  }
  return false;
}
function doTileAction(tt) {
  const t = tt.t;
  const held = G.heldItem;
  const heldSeed = held && ITEMS[held] && ITEMS[held].seedOf;
  if (t.obj === 'weed') { if (toolIsAway('sickle')) return; t.obj = null; if (t.s === 'wild') t.s = 'clear'; spendStamina(toolCost('sickle')); hop(); sfx('thud'); firstClear(); }
  else if (t.obj === 'rock') { if (toolIsAway('hammer')) return; t.obj = null; if (t.s === 'wild') t.s = 'clear'; spendStamina(toolCost('hammer')); hop(); sfx('thud'); firstClear(); }
  else if (t.obj === 'stump') { if (toolIsAway('axe')) return; t.obj = null; if (t.s === 'wild') t.s = 'clear'; spendStamina(toolCost('axe')); hop(); sfx('thud'); firstClear(); }
  else if (t.obj === 'boulder' || t.obj === 'log') { toast('Too big for your tools — Hetta could help, come spring.'); return; }
  else if (t.crop && t.dead) { t.crop = null; t.grown = 0; t.dead = false; hop(); sfx('thud'); toast('Cleared the withered plant.'); }
  else if (t.crop && cropVisualStage(t) === 3) {
    const c = CONFIG.CROPS[t.crop];
    addItem(t.crop, 1);
    if (c.seedsBack) addItem('seed_' + t.crop, 1);      // the sunflower gimmick
    if (c.fair) {                                        // pumpkin size, streak-weighted
      const size = Math.min(99, 28 + (t.streak || 0) * 14 + Math.floor(calendarDay(G.day * 31 + tt.idx).r() * 14));
      if (size > (G.flags.bestPumpkin || 0)) G.flags.bestPumpkin = size;
      toast('A ' + size + '-point pumpkin!');
    }
    if (c.regrow) { t.grown = Math.max(0, c.days - c.regrow); }
    else { t.crop = null; t.grown = 0; t.streak = 0; }
    hop(); sfx('pick');
    G.dayFlags.harvested = (G.dayFlags.harvested || 0) + 1;
    if (!G.flags.firstHarvest) { G.flags.firstHarvest = true; jline('First harvest. They’re small and a little lopsided and I grew them.'); }
  }
  else if (t.crop) { if (toolIsAway('can')) return; waterTileRow(tt); hop(); sfx('plink'); }
  else if (t.s === 'till' && held === 'sprinkler' && !t.crop) {
    if (!takeItem('sprinkler', 1)) return;
    t.obj = 'sprinkler';
    hop(); sfx('thud');
    toast('Sprinkler set — it waters its four neighbours each morning.');
  }
  else if (t.s === 'till' && heldSeed) {
    const crop = CONFIG.CROPS[heldSeed];
    if (!crop.seasons.includes(seasonOf(G.day))) { toast('Not the season for ' + crop.name.toLowerCase() + '.'); return; }
    if (!takeItem(held, 1)) return;
    t.crop = heldSeed; t.grown = 0; t.dead = false; t.dry = 0; t.everWatered = false;
    if (WET(G.weather)) { t.watered = true; t.everWatered = true; }
    hop(); sfx('plink');
    if (!G.flags.firstPlant) { G.flags.firstPlant = true; jline('Put the first seeds in the ground. Now we both wait.'); }
  }
  else if (t.s === 'till') { if (toolIsAway('can')) return; waterTileRow(tt); hop(); sfx('plink'); }
  else if (t.s === 'clear') { if (toolIsAway('hoe')) return; tillRow(tt); hop(); sfx('thud'); }
  TL.dirty = true;
  STORY.checkObjectives();
}
function firstClear() {
  if (!G.flags.firstClear) { G.flags.firstClear = true; jline('Cleared the first stretch of the field. The land remembers being a farm.'); }
}

function shipHeld() {
  const held = G.heldItem;
  if (!held || !ITEMS[held] || !ITEMS[held].sell) { toast('Hold something sellable to ship it.'); return; }
  const n = G.inventory[held] || 0;
  if (!n) return;
  const item = ITEMS[held];
  const value = item.sell * n;
  G.todayShipped.push({ id: held, name: item.name, count: n, value, enterprise: item.enterprise });
  takeItem(held, n);
  sfx('creak');
  if (G.network.connected.general) toast('Shipped ' + n + '× ' + item.name + ' — $' + value + ' settles tonight.');
  else toast('Shipped ' + n + '× ' + item.name + ' — check for $' + value + ' in ' + CONFIG.CHECK_LAG_DAYS + ' days.');
  G.dayFlags.shippedAny = true;
  STORY.checkObjectives();
}

function spend(amount, enterprise, note) {
  if (G.money < amount) return false;
  G.money -= amount;
  G.ledger.entries.push({ day: G.day, amount: -amount, enterprise: enterprise || 'Supplies', note: note || '' });
  updateHUD();
  return true;
}

/* ================================ SAVE =================================== */
function saveEncode() {
  const tiles = G.world.tiles.map(t =>
    [t.s === 'wild' ? 0 : t.s === 'clear' ? 1 : 2, t.obj || '', t.crop || '', t.grown, t.watered ? 1 : 0, t.dry, t.dead ? 1 : 0].join('.'));
  const data = {
    v: 2, seed: G.world.seed, day: G.day, hour: Math.min(G.hour, 23),
    money: G.money, stamina: G.stamina,
    inv: G.inventory, held: G.heldItem, checks: G.pendingChecks,
    shipped: G.todayShipped, mail: G.mail, journal: G.journal,
    flags: G.flags, ledger: G.ledger, network: G.network,
    farmName: G.farmName, playerName: G.playerName, look: G.look,
    hearts: G.hearts, jobs: G.jobs || [], toolTiers: G.toolTiers || {},
    toolAway: G.toolAway || null, contracts: G.contracts || {},
    backpack: G.backpack || 12, upgrades: G.upgrades || {},
    romance: G.romance || { step: 0 }, animals: G.animals || { hens: 0 },
    staminaBonus: G.maxStaminaBonus || 0, fatigue: G.fatigue || 0, tiles
  };
  return b64encode(JSON.stringify(data));
}
function saveDecode(code) {
  const data = JSON.parse(b64decode(code.trim()));
  if (!data || (data.v !== 1 && data.v !== 2)) throw new Error('bad save');
  return data;
}
function applySave(data) {
  G.world = generateWorld(data.seed);
  const OBJS = { '': null };
  data.tiles.forEach((s, i) => {
    const [st, obj, crop, grown, watered, dry, dead] = s.split('.');
    const t = G.world.tiles[i];
    t.s = st === '0' ? 'wild' : st === '1' ? 'clear' : 'till';

function downloadSave() {

  const a = document.createElement('a');

  a.click();

}

function drawPortraitTo(ctx, id, mood, size) {
  const rec = CAST[id] || playerRecipe();
  const ex = PORTRAIT_EXTRA[id] || {};
  const s = (size || 84) / 84;
  ctx.save();
  ctx.scale(s, s);
  ctx.clearRect(0, 0, 84, 84);
  ctx.fillStyle = '#E8DFC4'; ctx.fillRect(0, 0, 84, 84);
  ctx.fillStyle = rec.shirt;
  ctx.beginPath(); ctx.ellipse(42, 86, 30, 26, 0, Math.PI, 0); ctx.fill();
  ctx.fillStyle = rec.skin;
  ctx.beginPath(); ctx.arc(42, 42, 24, 0, 7); ctx.fill();
  // Art Bible §7: one-step warm shadow per region, hard-edged (not a blend) —
  // the construction the bible calls for is silhouette → flat regions →
  // ONE shadow tone → sparse linework → detailed eyes only.
  ctx.save();
  ctx.beginPath(); ctx.arc(42, 42, 24, 0, 7); ctx.clip();
  ctx.fillStyle = 'rgba(62,50,38,0.16)';
  ctx.beginPath(); ctx.ellipse(50, 52, 16, 14, 0, 0, 7); ctx.fill();
  ctx.restore();
  // hair
  ctx.fillStyle = rec.hair;
  ctx.beginPath(); ctx.arc(42, 36, 26, Math.PI * 1.02, Math.PI * 1.98); ctx.fill();
  if (rec.long) { ctx.fillRect(16, 34, 9, 34); ctx.fillRect(59, 34, 9, 34); }
  if (ex.bandana) {
    ctx.fillStyle = '#B3574C';
    ctx.beginPath(); ctx.arc(42, 34, 25, Math.PI * 1.05, Math.PI * 1.95); ctx.fill();
  }
  if (rec.hat) {
    ctx.fillStyle = rec.hat;
    ctx.fillRect(13, 18, 58, 8); ctx.fillRect(25, 5, 34, 15);
  }
  // face
  const eyeY = 44;
  ctx.fillStyle = '#2E2620';
  if (mood === 'happy') {   // closed happy arcs
    ctx.lineWidth = 2.4; ctx.strokeStyle = '#2E2620';
    ctx.beginPath(); ctx.arc(34, eyeY + 1, 3.4, Math.PI * 1.1, Math.PI * 1.9); ctx.stroke();
    ctx.beginPath(); ctx.arc(50, eyeY + 1, 3.4, Math.PI * 1.1, Math.PI * 1.9); ctx.stroke();
  } else if (mood === 'surprised') {
    ctx.beginPath(); ctx.arc(34, eyeY, 3.6, 0, 7); ctx.arc(50, eyeY, 3.6, 0, 7); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(35, eyeY - 1, 1.2, 0, 7); ctx.arc(51, eyeY - 1, 1.2, 0, 7); ctx.fill();
    ctx.fillStyle = '#2E2620';
  } else {
    ctx.beginPath(); ctx.arc(34, eyeY, 2.6, 0, 7); ctx.arc(50, eyeY, 2.6, 0, 7); ctx.fill();
  }
  if (ex.glasses) {
    ctx.strokeStyle = '#4E4438'; ctx.lineWidth = 1.6;
    ctx.strokeRect(28, eyeY - 5, 12, 9); ctx.strokeRect(44, eyeY - 5, 12, 9);
    ctx.beginPath(); ctx.moveTo(40, eyeY - 1); ctx.lineTo(44, eyeY - 1); ctx.stroke();
  }
  // brows
  ctx.strokeStyle = ex.brows === 'heavy' ? '#2E2620' : '#4E4438';
  ctx.lineWidth = ex.brows === 'heavy' ? 3 : 1.8;
  const browTilt = mood === 'sad' ? 2.5 : mood === 'surprised' ? -3 : 0;
  ctx.beginPath(); ctx.moveTo(29, 37 + browTilt); ctx.lineTo(38, 37 - browTilt * 0.4); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(46, 37 - browTilt * 0.4); ctx.lineTo(55, 37 + browTilt); ctx.stroke();
  // mouth
  ctx.strokeStyle = '#5a4034'; ctx.lineWidth = 2;
  ctx.beginPath();
  if (mood === 'happy') ctx.arc(42, 52, 6, Math.PI * 0.15, Math.PI * 0.85);
  else if (mood === 'sad') ctx.arc(42, 60, 6, Math.PI * 1.15, Math.PI * 1.85);
  else if (mood === 'surprised') { ctx.arc(42, 56, 3, 0, 7); }
  else { ctx.moveTo(37, 55); ctx.lineTo(47, 55); }
  ctx.stroke();
  if (ex.beard) {
    ctx.fillStyle = rec.hair;
    ctx.beginPath(); ctx.arc(42, 57, 12, Math.PI * 0.1, Math.PI * 0.9); ctx.fill();
  }
  if (ex.stubble) {
    ctx.fillStyle = 'rgba(70,55,40,0.25)';
    ctx.beginPath(); ctx.arc(42, 56, 11, Math.PI * 0.1, Math.PI * 0.9); ctx.fill();
  }
  if (ex.freckles) {
    ctx.fillStyle = 'rgba(140,95,60,0.5)';
    for (const [fx, fy] of [[30, 49], [33, 51], [51, 49], [54, 51], [48, 51]]) ctx.fillRect(fx, fy, 1.6, 1.6);
  }
  if (ex.blush || mood === 'happy') {
    ctx.fillStyle = 'rgba(214,120,100,0.28)';
    ctx.beginPath(); ctx.ellipse(30, 50, 4, 2.5, 0, 0, 7); ctx.ellipse(54, 50, 4, 2.5, 0, 0, 7); ctx.fill();
  }
  ctx.restore();
}

    if (id === 'aldwin') g.push('The general store stocks poetry now. Two volumes. "For a friend." The valley improves in unexpected aisles.');
  }
  if (G.network.stage >= 5) {
    if (id === 'maren') g.push('Third stool from the window has its farmer back. Rolf, evenings, like the old days. The room’s complete again.');
    if (id === 'pip') g.push('Rolf bought me a lemonade at the Bluebird. ROLF. At the BLUEBIRD. In the EVENING.');
  } else if (G.network.stage >= 3) {
    if (id === 'corwin') g.push('Hetta’s new forge hood went up Tuesday! She stood outside admiring it for an HOUR. I timed it! Lovingly!');
  }
  return g.length ? g[Math.floor(rand('live') * g.length)] : null;
}
// The HM64 priority ladder (§5): situation bits, then Restday, then affection
// tier, then weather override, then 3–4 random variants.
function pickTalkLine(id) {
  const B = LINES[id];
  if (!B) return '…';
  const season = seasonOf(G.day), rest = isRestday(G.day);
  const hearts = displayHearts(id);
  // 3. one-shot situation bits
  if (G.flags.stormYesterday && STORM_AFTER[id]) return STORM_AFTER[id];
  if (G.day > 11 && dayOfSeason(G.day) === 1 && rand('live') < 0.5) return FESTIVAL_EVE[season];
  const gossip = gossipLine(id);
  if (gossip && rand('live') < 0.35) return gossip;
  if (id === 'isolde' && G.stamina <= 25 && B.exhausted) return B.exhausted[0];
  if (id === 'isolde' && G.stamina <= 50 && B.tired) return B.tired[0];
  if (id === 'aldwin' && G.network.connected.general && B.postConnect && rand('live') < 0.4) return B.postConnect[0];
  if (id === 'aldwin' && G.flags.flyerTaken && !G.network.connected.general && B.flyer) return B.flyer[0];
  if (id === 'rolf' && G.hour >= 17 && B.evening && (G.network.stage || 0) < 5 && rand('live') < 0.6) return B.evening[0];
  if (id === 'bramm' && rest && G.network.connected.general && B.restFree) return B.restFree[0];
  if (id === 'sable' && rest && G.flags.shoreWitnessed && B.benchShared && rand('live') < 0.5) return B.benchShared[0];
  if (id === 'fen' && (G.hour >= 17 || G.hour < 8) && B.dusk && rand('live') < 0.5) return B.dusk[0];
  // 4. Restday branch
  const pool = [];
  if (rest && B.rest) pool.push(...B.rest);
  // 6. weather override outranks normal small talk
  if (WET(G.weather) && B.rain) pool.push(...B.rain, ...B.rain);
  if (season === 'Winter' && B.winter) pool.push(...B.winter);
  // 5. affection tier
  if (hearts >= 5 && B.heartHigh) pool.push(...B.heartHigh);
  // 7. random among the variants, base as fallthrough
  pool.push(...B.base);
  return pool[Math.floor(rand('live') * pool.length)];
}
// Repeat-talk lines are terse and human (§5) — and worth no affection.
const AGAIN_LINES = {
  bramm: 'Still here. Hm.', hetta: 'Back already? The fire’s where you left it.',
  corwin: 'You again! Excellent!', isolde: 'Hello again. (Twice in a day. Noted, warmly.)',
  rolf: 'Twice in one day. Slow farm?', maren: 'Back for more! There’s always soup.',
  greta: 'Again? The goose approves.', aldwin: 'Twice blessed, this doorway.',

/* ---- gifts ---- */
function giftableHeld() {
  const id = G.heldItem;
  if (!id || !ITEMS[id]) return null;
  if (ITEMS[id].seedOf || id === 'coat' || id === 'scarf') return null;
  return id;
}
function giveGift(npc) {
  const itemId = giftableHeld();
  if (!itemId) return;
  const id = npc.id;
  if (G.flags['gift_' + id] === G.day) {
    say([{ who: id, text: 'One gift a day keeps it a gift. (Come find me tomorrow.)' }]);
    return;
  }
  takeItem(itemId, 1);
  G.flags['gift_' + id] = G.day;
  const p = SOCIAL.prefs[id] || { loved: [], liked: [], disliked: [] };
  const B = LINES[id] || {};
  const bday = isBirthday(id, G.day);
  // HM64 gift weights (§4): loved +3, liked +1, disliked −2; birthdays ×5.
  let delta, line, mood;
  if (p.loved.includes(itemId)) { delta = 3; line = B.loved; mood = 'happy'; }
  else if (p.disliked.includes(itemId)) { delta = -2; line = B.disliked; mood = 'sad'; }
  else { delta = 1; line = B.liked; mood = 'happy'; }
  if (bday && delta > 0) { delta *= 5; line = B.birthday || line; mood = 'surprised'; }
  STORY.heart(id, delta);
  // learned loves fill the Villagers wall by discovery
  if (delta >= 3) {
    const learned = G.flags['learned_' + id] = G.flags['learned_' + id] || [];
    if (!learned.includes(itemId)) learned.push(itemId);
  }
  const itemName = ITEMS[itemId].name.toLowerCase();
  say([{ who: id, text: line || 'Oh — thank you.', mood }], () => {
    if (delta > 0) sfx('chime');
    jline((bday ? 'Birthday gift for ' : 'Gave ') + CAST[id].name + (bday ? '' : ' a gift') + ' — ' + itemName + '. ' +
      (delta >= 2 ? 'They lit up.' : delta > 0 ? 'Well received.' : 'A miss. Noted for next time.'));
  });
  G.dayFlags['gifted_' + id] = true;
}

/* ---- invoiced odd jobs (villager requests via mail) ---- */
function maybeGenerateJob(day) {
  if (day < 10) return;                               // requests begin once the valley knows you
  G.jobs = G.jobs || [];
  const cal = calendarDay(day ^ 0x0B5).r;
  if (cal() > 0.5) return;
  const busy = new Set(G.jobs.filter(j => j.status !== 'paid').map(j => j.villager));
  const candidates = Object.keys(SOCIAL.prefs).filter(id => (G.hearts[id] || 0) >= 1 && !busy.has(id));
  if (!candidates.length) return;
  const vid = candidates[Math.floor(cal() * candidates.length)];
  const wants = [...SOCIAL.prefs[vid].loved, ...SOCIAL.prefs[vid].liked]
    .filter(it => ITEMS[it] && ITEMS[it].sell);
  if (!wants.length) return;
  const item = wants[Math.floor(cal() * wants.length)];
  const qty = 2 + Math.floor(cal() * 3);
  const reward = Math.round(ITEMS[item].sell * qty * 1.6);
  G.jobs.push({ villager: vid, item, qty, reward, status: 'open', day });
  G.mail.push({ day, from: CAST[vid].name, title: 'A small job, if you’re willing',
    body: 'Could you bring me ' + qty + '× ' + ITEMS[item].name + '? I’ll pay $' + reward +
      ' — invoiced proper, now that some of us do that. No rush past the season. — ' + CAST[vid].name, read: false });
}
function jobFor(id) {
  return (G.jobs || []).find(j => j.villager === id && j.status === 'open');
}
function deliverJob(npc) {
  const job = jobFor(npc.id);
  if (!job) return false;
  if ((G.inventory[job.item] || 0) < job.qty) return false;
  showChoice(['Deliver ' + job.qty + '× ' + ITEMS[job.item].name, 'Not yet'], i => {
    if (i !== 0) return;
    takeItem(job.item, job.qty);
    job.status = 'invoiced';
    const connected = npc.id === 'bramm' && G.network.connected.general;
    if (connected) {
      job.status = 'paid';
      G.money += job.reward;
      G.ledger.entries.push({ day: G.day, amount: job.reward, enterprise: 'Odd Jobs', note: CAST[npc.id].name });
      sfx('chime');
      say([{ who: npc.id, text: 'Invoice, tap, settled. There it is in your account before you reach the door. Hm. Still feels like a magic trick.', mood: 'happy' }]);
    } else {
      job.payDay = G.day + CONFIG.CHECK_LAG_DAYS;
      say([{ who: npc.id, text: 'Perfect. I’ll send payment along — check’s in the mail, the usual two days. You know how it goes around here.', mood: 'happy' }]);
    }
    STORY.heart(npc.id, 4);
    jline('Finished ' + CAST[npc.id].name + '’s order — ' + job.qty + '× ' + ITEMS[job.item].name + ' for $' + job.reward + (connected ? ', settled on the spot.' : ', payment by mail. Naturally.'));
    updateHUD();
  });
  return true;
}
function processJobInvoices(newDay) {
  for (const j of (G.jobs || [])) {
    if (j.status === 'invoiced' && j.payDay <= newDay) {
      j.status = 'paid';
      G.money += j.reward;
      G.ledger.entries.push({ day: newDay, amount: j.reward, enterprise: 'Odd Jobs', note: CAST[j.villager].name + ' (check)' });
      G.mail.push({ day: newDay, from: 'Valley Post', title: 'Payment from ' + CAST[j.villager].name,
        body: 'Enclosed: $' + j.reward + ' for goods delivered. Two days, door to door. — VP', read: false });
    }
  }
}

/* ---- talk dispatcher (replaces the phase-1 placeholder talk) ---- */
function socialTalk(npc) {
  STORY.meet(npc.id);
  const p = player();
  npc.face = Math.atan2(p.x - npc.x, p.z - npc.z);
  if (!npc.sprite) npc.group.rotation.y = npc.face;
  if (typeof LIFE !== 'undefined' && LIFE.tryNessHoldout(npc)) return;
  if (typeof resumeContract === 'function' && resumeContract(npc)) return;
  if (deliverJob(npc)) return;
  if (typeof proposeContract === 'function' && proposeContract(npc)) return;
  if (typeof tryVignette === 'function' && tryVignette(npc.id)) return;
  if (typeof maybeTeachRecipe === 'function' && maybeTeachRecipe(npc.id)) return;
  const gift = giftableHeld();
  if (gift && G.flags['gift_' + npc.id] !== G.day) {
    showChoice(['Give ' + ITEMS[gift].name, 'Just talk'], i => {
      if (i === 0) giveGift(npc);
      else say([{ who: npc.id, text: pickTalkLine(npc.id) }]);
    });
    return;
  }
  // First talk each day earns a point (§4); later talks branch terse.
  if (G.flags['talked_' + npc.id] === G.day) {
    say([{ who: npc.id, text: AGAIN_LINES[npc.id] || '…' }]);
    return;
  }
  G.flags['talked_' + npc.id] = G.day;
  STORY.heart(npc.id, 1);
  const bday = isBirthday(npc.id, G.day);
  const lines = [{ who: npc.id, text: pickTalkLine(npc.id) }];
  if (bday) lines.unshift('A little bunting on the door, a certain lightness: it’s ' + CAST[npc.id].name + '’s birthday today.');
  say(lines);
}

function fishTableHere(x, z) {
  const W = G.world;
  let zone = 'river';
  if (W.coastal && z > W.oceanZ - 3) zone = 'ocean';
  else if (dist2(x, z, W.pool.x, W.pool.z) < (W.pool.r + 3) ** 2) zone = 'pool';
  const season = seasonOf(G.day);
  const night = G.hour >= CONFIG.NIGHT_HOUR[season];
  return FISH.filter(f =>
    f.zones.includes(zone) &&
    (!f.seasons || f.seasons.includes(season)) &&
    (!f.rainOnly || G.weather === 'rain') &&
    (!f.nightOnly || night));
}

/* ---- fishing: cast → bob (1–8s, live stream) → one timing bar ---- */
const FISHING = { state: 'idle', timer: null, fish: null, cur: 0, dir: 1, zone: [0.4, 0.6], raf: null };
function tryCast() {
  const p = player(), fv = facingVector();
  const fx = p.x + fv.x * 1.6, fz = p.z + fv.z * 1.6;
  if (!isWaterAt(fx, fz)) { toast('Face the water to cast.'); return; }
  const table = fishTableHere(fx, fz);
  if (!table.length) { toast('Nothing biting here today.'); return; }
  FISHING.state = 'waiting';
  G.uiOpen = 'fishing';
  toast('…cast. Watch the water.');
  hop(); sfx('plink');
  let wait = 1000 + rand('live') * 7000;
  if (G.flags.blessBite) { G.flags.blessBite = false; wait = 400; }   // an instant bite, unannounced
  FISHING.timer = setTimeout(() => {
    if (FISHING.state !== 'waiting') return;
    // weighted pick: common fish twice as likely as rare
    const weighted = [];
    for (const f of table) for (let i = 0; i < 4 - f.rarity; i++) weighted.push(f);
    FISHING.fish = weighted[Math.floor(rand('live') * weighted.length)];
    FISHING.state = 'bite';
    sfx('coin');
    toast('❗ Something’s on! (E)', 1400);
    FISHING.timer = setTimeout(() => {
      if (FISHING.state === 'bite') { endFishing('It slipped away. The river keeps its counsel.'); }
    }, 1300);
  }, wait);
}
function startFishBar() {
  clearTimeout(FISHING.timer);
  FISHING.state = 'bar';
  const width = [0.34, 0.26, 0.18, 0.12][FISHING.fish.rarity];
  const start = 0.15 + rand('live') * (0.85 - width - 0.15);
  FISHING.zone = [start, start + width];
  FISHING.cur = 0; FISHING.dir = 1;
  const bar = document.createElement('div');
  bar.id = 'fishBar';
  bar.style.cssText = 'position:absolute;left:50%;bottom:130px;transform:translateX(-50%);' +
    'width:300px;height:34px;background:var(--cream);border:4px solid var(--border);border-radius:10px;padding:4px';
  const zone = document.createElement('div');
  zone.style.cssText = 'position:absolute;top:4px;bottom:4px;background:#9CBF8A;border-radius:4px;' +
    'left:' + (4 + FISHING.zone[0] * 292) + 'px;width:' + (width * 292) + 'px';
  const cur = document.createElement('div');
  cur.id = 'fishCur';
  cur.style.cssText = 'position:absolute;top:2px;bottom:2px;width:6px;background:#7A5C3E;border-radius:3px;left:4px';
  bar.appendChild(zone); bar.appendChild(cur);
  $('ui').appendChild(bar);
  const step = () => {
    if (FISHING.state !== 'bar') return;
    FISHING.cur += FISHING.dir * 0.016;
    if (FISHING.cur >= 1) { FISHING.cur = 1; FISHING.dir = -1; }
    if (FISHING.cur <= 0) { FISHING.cur = 0; FISHING.dir = 1; }
    cur.style.left = (4 + FISHING.cur * 288) + 'px';
    FISHING.raf = requestAnimationFrame(step);
  };
  step();
}
function resolveFishBar() {
  const hit = FISHING.cur >= FISHING.zone[0] && FISHING.cur <= FISHING.zone[1];
  const f = FISHING.fish;
  if (hit) {
    ITEMS[f.id] = ITEMS[f.id] || { name: f.name, icon: f.icon, sell: f.sell, enterprise: 'Fishing' };
    addItem(f.id, 1);
    sfx('pick');
    endFishing('Caught a ' + f.name + '!');
    if (!G.flags.firstFish) { G.flags.firstFish = true; jline('First catch: a ' + f.name.toLowerCase() + '. The river and I have an understanding now.'); }
    G.dayFlags.fished = true;
  } else {
    endFishing('Gone. You can almost hear it laughing.');
  }
}
function endFishing(msg) {
  clearTimeout(FISHING.timer);
  cancelAnimationFrame(FISHING.raf);
  const bar = $('fishBar');
  if (bar) bar.remove();
  FISHING.state = 'idle';
  if (G.uiOpen === 'fishing') G.uiOpen = null;
  if (msg) toast(msg);
}
function fishingAct() {          // E while fishing UI owns input
  if (FISHING.state === 'waiting') { endFishing('Reeled in early. The water shrugs.'); return; }
  if (FISHING.state === 'bite') { startFishBar(); return; }
  if (FISHING.state === 'bar') { resolveFishBar(); return; }
}
